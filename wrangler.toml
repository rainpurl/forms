# Used for local development with `wrangler pages dev` and for binding reference.
# In production you set these bindings in the Cloudflare dashboard instead
# (Workers & Pages > your project > Settings).

name = "forms-katr-es"
pages_build_output_dir = "."
compatibility_date = "2025-01-01"

# D1 binding. Create the database, then put its database_id here for local dev.
[[d1_databases]]
binding = "DB"
database_name = "forms"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# Workers AI binding. Powers the cached dashboard and form summaries.
[ai]
binding = "AI"

# Local-only vars. Set the real values as encrypted variables in the dashboard.
[vars]
ADMIN_PASSWORD = "rain"
SESSION_SECRET = "change-me-to-a-long-random-string"
