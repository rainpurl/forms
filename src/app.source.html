/* small shared bits */
function Field({ label, children, style }){ return (<label className="field" style={style}><span className="label">{label}</span>{children}</label>); }
function Toggle({ checked, onChange, label }){
  return (<label className="switch"><input type="checkbox" checked={!!checked} onChange={(e)=>onChange(e.target.checked)} /><span className="track"><span className="knob"></span></span><span>{label}</span></label>);
}
function QLabel({ q }){ return (<div className="qlabel">{q.label}{q.required && <span className="req">*</span>}</div>); }

/* ----------------------------- overview card ----------------------------- */
function AiSummary({ fetcher }){
  const [state, setState] = useState({ loading:true, summary:"", meta:null, error:null });
  const load = useCallback((refresh)=>{
    setState(s=>({ ...s, loading:true }));
    fetcher(refresh).then(({ok,data})=>{
      if (!ok || !data){ setState({ loading:false, summary:"", meta:null, error:"Could not load summary." }); return; }
      setState({ loading:false, summary:data.summary||"", meta:data, error:null });
    });
  },[fetcher]);
  useEffect(()=>{ load(false); },[load]);
  const m = state.meta;
  let metaText = "thinking...";
  if (!state.loading && m){
    if (m.generated === false) metaText = "basic summary";
    else if (m.cached) metaText = "cached";
    else if (m.generated) metaText = "generated just now";
    else metaText = "";
  }
  return (
    <div className="ai" style={{marginBottom:22}}>
      <div className="ai-head"><Spark/><span className="ai-title">Overview</span></div>
      {state.loading
        ? (<div><div className="shimmer" style={{width:"94%"}}/><div className="shimmer" style={{width:"88%"}}/><div className="shimmer" style={{width:"55%"}}/></div>)
        : (<div className="ai-body">{state.summary || state.error || "No summary available."}</div>)}
      <div className="ai-foot">
        <span className="ai-meta">{metaText}</span>
        <button className="btn sm ghost" disabled={state.loading} onClick={()=>load(true)}>Refresh</button>
      </div>
    </div>
  );
}

/* ----------------------------- shared form renderer ----------------------------- */
function answerToText(v){
  if (v === null || v === undefined) return "";
  if (Array.isArray(v)) return v.join(", ");
  if (typeof v === "object") return Object.keys(v).map((k)=>k + ":" + (Array.isArray(v[k]) ? v[k].join("/") : v[k])).join(",");
  return String(v);
}
function pipeText(text, answers, questions){
  if (!text || typeof text !== "string" || text.indexOf("{{") < 0) return text;
  return text.replace(/\{\{([^{}]+)\}\}/g, (m, ref)=>{
    ref = String(ref).trim();
    let q = (questions || []).find((x)=> x.id === ref);
    if (!q) q = (questions || []).find((x)=> (x.label || "").trim().toLowerCase() === ref.toLowerCase());
    if (!q) return "";
    return answerToText(answers ? answers[q.id] : null) || "";
  });
}
function pipeQuestion(q, answers, questions){
  if (!q) return q;
  const has = (t)=> typeof t === "string" && t.indexOf("{{") >= 0;
  if (!has(q.label) && !has(q.heading) && !has(q.content)) return q;
  const out = { ...q };
  if (has(q.label)) out.label = pipeText(q.label, answers, questions);
  if (has(q.heading)) out.heading = pipeText(q.heading, answers, questions);
  if (has(q.content)) out.content = pipeText(q.content, answers, questions);
  return out;
}
function PipeInput({ value, onChange, placeholder, textarea, questions }){
  const ref = useRef(null);
  const inputs = (questions || []).filter((x)=> QTYPES[x.type] && QTYPES[x.type].isInput && x.type !== "hidden_field" && (x.label || "").trim());
  const insert = (token)=>{
    const el = ref.current; const v = value || "";
    let pos = v.length; try { if (el && typeof el.selectionStart === "number") pos = el.selectionStart; } catch (e) {}
    onChange(v.slice(0, pos) + token + v.slice(pos));
    try { if (el && el.focus) el.focus(); } catch (e) {}
  };
  return (
    <div>
      {textarea
        ? <textarea ref={ref} className="textarea" placeholder={placeholder} value={value || ""} onChange={(e)=>onChange(e.target.value)} />
        : <input ref={ref} className="input" placeholder={placeholder} value={value || ""} onChange={(e)=>onChange(e.target.value)} />}
      {inputs.length > 0 && (
        <div className="pipe-row">
          <span className="mini-label">insert answer</span>
          <select className="select pipe-select" value="" onChange={(e)=>{ if (e.target.value){ insert("{{" + e.target.value + "}}"); e.target.value = ""; } }}>
            <option value="">choose a question</option>
            {inputs.map((x)=>(<option key={x.id} value={x.label}>{x.label}</option>))}
          </select>
        </div>
      )}
    </div>
  );
}

function skipMatch(a, rule){
  const empty = a === undefined || a === null || a === "" || (Array.isArray(a) && a.length === 0);
  if (rule.op === "answered") return !empty;
  if (rule.op === "empty") return empty;
  const val = String(rule.value || "").toLowerCase();
  const arr = Array.isArray(a) ? a.map((x)=>String(x).toLowerCase()) : null;
  const txt = answerToText(a).toLowerCase();
  if (rule.op === "ne") return arr ? !arr.includes(val) : (txt !== val);
  if (rule.op === "contains") return arr ? arr.some((x)=>x.includes(val)) : txt.includes(val);
  return arr ? arr.includes(val) : (txt === val);
}
function SkipControls({ q, questions, update }){
  const idx = questions.findIndex((x)=> x.id === q.id);
  const laterBlocks = questions.slice(idx < 0 ? 0 : idx + 1).filter((x)=> x.type === "block");
  const rules = Array.isArray(q.skip) ? q.skip : [];
  const opts = q.type === "multiple_choice" ? q.options : (q.type === "matrix" ? q.cols : null);
  const add = ()=> update({ skip: rules.concat([{ id: uid(), op:"eq", value:"", target: (laterBlocks[0] && laterBlocks[0].id) || "end" }]) });
  const setR = (id, patch)=> update({ skip: rules.map((r)=> r.id === id ? { ...r, ...patch } : r) });
  const remove = (id)=> update({ skip: rules.filter((r)=> r.id !== id) });
  const needsValue = (op)=> op === "eq" || op === "ne" || op === "contains";
  return (
    <div>
      <div className="panel-section">Skip logic</div>
      <div className="hint" style={{marginBottom:8}}>When the answer matches, jump ahead to a later section or end the survey. Rules are checked top to bottom.</div>
      {rules.length === 0 && <div className="muted" style={{fontSize:13}}>No skip rules yet.</div>}
      {rules.map((r)=>(
        <div key={r.id} className="skip-rule">
          <div className="row" style={{gap:6}}>
            <span className="mini-label">if answer</span>
            <select className="select" value={r.op} onChange={(e)=>setR(r.id, { op: e.target.value })}>
              <option value="eq">is</option>
              <option value="ne">is not</option>
              <option value="contains">contains</option>
              <option value="answered">is answered</option>
              <option value="empty">is empty</option>
            </select>
          </div>
          {needsValue(r.op) && (opts
            ? <select className="select" style={{marginTop:6}} value={r.value || ""} onChange={(e)=>setR(r.id, { value: e.target.value })}><option value="">Choose a value</option>{opts.map((o, i)=>(<option key={i} value={o}>{o}</option>))}</select>
            : <input className="input" style={{marginTop:6}} placeholder="value" value={r.value || ""} onChange={(e)=>setR(r.id, { value: e.target.value })} />)}
          <div className="row" style={{gap:6, marginTop:6}}>
            <span className="mini-label">go to</span>
            <select className="select" value={r.target} onChange={(e)=>setR(r.id, { target: e.target.value })}>
              {laterBlocks.map((b)=>(<option key={b.id} value={b.id}>{b.title || "Section"}</option>))}
              <option value="end">End of survey</option>
            </select>
            <button className="iconbtn" title="Remove rule" onClick={()=>remove(r.id)}>\u00d7</button>
          </div>
        </div>
      ))}
      <button className="btn sm" style={{marginTop:8}} onClick={add}>Add skip rule</button>
    </div>
  );
}

function qVisible(q, answers){
  const lg = q.logic;
  if (!lg || !lg.q) return true;
  const a = answers[lg.q];
  const empty = a === undefined || a === null || a === "" || (Array.isArray(a) && a.length === 0);
  if (empty) return false;
  const val = String(lg.value || "").toLowerCase();
  const arr = Array.isArray(a) ? a.map((x)=>String(x).toLowerCase()) : null;
  const txt = answerToText(a).toLowerCase();
  if (lg.op === "ne") return arr ? !arr.includes(val) : (txt !== val);
  if (lg.op === "contains") return arr ? arr.some((x)=>x.includes(val)) : txt.includes(val);
  return arr ? arr.includes(val) : (txt === val);
}

function FormRenderer({ form, preview, onSubmit, submitting, bookings, optionCounts }){
  const questions = form.schema.questions || [];
  const settings = form.schema.settings || {};
  const conversational = !!settings.conversational;
  const startRef = useRef(Date.now());
  const blockSig = questions.filter((q)=> q.type === "block").map((q)=> q.id + ":" + (q.title || "") + ":" + (q.description || "")).join("|");
  const steps = useMemo(()=>{
    const real = questions.filter((q)=> q.type !== "hidden_field");
    const blocks = []; let curB = { id:"", title:"", desc:"", items:[] };
    for (const q of real){
      if (q.type === "block"){ if (curB.items.length || curB.title || curB.desc) blocks.push(curB); curB = { id: q.id, title: q.title || "", desc: q.description || "", items: [] }; }
      else curB.items.push(q);
    }
    if (curB.items.length || curB.title || curB.desc) blocks.push(curB);
    let blk = blocks.length ? blocks.slice() : [{ id:"", title:"", desc:"", items:[] }];
    if (settings.randomizeBlocks && blk.length > 1) blk = shuffle(blk.slice());
    const out = [];
    for (const b of blk){
      if (conversational){
        const items = b.items.filter((q)=> q.type !== "page_break");
        const list = settings.randomizeQuestions ? shuffle(items.slice()) : items;
        if (!list.length){ if (b.title || b.desc) out.push({ qs:[], title:b.title, desc:b.desc, bid:b.id }); }
        else list.forEach((q, i)=> out.push({ qs:[q], title: i === 0 ? b.title : "", desc: i === 0 ? b.desc : "", bid:b.id }));
      } else {
        const pages = [[]];
        for (const q of b.items){ if (q.type === "page_break") pages.push([]); else pages[pages.length - 1].push(q); }
        let pgs = pages.filter((p)=>p.length);
        if (!pgs.length){ if (b.title || b.desc) out.push({ qs:[], title:b.title, desc:b.desc, bid:b.id }); }
        else { if (settings.randomizeQuestions) pgs = pgs.map((p)=> shuffle(p.slice())); pgs.forEach((p, i)=> out.push({ qs:p, title: i === 0 ? b.title : "", desc: i === 0 ? b.desc : "", bid:b.id })); }
      }
    }
    return out.length ? out : [{ qs:[], title:"", desc:"", bid:"" }];
  }, [form.id, questions.length, blockSig, settings.randomizeQuestions, settings.randomizeBlocks, conversational]);

  const [page, setPage] = useState(0);
  const [hist, setHist] = useState([]);
  const [answers, setAnswers] = useState({});
  const [errors, setErrors] = useState({});
  const [followups, setFollowups] = useState({});
  const setA = (qid, v) => setAnswers((a)=>({ ...a, [qid]: v }));

  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const init = {};
    questions.forEach((q)=>{ if (q.type === "hidden_field"){ init[q.id] = q.source === "fixed" ? (q.value || "") : (params.get(q.key) || q.value || ""); } });
    if (Object.keys(init).length) setAnswers((a)=>({ ...init, ...a }));
  }, [form.id]);

  const theme = form.theme || {};
  const scopeStyle = { "--fp": theme.primary || "#5b4fe0", "--fs": theme.secondary || "#1b1830", "--fa": theme.accent || theme.primary || "#5b4fe0", fontFamily: (theme.customFont ? ("'" + theme.customFont + "', ") : "") + (FORM_FONTS[theme.font] || FORM_FONTS.sans) };
  useEffect(()=>{ loadGoogleFont(theme.customFont); },[theme.customFont]);

  const stepHasVisible = (i) => steps[i] && (steps[i].qs || []).some((q)=> qVisible(q, answers));
  const cur = Math.min(page, steps.length - 1);
  const visibleIdxs = steps.map((_, i)=>i).filter(stepHasVisible);
  const nextIdx = visibleIdxs.find((i)=> i > cur);
  const prevList = visibleIdxs.filter((i)=> i < cur);
  const prevIdx = prevList.length ? prevList[prevList.length - 1] : undefined;
  const hasNext = nextIdx !== undefined;
  const pos = (visibleIdxs.indexOf(cur) + 1) || 1;
  const total = visibleIdxs.length || 1;
  const multi = total > 1;

  const validateList = (list) => {
    const errs = {};
    for (const q of list){ const def = QTYPES[q.type]; if (!def || !def.isInput) continue; if (!qVisible(q, answers)) continue; const e = def.validate(q, answers[q.id]); if (e) errs[q.id] = e; }
    return errs;
  };
  const fuList = () => Object.keys(followups).filter((k)=>followups[k] && followups[k].question).map((k)=>({ questionId:k, question:followups[k].question, answer:followups[k].answer || "" }));
  const pendingFollowupQ = (list) => (list || []).find((q)=> q.type === "text_entry" && q.followUp && qVisible(q, answers) && !isEmpty(answers[q.id]) && !(followups[q.id] && followups[q.id].done));
  const runFollowup = (q, after) => {
    setFollowups((f)=>({ ...f, [q.id]: { loading: true, question: null, answer: "", done: false } }));
    api.followup(form.id, q.id, answers[q.id]).then(({ ok, data })=>{
      const question = ok && data && data.question ? data.question : null;
      setFollowups((f)=>({ ...f, [q.id]: { loading: false, question, answer: (f[q.id] && f[q.id].answer) || "", done: true } }));
      if (!question && after) after();
    }).catch(()=>{ setFollowups((f)=>({ ...f, [q.id]: { loading: false, question: null, answer: "", done: true } })); if (after) after(); });
  };
  const skipTarget = (qs) => {
    for (const q of (qs || [])){
      if (!qVisible(q, answers)) continue;
      const rules = Array.isArray(q.skip) ? q.skip : [];
      for (const r of rules){ if (skipMatch(answers[q.id], r)) return r.target; }
    }
    return null;
  };
  const doNext = () => {
    setErrors({});
    const t = skipTarget((steps[cur] && steps[cur].qs) || []);
    if (t === "end"){ doSubmit(); return; }
    if (t){ const j = steps.findIndex((st)=> st.bid && st.bid === t); if (j >= 0 && j > cur){ setHist((h)=> h.concat([cur])); setPage(j); window.scrollTo(0, 0); return; } }
    if (nextIdx !== undefined){ setHist((h)=> h.concat([cur])); setPage(nextIdx); window.scrollTo(0, 0); }
  };
  const goNext = () => {
    if (!preview){
      const errs = validateList((steps[cur] && steps[cur].qs) || []); if (Object.keys(errs).length){ setErrors(errs); return; }
      const fq = pendingFollowupQ((steps[cur] && steps[cur].qs) || []); if (fq){ setErrors({}); runFollowup(fq, doNext); return; }
    }
    doNext();
  };
  const goBack = () => { setErrors({}); if (hist.length){ const to = hist[hist.length - 1]; setHist(hist.slice(0, -1)); setPage(to); window.scrollTo(0, 0); } else if (prevIdx !== undefined){ setPage(prevIdx); window.scrollTo(0, 0); } };
  const doSubmit = () => {
    const visited = {}; hist.concat([cur]).forEach((i)=> ((steps[i] && steps[i].qs) || []).forEach((q)=>{ visited[q.id] = true; }));
    const skipped = questions.filter((q)=> visited[q.id] && QTYPES[q.type] && QTYPES[q.type].isInput && q.type !== "hidden_field" && qVisible(q, answers) && q.request && isEmpty(answers[q.id]));
    if (skipped.length){ const names = skipped.map((q)=>q.label || "a question").join(", "); if (!window.confirm("You skipped: " + names + ". Submit anyway?")) return; }
    setErrors({});
    const params = new URLSearchParams(window.location.search);
    const utm = {}; ["source","medium","campaign","term","content"].forEach((k)=>{ const v = params.get("utm_" + k); if (v) utm[k] = v; });
    const seconds = Math.max(0, Math.round((Date.now() - startRef.current) / 1000));
    onSubmit(answers, { seconds, utm, followups: fuList() });
  };
  const handleSubmit = () => {
    if (preview) return;
    const errs = validateList((steps[cur] && steps[cur].qs) || []);
    if (Object.keys(errs).length){ setErrors(errs); return; }
    const fq = pendingFollowupQ((steps[cur] && steps[cur].qs) || []); if (fq){ runFollowup(fq, doSubmit); return; }
    doSubmit();
  };
  const renderFollowup = (q) => {
    if (q.type !== "text_entry" || !q.followUp) return null;
    if (preview) return <div className="followup-note">A follow-up question will appear here based on the answer.</div>;
    const f = followups[q.id];
    if (!f) return null;
    if (f.loading) return <div className="followup loading">One moment...</div>;
    if (!f.question) return null;
    return (<div className="followup"><div className="qlabel">{f.question}</div><textarea className="finput" rows={2} placeholder="Optional" value={f.answer} onChange={(e)=>setFollowups((p)=>({ ...p, [q.id]: { ...p[q.id], answer: e.target.value } }))} /></div>);
  };

  const sec = steps[cur] || {};
  const shown = ((steps[cur] && steps[cur].qs) || []).filter((q)=> qVisible(q, answers));
  return (
    <div className="form-scope" style={scopeStyle}>
      <div className="fcard">
        {settings.headerImage && <img className="fheader-img" src={settings.headerImage} alt="" />}
        <div className="ftitle">{form.title}</div>
        {form.description && <div className="fdesc">{form.description}</div>}
        {multi && <div className="fprogress"><div className="fprogress-bar" style={{width:((pos / total) * 100) + "%"}}></div></div>}
        <div className="fpage" key={cur} style={{marginTop:12}}>
          {sec && sec.title ? (<div className="form-section"><div className="form-section-title">{pipeText(sec.title, answers, questions)}</div>{sec.desc ? <div className="form-section-desc">{pipeText(sec.desc, answers, questions)}</div> : null}</div>) : null}
          {shown.map((q)=>{ const def = QTYPES[q.type]; if (!def) return null; const R = def.Renderer; const pq = pipeQuestion(q, answers, questions); return (<div key={q.id}><R q={pq} value={answers[q.id]} onChange={(v)=>setA(q.id, v)} error={errors[q.id]} bookings={bookings && bookings[q.id]} counts={optionCounts && optionCounts[q.id]} formId={form.id} preview={preview} />{renderFollowup(q)}</div>); })}
          {shown.length === 0 && <div className="muted" style={{fontSize:13}}>Nothing to show on this step.</div>}
        </div>
        <div className="fnav" style={{marginTop:18}}>
          {multi && (hist.length || prevIdx !== undefined) && <button className="fbtn-ghost" onClick={goBack} disabled={submitting}>Back</button>}
          {multi && <span className="fpage-count">Page {pos} of {total}</span>}
          <span className="grow"></span>
          {hasNext
            ? <button className="submit" onClick={goNext}>Next</button>
            : <button className="submit" onClick={handleSubmit} disabled={preview || submitting}>{submitting ? "Submitting..." : "Submit"}</button>}
        </div>
        {preview && <div className="muted" style={{fontSize:13,marginTop:8}}>Preview mode, submit disabled</div>}
      </div>
    </div>
  );
}

function PublicForm({ username, slug }){
  const [st, setSt] = useState({ loading:true });
  const [submitting, setSubmitting] = useState(false);
  const [done, setDone] = useState(false);
  const [doneAnswers, setDoneAnswers] = useState({});
  useEffect(()=>{
    const wl = (st.form && st.form.schema && st.form.schema.settings) || null;
    if (!wl) return;
    const prevTitle = document.title;
    if (wl.pageTitle) document.title = wl.pageTitle;
    let icon = null, styleEl = null;
    try { if (wl.favicon){ icon = document.createElement("link"); icon.rel = "icon"; icon.href = wl.favicon; document.head.appendChild(icon); } } catch (e) {}
    try { if (wl.customCss){ styleEl = document.createElement("style"); styleEl.setAttribute("data-zq-custom", "1"); styleEl.textContent = wl.customCss; document.head.appendChild(styleEl); } } catch (e) {}
    return ()=>{ document.title = prevTitle; if (icon && icon.parentNode) icon.parentNode.removeChild(icon); if (styleEl && styleEl.parentNode) styleEl.parentNode.removeChild(styleEl); };
  }, [st.form]);
  useEffect(()=>{
    let m = true;
    api.publicForm(username, slug).then(({ok,data})=>{
      if (!m) return;
      if (!ok || !data || data.error || !data.form) setSt({ loading:false, notFound:true });
      else setSt({ loading:false, form:data.form, availability:data.availability, bookings:data.bookings, optionCounts:data.optionCounts });
    });
    return ()=>{ m = false; };
  },[username, slug]);

  if (st.loading) return <div className="center-screen"><div className="muted">Loading...</div></div>;
  if (st.notFound) return <div className="center-screen"><h2>Form not found</h2><p className="muted">This link may be wrong, or the form was removed.</p></div>;
  const form = st.form;
  const scope = { "--fa": (form.theme && form.theme.accent) || "#5b4fe0", fontFamily: FORM_FONTS[form.theme && form.theme.font] || FORM_FONTS.sans };

  const avail = st.availability || { open: form.is_open, reason: form.is_open ? null : "closed" };
  if (!avail.open){
    const cmsg = avail.reason === "scheduled" ? ("This form is not open yet." + (avail.opensAt ? " It opens " + fmtDate(avail.opensAt) + "." : "")) : avail.reason === "ended" ? "This form has closed." : avail.reason === "full" ? "This form has reached its response limit." : "This form is no longer accepting responses.";
    return (<div className="form-page"><div className="form-page-inner"><div className="form-scope" style={scope}><div className="fcard"><div className="ftitle">{form.title}</div><p className="fdesc">{cmsg}</p></div></div></div></div>);
  }
  if (done){
    const set = (form.schema && form.schema.settings) || {};
    const btnUrl = set.endButtonUrl ? (/^https?:\/\//i.test(set.endButtonUrl) ? set.endButtonUrl : ("https://" + set.endButtonUrl)) : null;
    return (<div className="form-page"><div className="form-page-inner"><div className="form-scope" style={scope}><div className="fcard" style={{textAlign:"center"}}>{set.headerImage && <img className="fheader-img" src={set.headerImage} alt="" />}<div style={{fontSize:38,color:"var(--fa)"}}>✓</div><div className="ftitle" style={{marginTop:6}}>{pipeText(set.endTitle, doneAnswers, (form.schema && form.schema.questions) || []) || "Thank you"}</div><p className="fdesc">{pipeText(set.endMessage, doneAnswers, (form.schema && form.schema.questions) || []) || "Your response has been recorded."}</p>{set.endButtonLabel && btnUrl && <a className="fcta" href={btnUrl} target="_blank" rel="noopener">{set.endButtonLabel}</a>}</div></div>{!set.hideBranding && <div style={{textAlign:"center",marginTop:18}}><a className="builtby" href="https://zetetiq.pages.dev" target="_blank" rel="noopener">powered by <Logo size={13} /></a></div>}</div></div>);
  }
  const submit = (answers, extra) => {
    extra = extra || {};
    setSubmitting(true);
    api.submit(form.id, { data: answers, viewport: { w: window.innerWidth, h: window.innerHeight }, referrer: document.referrer, seconds: extra.seconds, utm: extra.utm, followups: extra.followups }).then(({ok,data})=>{
      setSubmitting(false);
      if (ok && data && data.ok){
        const r = form.schema && form.schema.settings && form.schema.settings.redirectUrl;
        if (r){ window.location.href = /^https?:\/\//i.test(r) ? r : ("https://" + r); return; }
        setDoneAnswers(answers); setDone(true);
      }
      else window.alert((data && data.error === "form_closed") ? "This form just closed." : "Something went wrong. Please try again.");
    });
  };
  return (
    <div className="form-page"><div className="form-page-inner">
      <FormRenderer form={form} onSubmit={submit} submitting={submitting} bookings={st.bookings} optionCounts={st.optionCounts} />
      {!(form.schema && form.schema.settings && form.schema.settings.hideBranding) && <div style={{textAlign:"center",marginTop:18}}><a className="builtby" href="https://zetetiq.pages.dev" target="_blank" rel="noopener">powered by <Logo size={13} /></a></div>}
    </div></div>
  );
}

function Landing({ showLogin }){

    </div>
  );

function MCCanvas({ q, update }){
  const marker = q.multi ? "sq" : "rd";
  const quotas = q.quotas || {};
  const setOpt = (i, v) => {
    const o = q.options.slice(); const old = o[i]; o[i] = v;
    let qz = q.quotas;
    if (qz && old !== v && Object.prototype.hasOwnProperty.call(qz, old)){ qz = { ...qz }; qz[v] = qz[old]; delete qz[old]; }
    update({ options: o, quotas: qz });
  };
  const setQuota = (o, val) => { const qz = { ...(q.quotas || {}) }; const n = parseInt(val, 10); if (n > 0) qz[o] = n; else delete qz[o]; update({ quotas: qz }); };
  const add = () => update({ options: q.options.concat(["Option " + (q.options.length + 1)]) });
  const rm = (i) => { const removed = q.options[i]; const qz = { ...(q.quotas || {}) }; delete qz[removed]; update({ options: q.options.filter((_, k) => k !== i), quotas: qz }); };
  return (
    <div>
      {q.display === "dropdown" && <div className="mono" style={{fontSize:11,color:"var(--ink-soft)",marginBottom:6}}>Shown as a dropdown</div>}
      {q.options.map((o, i) => (
        <div className="wq-choice" key={i}>
          <span className={"wq-mark " + marker}></span>
          <input className="wq-choice-input" placeholder={"Click to write Choice " + (i + 1)} value={o} onChange={(e)=>setOpt(i, e.target.value)} />
          <input className="wq-quota" type="number" min="0" placeholder="∞" title="Limit how many can pick this (blank for no limit)" value={quotas[o] || ""} onChange={(e)=>setQuota(o, e.target.value)} />
          <button className="iconbtn" style={{width:26,height:26}} title="Remove choice" disabled={q.options.length <= 1} onClick={()=>rm(i)}>×</button>
        </div>
      ))}
      <button className="wq-addchoice" onClick={add}>+ Add choice</button>
      <div className="wq-quota-hint">Numbers cap how many people can pick each choice. Blank means no limit.</div>
    </div>
  );
}

      <div className="row" style={{justifyContent:"space-between",fontSize:12,color:"var(--ink-soft)"}}><span>{q.min}</span><span>{q.max}</span></div>

}

function CanvasCard({ q, index, selected, onSelect, update, onDup, onDel, onUp, onDown, dnd, cardRef }){
  const [menu, setMenu] = useState(false);
  const handle = {
    draggable: true,
    onDragStart: (e)=>{ e.stopPropagation(); dnd.start(index); try { e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", String(index)); } catch (_) {} },
    onDragEnd: ()=>dnd.end(),
  };
  const dropProps = {
    onDragOver: (e)=>{ e.preventDefault(); dnd.over_(index); },
    onDrop: (e)=>{ e.preventDefault(); dnd.drop(index); },
  };
  if (q.type === "block"){
    return (
      <div ref={cardRef} className={"blockcard" + (selected ? " sel" : "") + (dnd.draggingId === q.id ? " dragging" : "")} onClick={onSelect} {...dropProps}>
        <span className="drag-handle" {...handle} title="Drag to reorder">⠿</span>
        <div className="blockcard-body">
          <div className="blockcard-tag">Section</div>
          <input className="blockcard-title" placeholder="Section title" value={q.title || ""} onClick={(e)=>e.stopPropagation()} onChange={(e)=>update({ title: e.target.value })} />
          <input className="blockcard-desc" placeholder="Optional description" value={q.description || ""} onClick={(e)=>e.stopPropagation()} onChange={(e)=>update({ description: e.target.value })} />
        </div>
        <button className="iconbtn" title="Remove" onClick={(e)=>{ e.stopPropagation(); onDel(); }}>×</button>
      </div>
    );
  }
  if (q.type === "page_break"){
    return (
      <div ref={cardRef} className={"pbreak" + (selected ? " sel" : "") + (dnd.draggingId === q.id ? " dragging" : "")} onClick={onSelect} {...dropProps}>
        <span className="drag-handle" {...handle} title="Drag to reorder">⠿</span>
        <span className="pbreak-line"></span>
        <span className="pbreak-label">Page break</span>
        <span className="pbreak-line"></span>
        <button className="iconbtn" title="Remove" onClick={(e)=>{ e.stopPropagation(); onDel(); }}>×</button>
      </div>
    );
  }
  if (q.type === "hidden_field"){
    return (
      <div ref={cardRef} className={"qccard" + (selected ? " sel" : "") + (dnd.draggingId === q.id ? " dragging" : "")} onClick={onSelect} {...dropProps}>
        <div className="qcc-head">
          <span className="drag-handle" {...handle} title="Drag to reorder">⠿</span>
          <span className="qcc-num">Q{index + 1}</span>
          <span className="qcc-type mono">Hidden field</span>
          <span className="grow"></span>
          <div className="qcc-menu" onClick={(e)=>e.stopPropagation()}>
            <button className="iconbtn" title="More" onClick={()=>setMenu((m)=>!m)}>···</button>
            {menu && (<div className="menu" style={{right:0,left:"auto"}}><button onClick={()=>{ onDup(); setMenu(false); }}>Duplicate</button><button className="danger-text" onClick={()=>{ onDel(); setMenu(false); }}>Move to trash</button></div>)}
          </div>
        </div>
        <div className="wq-body"><div className="hint">Captures <b>{q.key || "field"}</b> {q.source === "fixed" ? "as a fixed value" : "from the URL"}, hidden from respondents. Edit it in the left panel.</div></div>
      </div>
    );
  }
  return (
    <div ref={cardRef} className={"qccard" + (selected ? " sel" : "") + (dnd.draggingId === q.id ? " dragging" : "")} onClick={onSelect} {...dropProps}>
      <div className="qcc-head">
        <span className="drag-handle" {...handle} title="Drag to reorder">⠿</span>
        <span className="qcc-num">Q{index + 1}</span>
        <span className="qcc-type mono">{QTYPES[q.type].label}</span>
        {q.logic && q.logic.q && <span className="qcc-type mono" style={{color:"var(--bo)"}}>conditional</span>}
        <span className="grow"></span>
        <div className="qcc-menu" onClick={(e)=>e.stopPropagation()}>
          <button className="iconbtn" title="More" onClick={()=>setMenu((m)=>!m)}>···</button>
          {menu && (
            <div className="menu" style={{right:0,left:"auto"}}>
              <button onClick={()=>{ onUp(); setMenu(false); }}>Move up</button>
              <button onClick={()=>{ onDown(); setMenu(false); }}>Move down</button>
              <button onClick={()=>{ onDup(); setMenu(false); }}>Duplicate</button>
              <button className="danger-text" onClick={()=>{ onDel(); setMenu(false); }}>Move to trash</button>
            </div>
          )}
        </div>
      </div>
      {(q.type === "text_graphic" || q.type === "payment") ? (
        <div>
          <input className="wq-title" placeholder="Heading" value={q.heading || ""} onChange={(e)=>update({heading:e.target.value})} />
          <textarea className="wq-textarea" placeholder="Add text or instructions" value={q.content || ""} onChange={(e)=>update({content:e.target.value})} />
        </div>
      ) : (
        <input className="wq-title" placeholder="Click to write the question text" value={q.label || ""} onChange={(e)=>update({label:e.target.value})} />
      )}
      <div className="wq-body">
        {q.type === "multiple_choice" && <MCCanvas q={q} update={update} />}
        {q.type === "text_entry" && (q.mode === "long"
          ? <div className="wq-prev-input tall">{q.placeholder || "Long answer text"}</div>
          : <div className="wq-prev-input">{q.placeholder || "Short answer text"}</div>)}
        {q.type === "slider" && <SliderPrev q={q} />}
        {q.type === "nps" && <NpsPrev q={q} />}
        {q.type === "matrix" && <MatrixCanvas q={q} update={update} />}
        {q.type === "rank_order" && <RankCanvas q={q} update={update} />}

        {q.type === "star_rating" && <div className="stars prev">{Array.from({length:q.max}).map((_,i)=>(<span key={i} className="star">★</span>))}</div>}
        {q.type === "scheduling" && <div className="wq-prev-input">{(q.slots && q.slots.length) ? (q.slots.length + " time slot" + (q.slots.length===1?"":"s")) : "Add time slots in the left panel"}</div>}
        {q.type === "payment" && <div className="wq-prev-input">{q.url ? ((q.buttonText||"Pay now") + (q.amount?(" \u00b7 "+q.amount):"")) : "Add a payment link in the left panel"}</div>}
        {q.type === "document_sign" && <div className="wq-prev-input">{q.document ? ("Document attached · " + ((q.fields&&q.fields.length)||0) + " field" + (((q.fields&&q.fields.length)||0)===1?"":"s")) : "Upload a document in the left panel"}</div>}
        {q.type === "file_upload" && <div className="wq-prev-input">{(q.accept ? ("Accepts: " + q.accept) : "Any file type") + (q.multiple ? " · multiple" : "")}</div>}
        {q.type === "image_choice" && <div className="wq-prev-input">{((q.options&&q.options.length)||0) + " image choice" + (((q.options&&q.options.length)||0)===1?"":"s")}</div>}

function MatrixCanvas({ q, update }){

  const addRow = ()=> update({ rows: q.rows.concat(["Statement " + (q.rows.length + 1)]) });
  const rmRow = (i)=> update({ rows: q.rows.filter((_,k)=>k!==i) });
  const addCol = ()=> update({ cols: q.cols.concat(["Point " + (q.cols.length + 1)]) });
  const rmCol = (i)=> update({ cols: q.cols.filter((_,k)=>k!==i) });
  const mark = q.multi ? "sq" : "rd";
  return (
    <div className="mxcanvas">
      <div className="mxgrid" style={{gridTemplateColumns:"minmax(110px,1.4fr) repeat(" + q.cols.length + ",1fr) 26px"}}>
        <div></div>
        {q.cols.map((c,i)=>(
          <div className="mxcol" key={"c" + i}>
            <input className="wq-choice-input" style={{textAlign:"center",fontSize:12}} value={c} onChange={(e)=>setCol(i, e.target.value)} />
            <button className="iconbtn" style={{width:20,height:20,fontSize:11}} title="Remove point" disabled={q.cols.length <= 2} onClick={()=>rmCol(i)}>×</button>
          </div>
        ))}
        <div></div>
        {q.rows.map((r,ri)=>(
          <React.Fragment key={"r" + ri}>
            <div className="mxrow"><input className="wq-choice-input" value={r} onChange={(e)=>setRow(ri, e.target.value)} /></div>
            {q.cols.map((c,ci)=>(<div className="mxdot" key={ci}><span className={"wq-mark " + mark}></span></div>))}
            <div className="mxdot"><button className="iconbtn" style={{width:20,height:20,fontSize:11}} title="Remove statement" disabled={q.rows.length <= 1} onClick={()=>rmRow(ri)}>×</button></div>
          </React.Fragment>
        ))}
      </div>
      <div className="row" style={{gap:14,marginTop:8}}>
        <button className="wq-addchoice" onClick={addRow}>+ Add statement</button>

}

function LogicControls({ q, questions, update }){
  const idx = questions.findIndex((x)=>x.id === q.id);
  const priors = questions.slice(0, idx < 0 ? questions.length : idx).filter((x)=> QTYPES[x.type] && QTYPES[x.type].isInput && x.type !== "hidden_field");
  const lg = q.logic || null;
  const on = !!(lg && lg.q);
  const src = priors.find((x)=>x.id === (lg && lg.q));
  const opts = src && src.type === "multiple_choice" ? src.options : (src && src.type === "matrix" ? src.cols : null);
  return (
    <div>
      <div className="panel-section">Display logic</div>
      {priors.length === 0
        ? <div className="hint">Place this question after another input question to show it conditionally.</div>
        : (<div>
            <Toggle checked={on} onChange={(c)=> update({ logic: c ? { q: priors[0].id, op: "eq", value: "" } : null })} label="Show only if a condition is met" />
            {on && (
              <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
                <select className="select" value={lg.q} onChange={(e)=>update({ logic: { q: e.target.value, op: lg.op, value: "" } })}>
                  {priors.map((p)=>(<option key={p.id} value={p.id}>{p.label || p.id}</option>))}
                </select>
                <select className="select" value={lg.op} onChange={(e)=>update({ logic: { ...lg, op: e.target.value } })}>
                  <option value="eq">is</option>
                  <option value="ne">is not</option>
                  <option value="contains">contains</option>
                </select>
                {opts
                  ? (<select className="select" value={lg.value} onChange={(e)=>update({ logic: { ...lg, value: e.target.value } })}><option value="">Choose a value</option>{opts.map((o,i)=>(<option key={i} value={o}>{o}</option>))}</select>)
                  : (<input className="input" placeholder="Value" value={lg.value} onChange={(e)=>update({ logic: { ...lg, value: e.target.value } })} />)}
                <div className="hint">This question appears only when the answer above matches.</div>
              </div>
            )}
          </div>)}
    </div>
  );
}

function LeftEditor({ q, update, questions, setQuestions }){
  const changeType = (type) => {
    if (type === q.type) return;
    const made = QTYPES[type].make();
    made.id = q.id;
    if ("label" in made && q.label !== undefined) made.label = q.label;
    made.required = !!q.required;
    made.request = !!q.request;
    setQuestions(questions.map((x)=> x.id === q.id ? made : x));
  };
  return (
    <div>
      <div className="panel-title">Edit question</div>
      <Field label="Question type">
        <select className="select" value={q.type} onChange={(e)=>changeType(e.target.value)}>
          {QTYPE_ORDER.map((t)=>(<option key={t} value={t}>{QTYPES[t].label}</option>))}
        </select>
      </Field>
      {q.type === "multiple_choice" && <MCControls q={q} update={update} />}
      {q.type === "text_entry" && <TextControls q={q} update={update} />}
      {q.type === "slider" && <SliderControls q={q} update={update} />}
      {q.type === "nps" && <NpsControls q={q} update={update} />}
      {q.type === "matrix" && <MatrixControls q={q} update={update} />}
      {q.type === "rank_order" && <RankControls q={q} update={update} />}
      {q.type === "constant_sum" && <ConstantSumControls q={q} update={update} />}
      {q.type === "form_field" && <FormFieldControls q={q} update={update} />}
      {q.type === "date" && <DateControls q={q} update={update} />}
      {q.type === "star_rating" && <StarControls q={q} update={update} />}
      {q.type === "signature" && <ReqToggles q={q} update={update} />}
      {q.type === "text_graphic" && <div className="hint" style={{marginTop:6}}>Edit the heading, text, and image directly on the question in the canvas.</div>}
      {q.type === "payment" && <ActionControls q={q} update={update} />}
      {q.type === "scheduling" && <SchedulingControls q={q} update={update} />}
      {q.type === "document_sign" && <DocumentControls q={q} update={update} />}
      {q.type === "file_upload" && <FileUploadControls q={q} update={update} />}
      {q.type === "image_choice" && <ImageChoiceControls q={q} update={update} />}
      {q.type === "number_entry" && <NumberControls q={q} update={update} />}
      {q.type === "drill_down" && <DrillControls q={q} update={update} />}
      {q.type === "hidden_field" && <HiddenControls q={q} update={update} />}
      {QTYPES[q.type] && QTYPES[q.type].isInput && q.type !== "hidden_field" && <LogicControls q={q} questions={questions} update={update} />}
      {QTYPES[q.type] && QTYPES[q.type].isInput && q.type !== "hidden_field" && <SkipControls q={q} questions={questions} update={update} />}
    </div>
  );

        <ColorPick label="Primary" value={form.theme.primary} onChange={(v)=>setTheme({primary:v})} />
        <ColorPick label="Secondary" value={form.theme.secondary} onChange={(v)=>setTheme({secondary:v})} />
        <ColorPick label="Accent" value={form.theme.accent} onChange={(v)=>setTheme({accent:v})} />
        <div>
          <div className="label">Font</div>
          <select className="select" value={form.theme.font} onChange={(e)=>setTheme({font:e.target.value})}>
            <option value="sans">Sans</option>
            <option value="serif">Serif</option>
            <option value="mono">Monospace</option>
            <option value="slab">Slab</option>
            <option value="zetetiq">zetetiq</option>
          </select>
        </div>
        <div>
          <div className="label">Header image</div>
          {headerImage
            ? (<div className="himg-preview"><img src={headerImage} alt="" /><button className="btn sm ghost" onClick={()=>setSettings({headerImage:null})}>Remove</button></div>)
            : (<label className="himg-upload"><input type="file" accept="image/*" style={{display:"none"}} onChange={(e)=>{ const f = e.target.files && e.target.files[0]; if (f) readImageScaled(f, 1000, (url)=>{ if (!url){ toast("Could not read that image."); return; } if (url.length > 900000){ toast("That image is too large. Try a smaller one."); return; } setSettings({headerImage:url}); }); e.target.value = ""; }} /><span>Upload image</span></label>)}
          <div className="hint">Shown at the very top of the form. Wide banners work best.</div>
        </div>
      </div>
    </div>
  );
}

function SettingsPanel({ form, setForm, setSettings, id, del }){
  const { toast } = useApp();
  const toLocalInput = (iso) => { if (!iso) return ""; const d = new Date(iso); if (isNaN(d.getTime())) return ""; const p = (n)=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes()); };
  const fromLocalInput = (v) => { if (!v) return ""; const d = new Date(v); return isNaN(d.getTime()) ? "" : d.toISOString(); };
  return (
    <div>
      <div className="panel-title">Form settings</div>
      <Field label="Form title"><input className="input" value={form.title} onChange={(e)=>setForm((f)=>({ ...f, title:e.target.value }))} /></Field>

      <Toggle checked={!!form.schema.settings.randomizeQuestions} onChange={(c)=>setSettings({randomizeQuestions:c})} label="Randomize question order" />

      <div style={{height:8}}></div>

      <div className="panel-section">Availability and limits</div>
      <Field label="Response limit (0 for unlimited)"><input className="input" type="number" min="0" value={form.schema.settings.responseCap || 0} onChange={(e)=>setSettings({responseCap: parseInt(e.target.value || "0", 10)})} /></Field>
      <Field label="Opens at (optional)"><input className="input" type="datetime-local" value={toLocalInput(form.schema.settings.opensAt)} onChange={(e)=>setSettings({opensAt: fromLocalInput(e.target.value)})} /></Field>
      <Field label="Closes at (optional)"><input className="input" type="datetime-local" value={toLocalInput(form.schema.settings.closesAt)} onChange={(e)=>setSettings({closesAt: fromLocalInput(e.target.value)})} /></Field>
      <div className="hint">The form stops accepting responses when the limit is reached or after the close time. Times use this browser's timezone.</div>
      <div className="panel-section">After submission</div>
      <div className="hint" style={{marginBottom:8}}>Tip: insert an answer with the picker, or type a reference like {"{{Your name}}"} to greet people by their answer.</div>
      <Field label="Thank-you heading"><PipeInput value={form.schema.settings.endTitle} onChange={(v)=>setSettings({endTitle:v})} placeholder="Thank you" questions={form.schema.questions} /></Field>
      <Field label="Thank-you message"><PipeInput textarea value={form.schema.settings.endMessage} onChange={(v)=>setSettings({endMessage:v})} placeholder="Your response has been recorded." questions={form.schema.questions} /></Field>
      <Field label="Button label (optional)"><input className="input" placeholder="Visit our site" value={form.schema.settings.endButtonLabel || ""} onChange={(e)=>setSettings({endButtonLabel:e.target.value})} /></Field>
      <Field label="Button URL (optional)"><input className="input" placeholder="https://example.com" value={form.schema.settings.endButtonUrl || ""} onChange={(e)=>setSettings({endButtonUrl:e.target.value})} /></Field>
      <Field label="Redirect URL (optional)"><input className="input" placeholder="https://example.com/thanks" value={form.schema.settings.redirectUrl || ""} onChange={(e)=>setSettings({redirectUrl:e.target.value})} /></Field>
      <div className="hint">If a redirect URL is set, respondents go there on submit. Otherwise they see the thank-you page above, with the optional button.</div>
      <div className="panel-section">Branding and white-label</div>
      <Toggle checked={!!form.schema.settings.hideBranding} onChange={(c)=>setSettings({hideBranding:c})} label="Hide the powered by zetetiq footer" />
      <div style={{height:10}}></div>
      <Field label="Browser tab title (optional)"><input className="input" placeholder={form.title || "Form"} value={form.schema.settings.pageTitle || ""} onChange={(e)=>setSettings({pageTitle:e.target.value})} /></Field>
      <div className="label">Favicon (optional)</div>
      {form.schema.settings.favicon
        ? (<div className="himg-preview"><img src={form.schema.settings.favicon} alt="" style={{width:24,height:24,borderRadius:4}} /><button className="btn sm ghost" onClick={()=>setSettings({favicon:null})}>Remove</button></div>)
        : (<label className="himg-upload"><input type="file" accept="image/*" style={{display:"none"}} onChange={(e)=>{ const f = e.target.files && e.target.files[0]; if (f) readImageScaled(f, 64, (u)=>{ if (!u){ toast("Could not read that image."); return; } setSettings({favicon:u}); }); e.target.value=""; }} /><span>Upload a favicon</span></label>)}
      <div style={{height:10}}></div>
      <Field label="Custom CSS (advanced)"><textarea className="textarea" style={{minHeight:120,fontFamily:"var(--mono)",fontSize:12}} placeholder=".fcard { border-radius: 0; } .submit { background: #111; }" value={form.schema.settings.customCss || ""} onChange={(e)=>setSettings({customCss:e.target.value})} /></Field>
      <div className="hint">Custom CSS applies to your public form only. Target classes such as .fcard, .ftitle, .fdesc, .opt, .finput, or .submit. The thank-you and closed screens use the same classes.</div>
      <div className="panel-section">Integrations</div>
      <Field label="Webhook URL (optional)"><input className="input" placeholder="https://hooks.example.com/..." value={form.schema.settings.webhookUrl || ""} onChange={(e)=>setSettings({webhookUrl:e.target.value})} /></Field>
      <div className="hint">On each submission we POST a JSON payload (event, responses, and metadata like UTM source and time to complete) to this URL.</div>
      {id && (
        <div style={{marginTop:18}}>
          <div className="panel-section">Danger zone</div>
          <button className="btn danger sm" onClick={del}>Delete form</button>
        </div>
      )}
    </div>
  );
}

function Builder({ formId }){
  const { navigate, toast, user, theme, toggleTheme } = useApp();
  const isNew = formId === "new";
  const [form, setForm] = useState(isNew ? blankForm() : null);
  const [id, setId] = useState(isNew ? null : formId);
  const [sel, setSel] = useState(null);
  const [mode, setMode] = useState("edit");
  const [preview, setPreview] = useState(false);
  const [saving, setSaving] = useState(false);
  const [savedAt, setSavedAt] = useState(null);
  const [tools, setTools] = useState(false);
  const [loadErr, setLoadErr] = useState(false);
  const [trash, setTrash] = useState([]);            // session only, never saved
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const [dragId, setDragId] = useState(null);
  const [chooser, setChooser] = useState(isNew);
  const [share, setShare] = useState(null);

  useEffect(()=>{
    if (isNew) return;
    api.getForm(formId).then(({ ok, data })=>{
      if (ok && data && data.form){ const f = normalizeForm(data.form); setForm(f); if (f.schema.questions[0]) setSel(f.schema.questions[0].id); }
      else setLoadErr(true);
    });
  },[formId, isNew]);

  const cardRefs = useRef({});
  const prevRects = useRef({});
  const flipSig = form ? (form.schema.questions || []).map((q)=>q.id).join(",") : "";
  useLayoutEffect(()=>{
    const refs = cardRefs.current;
    Object.keys(refs).forEach((qid)=>{
      const el = refs[qid]; if (!el) return;
      const prev = prevRects.current[qid];
      const rect = el.getBoundingClientRect();
      if (prev && qid !== dragId){
        const dy = prev.top - rect.top;
        if (Math.abs(dy) > 1){
          el.style.transition = "none";
          el.style.transform = "translateY(" + dy + "px)";
          requestAnimationFrame(()=>{ el.style.transition = "transform 210ms cubic-bezier(.2,.8,.2,1)"; el.style.transform = ""; });
        }
      }
    });
    const next = {};
    Object.keys(refs).forEach((qid)=>{ const el = refs[qid]; if (el) next[qid] = el.getBoundingClientRect(); });
    prevRects.current = next;
  }, [flipSig]);

  if (loadErr) return <FullMsg text="Form not found." onBack={()=>navigate("/dashboard")} />;
  if (!form) return <FullMsg text="Loading..." />;

  const questions = Array.isArray(form.schema.questions) ? form.schema.questions : [];
  const selQ = questions.find((q)=>q.id === sel) || null;

  const setTheme = (patch)=> setForm((f)=>({ ...f, theme:{ ...f.theme, ...patch } }));
  const setSettings = (patch)=> setForm((f)=>({ ...f, schema:{ ...f.schema, settings:{ ...f.schema.settings, ...patch } } }));
  const setQuestions = (qs)=> setForm((f)=>({ ...f, schema:{ ...f.schema, questions: (typeof qs === "function" ? qs(Array.isArray(f.schema.questions) ? f.schema.questions : []) : qs) } }));
  const addQ = (type)=>{ const q = QTYPES[type].make(); setQuestions(questions.concat([q])); setSel(q.id); setMode("edit"); };
  const updateQ = (qid, patch)=> setQuestions(questions.map((q)=> q.id === qid ? { ...q, ...patch } : q));
  const removeQ = (qid)=>{ const q = questions.find((x)=>x.id === qid); if (q) setTrash((t)=>[q, ...t]); setQuestions(questions.filter((x)=>x.id !== qid)); if (sel === qid) setSel(null); };
  const restoreQ = (tid)=>{ const q = trash.find((x)=>x.id === tid); if (!q) return; setTrash((t)=>t.filter((x)=>x.id !== tid)); setQuestions(questions.concat([q])); setSel(q.id); setMode("edit"); };
  const moveQ = (i, dir)=>{ const qs = questions.slice(); const j = i + dir; if (j < 0 || j >= qs.length) return; const t = qs[i]; qs[i] = qs[j]; qs[j] = t; setQuestions(qs); };
  const dupQ = (qid)=>{ const qs = questions.slice(); const idx = qs.findIndex((q)=>q.id === qid); const copy = { ...qs[idx], id: uid() }; qs.splice(idx + 1, 0, copy); setQuestions(qs); setSel(copy.id); };
  const reorder = (from, to)=>{ if (from === null || from === to) return; const qs = questions.slice(); const [m] = qs.splice(from, 1); qs.splice(to, 0, m); setQuestions(qs); };
  const moveById = (j)=>{ setQuestions((prev)=>{ const from = prev.findIndex((q)=>q.id === dragId); if (from === -1 || from === j) return prev; const a = prev.slice(); const [m] = a.splice(from, 1); a.splice(j, 0, m); return a; }); };
  const dnd = { draggingId: dragId, start: (i)=>setDragId(questions[i] ? questions[i].id : null), over_: (j)=>{ if (dragId != null) moveById(j); }, drop: ()=>setDragId(null), end: ()=>setDragId(null) };

  const del = ()=>{ if (!id) return; if (!window.confirm("Delete this form and all its responses? This cannot be undone.")) return; api.deleteForm(id).then(()=>{ toast("Form deleted"); navigate("/dashboard"); }); };

  const save = ()=>{
    setSaving(true);
    const payload = { title: form.title, description: form.description, theme: form.theme, schema: form.schema };
    const stamp = ()=> setSavedAt(new Date().toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" }));
    if (!id){
      api.createForm(payload).then(({ ok, data })=>{ setSaving(false); if (ok && data && data.id){ setId(data.id); if (data.slug) setForm((f)=>({ ...f, slug: data.slug })); window.history.replaceState({}, "", "/builder/" + data.id); stamp(); toast("Published"); } else toast("Save failed"); });
    } else {
      api.updateForm(id, payload).then(({ ok })=>{ setSaving(false); if (ok){ stamp(); toast("Saved"); } else toast("Save failed"); });
    }
  };

  const statusBadge = !id ? { cls:"closed", text:"Draft" } : (form.is_open ? { cls:"open", text:"Live" } : { cls:"closed", text:"Closed" });

  const copyLink = () => {
    if (!id){ toast("Publish your form first to get a shareable link."); return; }
    const slug = form.slug;
    if (!slug){ toast("Reopen this form from your dashboard to copy its link."); return; }
    const uname = form.username || (user && user.username) || "admin";
    const link = window.location.origin + "/" + (uname === "admin" ? "" : uname + "/") + slug;
    try { if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(link); } catch (e) {}
    toast("Link copied");
  };

  const openShare = () => {
    if (!id){ toast("Publish your form first to share it."); return; }
    const slug = form.slug; if (!slug){ toast("Reopen this form from your dashboard to share it."); return; }
    const uname = form.username || (user && user.username) || "admin";
    setShare(window.location.origin + "/" + (uname === "admin" ? "" : uname + "/") + slug);
  };

  return (
    <div className="builder">
      {chooser && (
        <div className="overlay" onClick={()=>setChooser(false)}>
          <div className="modal addq-modal" onClick={(e)=>e.stopPropagation()}>
            <div className="addq-modal-head"><div className="panel-title" style={{margin:0}}>Start your form</div><button className="iconbtn" onClick={()=>setChooser(false)} title="Close">×</button></div>
            <div className="addq-grid">
              <button className="addq-item" onClick={()=>setChooser(false)}><div className="t">Blank form</div><div className="h">Start from scratch</div></button>
              {FORM_TEMPLATES.map((t)=>(<button key={t.key} className="addq-item" onClick={()=>{ const f = t.build(); setForm(f); setSel(f.schema.questions[0] ? f.schema.questions[0].id : null); setMode("edit"); setChooser(false); }}><div className="t">{t.name}</div><div className="h">{t.desc}</div></button>))}
            </div>
          </div>
        </div>
      )}
      <div className="b-top">
        <div className="row" style={{gap:12}}>
          <button className="brand" onClick={()=>navigate("/dashboard")}><Logo size={26} /></button>
          <button className="themebtn" onClick={toggleTheme} title={theme === "dark" ? "Switch to light mode" : "Switch to dark mode"} aria-label="Toggle theme">{theme === "dark" ? <IconSun/> : <IconMoon/>}</button>
          <div className="b-tools">
            <button className="btn sm" onClick={()=>setTools((o)=>!o)}>Tools ▾</button>
            {tools && (
              <div className="menu">
                {id && <button onClick={()=>{ navigate("/dashboard/" + id); }}>View responses</button>}
                <button onClick={()=>{ setMode("theme"); setTools(false); }}>Theme</button>
                <button onClick={()=>{ setMode("settings"); setTools(false); }}>Form settings</button>
                {id && <button className="danger-text" onClick={()=>{ setTools(false); del(); }}>Delete form</button>}
              </div>
            )}
          </div>
          <span className="saved-note">{savedAt ? "Saved at " + savedAt : (id ? "Saved" : "Not saved yet")}</span>
          <span className={"badge " + statusBadge.cls}>{statusBadge.text}</span>
        </div>
        <div className="row">
          <button className="btn" onClick={()=>setPreview((p)=>!p)}>{preview ? "Edit" : "Preview"}</button>
          <button className="btn" onClick={openShare}>Share</button>
          <button className="btn primary" disabled={saving} onClick={save}>{saving ? "Saving..." : "Publish"}</button>
        </div>
      </div>

      {share && <ShareModal link={share} title={form.title} onClose={()=>setShare(null)} />}

      {preview ? (
        <div className="b-preview"><div style={{maxWidth:680, margin:"26px auto", padding:"0 18px"}}><FormRenderer form={form} preview /></div></div>
      ) : (
        <div className="b-main" onClick={()=>{ if (tools) setTools(false); }}>
          <div className="b-rail">
            <button className={mode === "edit" ? "active" : ""} title="Questions" onClick={()=>setMode("edit")}><IconList /></button>
            <button className={mode === "theme" ? "active" : ""} title="Theme" onClick={()=>setMode("theme")}><IconTheme /></button>
            <button className={mode === "brand" ? "active" : ""} title="Brand studio" onClick={()=>setMode("brand")}><IconBrand /></button>
            <button className={mode === "settings" ? "active" : ""} title="Form settings" onClick={()=>setMode("settings")}><IconCog /></button>
          </div>

          <div className="b-panel">
            {mode === "edit" && (selQ
              ? <LeftEditor q={selQ} update={(p)=>updateQ(selQ.id, p)} questions={questions} setQuestions={setQuestions} />
              : <div><div className="panel-title">Edit question</div><div className="muted" style={{fontSize:14}}>Select a question in the canvas to edit it here, or add a new question.</div></div>)}
            {mode === "theme" && <ThemePanel form={form} setTheme={setTheme} setSettings={setSettings} />}
            {mode === "brand" && <BrandStudio form={form} setTheme={setTheme} setSettings={setSettings} />}
            {mode === "settings" && <SettingsPanel form={form} setForm={setForm} setSettings={setSettings} id={id} del={del} />}
          </div>

          <div className="b-canvas">
            {mode === "theme" ? (
              <div style={{maxWidth:680,margin:"26px auto",padding:"0 18px"}}><FormRenderer form={form} preview /></div>
            ) : (
            <div className="b-canvas-inner">
              {form.schema.settings.headerImage && <img className="fheader-img" src={form.schema.settings.headerImage} alt="" style={{marginBottom:12}} />}
              <input className="canvas-title" value={form.title} placeholder="Untitled form" onChange={(e)=>setForm((f)=>({ ...f, title:e.target.value }))} />
              <div className="qblock">
                <div className="qblock-head">Default question block</div>
                <div className="qblock-body">
                  {questions.length === 0 && <div className="muted" style={{padding:"18px 4px"}}>No questions yet. Use Add new question below.</div>}
                  {questions.map((q, i)=>(
                    <CanvasCard key={q.id} q={q} index={i} selected={sel === q.id} dnd={dnd} cardRef={(el)=>{ if (el) cardRefs.current[q.id] = el; else delete cardRefs.current[q.id]; }}
                      onSelect={()=>{ setSel(q.id); setMode("edit"); }}
                      update={(p)=>updateQ(q.id, p)}
                      onDup={()=>dupQ(q.id)} onDel={()=>removeQ(q.id)} onUp={()=>moveQ(i, -1)} onDown={()=>moveQ(i, 1)} />
                  ))}
                </div>
                <div className="qblock-foot"><AddQuestionMenu onAdd={addQ} /></div>
              </div>

              <div className="endcard">
                <div className="mono" style={{fontSize:11,textTransform:"uppercase",letterSpacing:".05em",color:"var(--ink-soft)",fontWeight:700,marginBottom:8}}>End of form</div>
                <div style={{textAlign:"center",color:"var(--ink-soft)"}}>Thanks. Your response has been recorded.</div>
              </div>

              <div className="trashbox">
                <div className="trashbox-head">
                  <span className="t">Trash · {trash.length} question{trash.length === 1 ? "" : "s"}</span>
                  {trash.length > 0 && <button className="btn ghost sm" onClick={()=>setTrash([])}>Empty trash</button>}
                </div>
                {trash.length === 0
                  ? <div className="muted" style={{padding:"14px 16px",fontSize:13}}>Deleted questions land here for this session. They are cleared if you leave or refresh.</div>
                  : trash.map((q)=>(
                      <div className="trash-item" key={q.id}>
                        <span className="ti-label">{q.type === "page_break" ? "Page break" : q.type === "block" ? (q.title || "Section") : (q.label || q.heading || "Untitled question")}</span>
                        <span className="ti-type">{QTYPES[q.type] ? QTYPES[q.type].label : q.type}</span>
                        <button className="btn sm" onClick={()=>restoreQ(q.id)}>Restore</button>
                      </div>
                    ))}
              </div>
            </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function FormDashboard({ id }){
  const { navigate, toast, user } = useApp();
  const [form, setForm] = useState(null);
  const [tab, setTab] = useState("responses");
  const [loadErr, setLoadErr] = useState(false);
  const fetcher = useCallback((r)=>api.formSummary(id, r),[id]);
  useEffect(()=>{ api.getForm(id).then(({ok,data})=>{ if (ok && data && data.form) setForm(data.form); else setLoadErr(true); }); },[id]);

  if (loadErr) return (<div><TopNav/><div className="wrap page"><div className="empty card"><p>Form not found.</p></div></div></div>);
  if (!form) return (<div><TopNav/><div className="wrap page"><div className="muted">Loading...</div></div></div>);

  const url = form.username === "admin" ? window.location.origin + "/" + form.slug : window.location.origin + "/" + form.username + "/" + form.slug;
  const toggleOpen = ()=>{ const next = !form.is_open; setForm(f=>({...f, is_open: next})); api.updateForm(id, { is_open: next }).then(()=>toast(next ? "Form reopened" : "Form closed")); };
  const del = ()=>{ if (!window.confirm("Delete this form and all its responses? This cannot be undone.")) return; api.deleteForm(id).then(()=>{ toast("Form deleted"); navigate("/dashboard"); }); };

  return (
    <div>
      <TopNav/>
      <div className="wrap page">
        <button className="btn ghost sm" style={{marginBottom:14}} onClick={()=>navigate("/dashboard")}>← All forms</button>
        <div className="between" style={{marginBottom:6,flexWrap:"wrap",gap:10}}>
          <div className="row" style={{gap:12}}><h1 style={{fontSize:25}}>{form.title}</h1><span className={"badge "+(form.is_open?"open":"closed")}>{form.is_open?"Open":"Closed"}</span></div>
          <div className="row"><a className="btn sm" href={url} target="_blank" rel="noopener">View form</a><button className="btn sm" onClick={()=>navigate("/builder/"+id)}>Edit</button></div>
        </div>
        <div className="copyfield" style={{marginBottom:20,maxWidth:520}}><code>{url}</code><button className="btn sm" onClick={()=>{ if(navigator.clipboard) navigator.clipboard.writeText(url); toast("Link copied"); }}>Copy</button></div>

        <AiSummary fetcher={fetcher} />

        <div className="tabs">{["responses","analytics","settings"].map(t=>(<button key={t} className={"tab"+(tab===t?" active":"")} onClick={()=>setTab(t)}>{t[0].toUpperCase()+t.slice(1)}</button>))}</div>

        {tab==="responses" && <ResponsesTab id={id} form={form} />}
        {tab==="analytics" && <AnalyticsTab id={id} form={form} />}
        {tab==="settings" && (
          <div className="card pad-lg" style={{maxWidth:560}}>
            <div className="between" style={{marginBottom:8}}>
              <div><div style={{fontWeight:600}}>Accepting responses</div><div className="hint">When closed, the public link shows a closed message.</div></div>
              <Toggle checked={form.is_open} onChange={toggleOpen} label="" />
            </div>
            <hr style={{border:0,borderTop:"1px solid var(--line)",margin:"16px 0"}} />
            <div style={{fontWeight:600,marginBottom:8}}>Danger zone</div>
            <button className="btn danger" onClick={del}>Delete form</button>
          </div>
        )}
      </div>
    </div>
  );
}

function hexRgb(h){ h = String(h || "#5b4fe0").replace("#",""); if (h.length === 3) h = h.split("").map((c)=>c + c).join(""); const n = parseInt(h, 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }
function ensureJsPDF(){ return new Promise((res, rej)=>{ if (window.jspdf && window.jspdf.jsPDF) return res(); const sc = document.createElement("script"); sc.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"; sc.onload = ()=>res(); sc.onerror = ()=>rej(new Error("pdf_load")); document.head.appendChild(sc); }); }

function statLines(q, rows){
  const vals = rows.map((r)=>r.data[q.id]).filter((v)=> v !== undefined && v !== null && v !== "");
  const title = q.label || q.id;
  const type = QTYPES[q.type].label + " · " + vals.length + " answered";
  if (q.type === "multiple_choice"){
    const c = {}; q.options.forEach((o)=>c[o] = 0);
    rows.forEach((r)=>{ const v = r.data[q.id]; if (Array.isArray(v)) v.forEach((o)=>c[o] = (c[o] || 0) + 1); else if (v) c[v] = (c[v] || 0) + 1; });
    const e = Object.entries(c).sort((a,b)=>b[1] - a[1]);
    return { title, type, bars: e.map(([k,v])=>({ k, v })), lines: e.length ? ["Most selected: " + e[0][0] + " (" + e[0][1] + ")", "Least selected: " + e[e.length-1][0] + " (" + e[e.length-1][1] + ")"] : [] };
  }
  if (q.type === "rank_order"){
    const s = {}, n = {}; q.items.forEach((it)=>{ s[it] = 0; n[it] = 0; });
    rows.forEach((r)=>{ const a = r.data[q.id]; if (Array.isArray(a)) a.forEach((it,i)=>{ if (s[it] !== undefined){ s[it] += i + 1; n[it]++; } }); });
    const rank = q.items.map((it)=>({ it, avg: n[it] ? s[it] / n[it] : null })).filter((x)=>x.avg != null).sort((a,b)=>a.avg - b.avg);
    return { title, type, bars: [], lines: rank.length ? rank.map((x,i)=>(i + 1) + ". " + x.it + " (avg " + x.avg.toFixed(2) + ")") : ["No data"] };
  }
  if (q.type === "constant_sum"){
    const s = {}, n = {}; q.items.forEach((it)=>{ s[it] = 0; n[it] = 0; });
    rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object") q.items.forEach((it)=>{ const v = parseFloat(o[it]); if (!isNaN(v)){ s[it] += v; n[it]++; } }); });
    return { title, type, bars: q.items.map((it)=>({ k: it, v: n[it] ? Math.round(s[it] / n[it] * 10) / 10 : 0 })), lines: ["Average allocation, total " + q.total + (q.unit ? (" " + q.unit) : "")] };
  }
  if (q.type === "matrix"){
    return { title, type, bars: [], lines: q.rows.map((row)=>{ const c = {}; rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object"){ const a = o[row]; (Array.isArray(a) ? a : [a]).forEach((x)=>{ if (x) c[x] = (c[x] || 0) + 1; }); } }); const top = Object.entries(c).sort((a,b)=>b[1] - a[1])[0]; return row + ": " + (top ? top[0] + " (" + top[1] + ")" : "no data"); }) };
  }
  if (q.type === "star_rating"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n)); const avg = nums.length ? nums.reduce((a,b)=>a + b, 0) / nums.length : 0;
    const bars = []; for (let k = 1; k <= q.max; k++) bars.push({ k: k + " star", v: nums.filter((n)=>n === k).length });
    return { title, type, bars, lines: ["Average: " + avg.toFixed(2) + " / " + q.max] };
  }
  if (q.type === "slider"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n)); const avg = nums.length ? nums.reduce((a,b)=>a + b, 0) / nums.length : 0;
    return { title, type, bars: [], lines: nums.length ? ["Average: " + avg.toFixed(1), "Min " + Math.min(...nums) + ", Max " + Math.max(...nums)] : ["No data"] };
  }
  if (q.type === "nps"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n)); const N = nums.length || 1; const p = nums.filter((x)=>x >= 9).length, d = nums.filter((x)=>x <= 6).length, ps = nums.filter((x)=>x === 7 || x === 8).length;
    return { title, type, bars: [], lines: ["NPS: " + (nums.length ? Math.round((p / N - d / N) * 100) : "-"), "Promoters " + p + ", Passives " + ps + ", Detractors " + d] };
  }
  if (q.type === "date"){
    const ds = vals.map(String).filter(Boolean).sort();
    return { title, type, bars: [], lines: ds.length ? ["Earliest " + ds[0] + ", latest " + ds[ds.length-1]] : ["No data"] };
  }
  if (q.type === "signature") return { title, type, bars: [], lines: [vals.length + " signed"] };
  return { title, type, bars: [], lines: [vals.length + " text response" + (vals.length === 1 ? "" : "s")] };
}

function svgToPng(svg, color, widthPx){
  return new Promise((resolve)=>{
    try {
      const s = svg.replace(/currentColor/g, color).replace('style="height:100%;width:auto;display:block"', 'width="750" height="225"');
      const src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(s)));
      const img = new Image();
      img.onload = ()=>{ try {
        const ratio = (img.height && img.width) ? img.height / img.width : 0.3;
        const w = widthPx, h = Math.round(widthPx * ratio);
        const c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve({ data: c.toDataURL("image/png"), w, h });
      } catch (e) { resolve(null); } };
      img.onerror = ()=>resolve(null);
      img.src = src;
    } catch (e) { resolve(null); }
  });
}

async function fetchFontB64(url){
  const blob = await fetch(url).then((r)=>{ if (!r.ok) throw new Error("font " + r.status); return r.blob(); });
  return await new Promise((res, rej)=>{ const fr = new FileReader(); fr.onload = ()=>res(String(fr.result).split(",")[1]); fr.onerror = ()=>rej(new Error("font_read")); fr.readAsDataURL(blob); });
}
const PDF_FONT_FILES = {
  sans: { family:"Figtree", reg:"https://cdn.jsdelivr.net/npm/@expo-google-fonts/figtree/Figtree_400Regular.ttf", bold:"https://cdn.jsdelivr.net/npm/@expo-google-fonts/figtree/Figtree_700Bold.ttf" },
  slab: { family:"RobotoSlab", reg:"https://cdn.jsdelivr.net/npm/@expo-google-fonts/roboto-slab/RobotoSlab_400Regular.ttf", bold:"https://cdn.jsdelivr.net/npm/@expo-google-fonts/roboto-slab/RobotoSlab_700Bold.ttf" },
  zetetiq: { family:"MozillaText", reg:"https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/mozillatext/MozillaText%5Bwght%5D.ttf", bold:null },
};
async function loadPdfFonts(doc, key){
  const builtin = { serif:"times", mono:"courier" };
  if (builtin[key]) return { family: builtin[key] };
  const f = PDF_FONT_FILES[key] || PDF_FONT_FILES.sans;
  try {
    const regFile = f.family + "-R.ttf";
    doc.addFileToVFS(regFile, await fetchFontB64(f.reg));
    doc.addFont(regFile, f.family, "normal");
    let boldFile = regFile;
    if (f.bold){ try { boldFile = f.family + "-B.ttf"; doc.addFileToVFS(boldFile, await fetchFontB64(f.bold)); } catch (e) { boldFile = regFile; } }
    doc.addFont(boldFile, f.family, "bold");
    return { family: f.family };
  } catch (e){ return { family: "helvetica" }; }
}

function imgDims(src){
  return new Promise((res)=>{
    try {
      const im = new Image(); let done = false;
      const finish = ()=>{ if (done) return; done = true; res({ w: im.naturalWidth || im.width || 300, h: im.naturalHeight || im.height || 120 }); };
      im.onload = finish; im.onerror = ()=>{ if (!done){ done = true; res({ w: 300, h: 120 }); } };
      im.src = src;
      setTimeout(finish, 2500);
    } catch (e){ res({ w: 300, h: 120 }); }
  });
}
async function drawExportLogo(doc, form, W, M){
  const hdr = (form.schema && form.schema.settings && form.schema.settings.headerImage) || null;
  if (hdr){
    try {
      const d = await imgDims(hdr);
      const maxW = 120, maxH = 46;
      let lw = maxW, lh = lw * (d.h / d.w);
      if (lh > maxH){ lh = maxH; lw = lh * (d.w / d.h); }
      const fmt = hdr.indexOf("image/png") >= 0 ? "PNG" : "JPEG";
      const pad = 6, cy = 18, cx = W - M - lw - pad * 2;
      doc.setFillColor(255, 255, 255); doc.roundedRect(cx, cy, lw + pad * 2, lh + pad * 2, 5, 5, "F");
      doc.addImage(hdr, fmt, cx + pad, cy + pad, lw, lh);
      return;
    } catch (e){}
  }
  let logo = null; try { logo = await svgToPng(LOGO_SVG, "#ffffff", 150); } catch (e){}
  if (logo && logo.data){ const lw = 92, lh = lw * (logo.h / logo.w); doc.addImage(logo.data, "PNG", W - M - lw, 22, lw, lh); }
}

async function exportReport(form, rows){
  await ensureJsPDF();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"pt", format:"a4" });
  const W = doc.internal.pageSize.getWidth();

  const ensure = (y, need)=>{ if (y + need > H - 40){ doc.addPage(); return 56; } return y; };
  doc.setFillColor(pr,pg,pb); doc.rect(0,0,W,82,"F");
  await drawExportLogo(doc, form, W, M);
  doc.setTextColor(255,255,255); doc.setFont(ff,"bold"); doc.setFontSize(20);
  doc.text((form.title || "Form").slice(0,42), M, 40);
  doc.setFont(ff,"normal"); doc.setFontSize(11); doc.text("Response report", M, 60);
  doc.setFontSize(10); doc.text(new Date().toLocaleDateString(), M, 74);
  let y = 116;
  doc.setTextColor.apply(doc, ink); doc.setFont(ff,"bold"); doc.setFontSize(13);
  doc.text("Total responses: " + rows.length, M, y); y += 24;

  const inputQs = (form.schema.questions || []).filter((q)=> QTYPES[q.type] && QTYPES[q.type].isInput && q.type !== "hidden_field");
  inputQs.forEach((q)=>{
    const st = statLines(q, rows);
    y = ensure(y, 44);
    doc.setFont(ff,"bold"); doc.setFontSize(11.5); doc.setTextColor.apply(doc, ink);
    doc.text(st.title.slice(0,70), M, y); y += 13;
    doc.setFont(ff,"normal"); doc.setFontSize(8.5); doc.setTextColor.apply(doc, soft);
    doc.text(st.type, M, y); y += 14;
    doc.setFontSize(9.5);
    if (st.bars && st.bars.length){
      const maxv = Math.max(1, ...st.bars.map((b)=>b.v));
      st.bars.slice(0,10).forEach((b)=>{
        y = ensure(y, 16);
        doc.setTextColor.apply(doc, ink); doc.text(String(b.k).slice(0,34), M, y + 8);
        const bx = 250, bw = W - M - bx - 36;
        doc.setFillColor.apply(doc, track); doc.rect(bx, y, bw, 9, "F");
        doc.setFillColor(ar,ag,ab); doc.rect(bx, y, Math.max(0, bw * (b.v / maxv)), 9, "F");
        doc.setTextColor.apply(doc, ink); doc.text(String(b.v), W - M, y + 8, { align:"right" });
        y += 16;
      });
    }
    (st.lines || []).forEach((ln)=>{ y = ensure(y, 14); doc.setTextColor.apply(doc, soft); doc.text("- " + ln, M, y + 8); y += 14; });
    y += 12;
  });

  const tally = (key)=>{ const c = {}; rows.forEach((r)=>{ const v = (r.meta && r.meta[key]) || "Unknown"; c[v] = (c[v] || 0) + 1; }); return Object.entries(c).sort((a,b)=>b[1] - a[1]).slice(0,6); };
  [["Top countries", tally("country")], ["Browsers", tally("browser")]].forEach(([label, list])=>{
    if (!list.length) return;
    y = ensure(y, 30);
    doc.setFont(ff,"bold"); doc.setFontSize(11.5); doc.setTextColor.apply(doc, ink); doc.text(label, M, y); y += 14;
    doc.setFont(ff,"normal"); doc.setFontSize(9.5);
    list.forEach(([k,v])=>{ y = ensure(y, 14); doc.setTextColor.apply(doc, soft); doc.text("- " + k + ": " + v, M, y + 8); y += 14; });
    y += 8;
  });

  doc.setFont(ff,"normal"); doc.setFontSize(9); doc.setTextColor.apply(doc, soft);
  doc.text("powered by zetetiq", M, H - 24);
  doc.save((form.title || "form").replace(/[^a-z0-9]+/gi, "-").toLowerCase() + "-report.pdf");
}

function answerText(v){
  if (v === null || v === undefined || v === "") return "No answer";
  if (Array.isArray(v)) return v.length ? v.join(", ") : "No answer";
  if (typeof v === "object") return Object.keys(v).map((k)=> k + ": " + (Array.isArray(v[k]) ? v[k].join("/") : v[k])).join("; ");
  return String(v);
}
