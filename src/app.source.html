function Builder({ formId }){
  const { navigate, toast, user, theme, toggleTheme } = useApp();
  const isNew = formId === "new";
  const newKind = (()=>{ if (formId !== "new") return null; try { return new URLSearchParams(window.location.search).get("kind"); } catch (e) { return null; } })();
  const [form, setForm] = useState(isNew ? blankForm(newKind) : null);
  const [id, setId] = useState(isNew ? null : formId);
  const [sel, setSel] = useState(null);
  const [mode, setMode] = useState("edit");
  const [preview, setPreview] = useState(false);
  const [saving, setSaving] = useState(false);
  const [savedAt, setSavedAt] = useState(null);
  const [tools, setTools] = useState(false);
  const [loadErr, setLoadErr] = useState(false);
  const [trash, setTrash] = useState([]);            // session only, never saved
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const [dragId, setDragId] = useState(null);
  const dragSess = useRef(null);
  const suppressFlip = useRef(false);
  const [chooser, setChooser] = useState(isNew);
  const [share, setShare] = useState(null);

  useEffect(()=>{
    if (isNew) return;
    api.getForm(formId).then(({ ok, data })=>{
      if (ok && data && data.form){ const f = normalizeForm(data.form); setForm(f); if (f.schema.questions[0]) setSel(f.schema.questions[0].id); }
      else setLoadErr(true);
    });
  },[formId, isNew]);

  const cardRefs = useRef({});
  const prevRects = useRef({});
  const flipSig = form ? (form.schema.questions || []).map((q)=>q.id).join(",") : "";
  useLayoutEffect(()=>{
    const refs = cardRefs.current;
    if (suppressFlip.current){ suppressFlip.current = false; const n = {}; Object.keys(refs).forEach((qid)=>{ const el = refs[qid]; if (el) n[qid] = el.getBoundingClientRect(); }); prevRects.current = n; return; }
    Object.keys(refs).forEach((qid)=>{
      const el = refs[qid]; if (!el) return;
      const prev = prevRects.current[qid];
      const rect = el.getBoundingClientRect();
      if (prev && qid !== dragId){
        const dy = prev.top - rect.top;
        if (Math.abs(dy) > 1){
          el.style.transition = "none";
          el.style.transform = "translateY(" + dy + "px)";
          requestAnimationFrame(()=>{ el.style.transition = "transform 210ms cubic-bezier(.2,.8,.2,1)"; el.style.transform = ""; });
        }
      }
    });
    const next = {};
    Object.keys(refs).forEach((qid)=>{ const el = refs[qid]; if (el) next[qid] = el.getBoundingClientRect(); });
    prevRects.current = next;
  }, [flipSig]);

  if (loadErr) return <FullMsg text="Form not found." onBack={()=>navigate("/dashboard")} />;
  if (!form) return <LoadingLogo full />;

  const questions = Array.isArray(form.schema.questions) ? form.schema.questions : [];
  const selQ = questions.find((q)=>q.id === sel) || null;

  const setTheme = (patch)=> setForm((f)=>({ ...f, theme:{ ...f.theme, ...patch } }));
  const setSettings = (patch)=> setForm((f)=>({ ...f, schema:{ ...f.schema, settings:{ ...f.schema.settings, ...patch } } }));
  const setQuestions = (qs)=> setForm((f)=>({ ...f, schema:{ ...f.schema, questions: (typeof qs === "function" ? qs(Array.isArray(f.schema.questions) ? f.schema.questions : []) : qs) } }));
  const addQ = (type, mods)=>{ const q = QTYPES[type].make(); if (mods) Object.assign(q, mods); setQuestions(questions.concat([q])); setSel(q.id); setMode("edit"); };
  const updateQ = (qid, patch)=> setQuestions(questions.map((q)=> q.id === qid ? { ...q, ...patch } : q));
  const removeQ = (qid)=>{ const q = questions.find((x)=>x.id === qid); if (q) setTrash((t)=>[q, ...t]); setQuestions(questions.filter((x)=>x.id !== qid)); if (sel === qid) setSel(null); };
  const restoreQ = (tid)=>{ const q = trash.find((x)=>x.id === tid); if (!q) return; setTrash((t)=>t.filter((x)=>x.id !== tid)); setQuestions(questions.concat([q])); setSel(q.id); setMode("edit"); };
  const moveQ = (i, dir)=>{ const qs = questions.slice(); const j = i + dir; if (j < 0 || j >= qs.length) return; const t = qs[i]; qs[i] = qs[j]; qs[j] = t; setQuestions(qs); };
  const dupQ = (qid)=>{ const qs = questions.slice(); const idx = qs.findIndex((q)=>q.id === qid); if (idx < 0) return; let copy; try { copy = JSON.parse(JSON.stringify(qs[idx])); } catch (e) { copy = { ...qs[idx] }; } copy.id = uid(); ["fields","slots","hosts","reminders","attributes","options"].forEach((kk)=>{ if (Array.isArray(copy[kk])) copy[kk] = copy[kk].map((it)=> (it && typeof it === "object" && ("id" in it)) ? { ...it, id: uid() } : it); }); qs.splice(idx + 1, 0, copy); setQuestions(qs); setSel(copy.id); };
  const reorder = (from, to)=>{ if (from === null || from === to) return; const qs = questions.slice(); const [m] = qs.splice(from, 1); qs.splice(to, 0, m); setQuestions(qs); };
  const applyShifts = (D, dropTo)=>{
    const H = D.height;
    D.list.forEach((q, i)=>{ if (i === D.fromIdx) return; const el = cardRefs.current[q.id]; if (!el) return;
      const removeUp = (i > D.fromIdx) ? -H : 0; const eff = (i < D.fromIdx) ? i : i - 1; const insertDown = (eff >= dropTo) ? H : 0; const sh = removeUp + insertDown;
      el.style.transform = sh ? ("translateY(" + sh + "px)") : ""; });
  };
  const onDragMove = (e)=>{
    const D = dragSess.current; if (!D) return;
    const py = e.touches ? e.touches[0].clientY : e.clientY;
    const el = cardRefs.current[D.id]; if (el) el.style.transform = "translateY(" + (py - D.grabDy - D.fromTop) + "px)";
    const dc = py - D.grabDy + D.height / 2;
    let above = 0; for (let i = 0; i < D.centers.length; i++){ if (i === D.fromIdx) continue; if (D.centers[i] < dc) above++; }
    if (above !== D.dropTo){ D.dropTo = above; applyShifts(D, above); }
  };
  const onDragUp = ()=>{
    const D = dragSess.current;
    window.removeEventListener("pointermove", onDragMove); window.removeEventListener("pointerup", onDragUp);
    if (!D) return;
    D.list.forEach((q)=>{ const el = cardRefs.current[q.id]; if (el){ el.style.transition = "none"; el.style.transform = ""; } });
    suppressFlip.current = true; dragSess.current = null; setDragId(null);
    reorder(D.fromIdx, D.dropTo);
    requestAnimationFrame(()=>{ D.list.forEach((q)=>{ const el = cardRefs.current[q.id]; if (el) el.style.transition = ""; }); });
  };
  const beginDrag = (e, index)=>{
    if (e.button != null && e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();
    const list = questions;
    const centers = list.map((q)=>{ const el = cardRefs.current[q.id]; if (!el) return 0; const r = el.getBoundingClientRect(); return r.top + r.height / 2; });
    const el0 = cardRefs.current[list[index].id]; const r0 = el0 ? el0.getBoundingClientRect() : { top:0, height:0 };
    if (el0) el0.style.transition = "none";
    dragSess.current = { id: list[index].id, fromIdx: index, dropTo: index, grabDy: e.clientY - r0.top, fromTop: r0.top, height: r0.height, centers, list };
    setDragId(list[index].id);
    window.addEventListener("pointermove", onDragMove); window.addEventListener("pointerup", onDragUp);
  };
  const dnd = { draggingId: dragId, beginDrag };

  const del = ()=>{ if (!id) return; if (!window.confirm("Delete this form and all its responses? This cannot be undone.")) return; api.deleteForm(id).then(()=>{ toast("Form deleted"); navigate("/dashboard"); }); };

  const save = ()=>{
    setSaving(true);
    const payload = { title: form.title, description: form.description, theme: form.theme, schema: form.schema };
    const stamp = ()=> setSavedAt(new Date().toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" }));
    if (!id){
      api.createForm(payload).then(({ ok, data })=>{ setSaving(false); if (ok && data && data.id){ setId(data.id); if (data.slug) setForm((f)=>({ ...f, slug: data.slug })); window.history.replaceState({}, "", "/builder/" + data.id); stamp(); toast("Published"); } else if (data && data.error === "plan_limit") toast("You have reached your plan limit of " + (data.max||5) + " forms. Upgrade to create more."); else toast("Save failed"); });
    } else {
      api.updateForm(id, payload).then(({ ok })=>{ setSaving(false); if (ok){ stamp(); toast("Saved"); } else toast("Save failed"); });
    }
  };

  const statusBadge = !id ? { cls:"closed", text:"Draft" } : (form.is_open ? { cls:"open", text:"Live" } : { cls:"closed", text:"Closed" });

  const copyLink = () => {
    if (!id){ toast("Publish your form first to get a shareable link."); return; }
    const slug = form.slug;
    if (!slug){ toast("Reopen this form from your dashboard to copy its link."); return; }
    const uname = form.username || (user && user.username) || "admin";
    const link = window.location.origin + "/" + (uname === "admin" ? "" : uname + "/") + slug;
    try { if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(link); } catch (e) {}
    toast("Link copied");
  };

  const openShare = () => {
    if (!id){ toast("Publish your form first to share it."); return; }
    const slug = form.slug; if (!slug){ toast("Reopen this form from your dashboard to share it."); return; }
    const uname = form.username || (user && user.username) || "admin";
    setShare(window.location.origin + "/" + (uname === "admin" ? "" : uname + "/") + slug);
  };

  return (
    <div className="builder">
      {chooser && (
        <div className="overlay" onClick={()=>setChooser(false)}>
          <div className="modal addq-modal" onClick={(e)=>e.stopPropagation()}>
            <div className="addq-modal-head"><div className="panel-title" style={{margin:0}}>Start your form</div><button className="iconbtn" onClick={()=>setChooser(false)} title="Close">×</button></div>
            <div className="addq-grid">
              <button className="addq-item" onClick={()=>setChooser(false)}><div className="t">Blank form</div><div className="h">Start from scratch</div></button>
              {FORM_TEMPLATES.map((t)=>(<button key={t.key} className="addq-item" onClick={()=>{ const f = t.build(); setForm(f); setSel(f.schema.questions[0] ? f.schema.questions[0].id : null); setMode("edit"); setChooser(false); }}><div className="t">{t.name}</div><div className="h">{t.desc}</div></button>))}
            </div>
          </div>
        </div>
      )}
      <div className="b-top">
        <div className="row" style={{gap:12}}>
          <button className="brand" onClick={()=>navigate("/dashboard")}><Logo size={26} /></button>
          <button className="themebtn" onClick={toggleTheme} title={theme === "dark" ? "Switch to light mode" : "Switch to dark mode"} aria-label="Toggle theme">{theme === "dark" ? <IconSun/> : <IconMoon/>}</button>
          <div className="b-tools">
            <button className="btn sm" onClick={()=>setTools((o)=>!o)}>Tools ▾</button>
            {tools && (
              <div className="menu">
                {id && <button onClick={()=>{ navigate("/dashboard/" + id); }}>View responses</button>}
                <button onClick={()=>{ setMode("schedule"); setTools(false); }}>Scheduler</button>
                <button onClick={()=>{ setMode("esign"); setTools(false); }}>E-sign</button>
                <button onClick={()=>{ setMode("theme"); setTools(false); }}>Theme</button>
                <button onClick={()=>{ setMode("settings"); setTools(false); }}>Form settings</button>
                <button onClick={()=>{ setMode("i18n"); setTools(false); }}>Translations</button>
                {id && <button className="danger-text" onClick={()=>{ setTools(false); del(); }}>Delete form</button>}
              </div>
            )}
          </div>
          <span className="saved-note">{savedAt ? "Saved at " + savedAt : (id ? "Saved" : "Not saved yet")}</span>
          <span className={"badge " + statusBadge.cls}>{statusBadge.text}</span>
        </div>
        <div className="row">
          <button className="btn" onClick={()=>setPreview((p)=>!p)}>{preview ? "Edit" : "Preview"}</button>
          <button className="btn" onClick={openShare}>Share</button>
          <button className="btn primary" disabled={saving} onClick={save}>{saving ? "Saving..." : "Publish"}</button>
        </div>
      </div>

      {share && <ShareModal link={share} title={form.title} onClose={()=>setShare(null)} />}

      {preview ? (
        <div className="b-preview"><div style={{maxWidth:680, margin:"26px auto", padding:"0 18px"}}><FormRenderer form={form} preview /></div></div>
      ) : (
        <div className="b-main" onClick={()=>{ if (tools) setTools(false); }}>
          <div className="b-rail">
            <button className={mode === "edit" ? "active" : ""} title="Questions" onClick={()=>setMode("edit")}><IconList /></button>
            <button className={mode === "schedule" ? "active" : ""} title="Scheduler" onClick={()=>setMode("schedule")}><IconCalendar /></button>
            <button className={mode === "esign" ? "active" : ""} title="E-sign" onClick={()=>setMode("esign")}><IconPen /></button>
            <button className={mode === "theme" ? "active" : ""} title="Theme" onClick={()=>setMode("theme")}><IconTheme /></button>
            <button className={mode === "brand" ? "active" : ""} title="Brand studio" onClick={()=>setMode("brand")}><IconBrand /></button>
            <button className={mode === "settings" ? "active" : ""} title="Form settings" onClick={()=>setMode("settings")}><IconCog /></button>
          </div>

          <div className="b-panel">
            {mode === "edit" && (selQ
              ? <LeftEditor q={selQ} update={(p)=>updateQ(selQ.id, p)} questions={questions} setQuestions={setQuestions} scoring={!!(form.schema.settings && form.schema.settings.scoring)} experiment={form.schema.settings && form.schema.settings.experiment ? { on:true, count: Math.max(2, Math.min(8, parseInt(form.schema.settings.variantCount, 10) || 2)) } : { on:false, count:2 }} />
              : <div><div className="panel-title">Edit question</div><div className="muted" style={{fontSize:14}}>Select a question in the canvas to edit it here, or add a new question.</div></div>)}
            {mode === "theme" && <ThemePanel form={form} setTheme={setTheme} setSettings={setSettings} />}
            {mode === "brand" && <BrandStudio form={form} setTheme={setTheme} setSettings={setSettings} />}
            {mode === "settings" && <SettingsPanel form={form} setForm={setForm} setSettings={setSettings} id={id} del={del} />}
            {mode === "schedule" && <SchedulerPanel form={form} questions={questions} updateQ={updateQ} setQuestions={setQuestions} setSel={setSel} setMode={setMode} />}
            {mode === "esign" && <EsignPanel form={form} questions={questions} updateQ={updateQ} setQuestions={setQuestions} setSel={setSel} setMode={setMode} />}
          </div>

          <div className="b-canvas">
            {(mode === "theme" || mode === "schedule" || mode === "esign") ? (
              <div style={{maxWidth:680,margin:"26px auto",padding:"0 18px"}}><FormRenderer form={form} preview /></div>
            ) : (
            <div className="b-canvas-inner">
              {form.schema.settings.headerImage && <img className="fheader-img" src={form.schema.settings.headerImage} alt="" style={{marginBottom:12}} />}
              <input className="canvas-title" value={form.title} placeholder="Untitled form" onChange={(e)=>setForm((f)=>({ ...f, title:e.target.value }))} />
              <div className="qblock">

                <div className="qblock-body">
                  {questions.length === 0 && <div className="muted" style={{padding:"18px 4px"}}>No questions yet. Use Add new question below.</div>}
                  {questions.map((q, i)=>(
                    <CanvasCard key={q.id} q={q} index={i} selected={sel === q.id} dnd={dnd} cardRef={(el)=>{ if (el) cardRefs.current[q.id] = el; else delete cardRefs.current[q.id]; }}
                      onSelect={()=>{ setSel(q.id); setMode("edit"); }}
                      update={(p)=>updateQ(q.id, p)}
                      onDup={()=>dupQ(q.id)} onDel={()=>removeQ(q.id)} onUp={()=>moveQ(i, -1)} onDown={()=>moveQ(i, 1)} />
                  ))}
                </div>
                <div className="qblock-foot"><AddQuestionMenu onAdd={addQ} /></div>
              </div>

              <div className="endcard">
                <div className="mono" style={{fontSize:11,textTransform:"uppercase",letterSpacing:".05em",color:"var(--ink-soft)",fontWeight:700,marginBottom:8}}>End of form</div>
                <div style={{textAlign:"center",color:"var(--ink-soft)"}}>Thanks. Your response has been recorded.</div>
              </div>

              <div className="trashbox">
                <div className="trashbox-head">
                  <span className="t">Trash · {trash.length} question{trash.length === 1 ? "" : "s"}</span>
                  {trash.length > 0 && <button className="btn ghost sm" onClick={()=>setTrash([])}>Empty trash</button>}
                </div>
                {trash.length === 0
                  ? <div className="muted" style={{padding:"14px 16px",fontSize:13}}>Deleted questions land here for this session. They are cleared if you leave or refresh.</div>
                  : trash.map((q)=>(
                      <div className="trash-item" key={q.id}>
                        <span className="ti-label">{q.type === "page_break" ? "Page break" : q.type === "block" ? (q.title || "Section") : (q.label || q.heading || "Untitled question")}</span>

                        <button className="btn sm" onClick={()=>restoreQ(q.id)}>Restore</button>
                      </div>
                    ))}
              </div>
            </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

            </div>
            <hr style={{border:0,borderTop:"1px solid var(--line)",margin:"16px 0"}} />
            <div style={{fontWeight:600,marginBottom:8}}>Danger zone</div>
            <button className="btn danger" onClick={del}>Delete form</button>
          </div>
        )}
      </div>
    </div>
  );
}

function hexRgb(h){ h = String(h || "#5C88CD").replace("#",""); if (h.length === 3) h = h.split("").map((c)=>c + c).join(""); const n = parseInt(h, 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }
function _ch(n){ n = Math.max(0, Math.min(255, Math.round(n))); return n.toString(16).padStart(2, "0"); }
function darkenHex(h, amt){ const [r,g,b] = hexRgb(h); const f = 1 - amt; return "#" + _ch(r*f) + _ch(g*f) + _ch(b*f); }
function lightenHex(h, amt){ const [r,g,b] = hexRgb(h); return "#" + _ch(r+(255-r)*amt) + _ch(g+(255-g)*amt) + _ch(b+(255-b)*amt); }
function esignLoadImg(src){ return new Promise((res, rej)=>{ const im = new window.Image(); im.onload = ()=>res(im); im.onerror = ()=>rej(new Error("img")); im.src = src; }); }
function esignDrawField(ctx, f, W, H, sigImg){
  const sz = esignSize(f);
  const cx = (f.x/100)*W, cy = (f.y/100)*H;
  const fw = (sz.w/100)*W, fh = (sz.h/100)*W;
  const x0 = cx - fw/2, y0 = cy - fh/2, v = f._v;
  ctx.fillStyle = "#141414"; ctx.strokeStyle = "#141414"; ctx.textBaseline = "middle";
  if (f.kind === "text" || f.kind === "long" || f.kind === "date"){
    if (v){ ctx.font = "500 " + Math.max(11, Math.round(fh*0.62)) + "px 'Inter',Arial,sans-serif"; ctx.fillText(String(v), x0 + Math.max(2, fw*0.03), cy, fw*0.96); }
  } else if (f.kind === "check"){
    if (v){ ctx.lineWidth = Math.max(2, fw*0.1); ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.beginPath(); ctx.moveTo(x0 + fw*0.18, cy + fh*0.02); ctx.lineTo(x0 + fw*0.42, y0 + fh*0.74); ctx.lineTo(x0 + fw*0.82, y0 + fh*0.22); ctx.stroke(); }
  } else if (f.kind === "x"){
    if (v){ ctx.lineWidth = Math.max(2, fw*0.1); ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(x0 + fw*0.2, y0 + fh*0.2); ctx.lineTo(x0 + fw*0.8, y0 + fh*0.8); ctx.moveTo(x0 + fw*0.8, y0 + fh*0.2); ctx.lineTo(x0 + fw*0.2, y0 + fh*0.8); ctx.stroke(); }
  } else if (f.kind === "circle"){
    if (v){ ctx.lineWidth = Math.max(2, fw*0.06); ctx.beginPath(); if (ctx.ellipse) ctx.ellipse(cx, cy, (fw/2)*0.92, (fh/2)*0.92, 0, 0, Math.PI*2); ctx.stroke(); }
  } else if (f.kind === "signature"){
    if (sigImg){ const r = Math.min(fw/sigImg.width, fh/sigImg.height) || 1; const dw = sigImg.width*r, dh = sigImg.height*r; ctx.drawImage(sigImg, cx - dw/2, cy - dh/2, dw, dh); }
    else if (v && v.mode === "type" && v.text){ ctx.font = Math.max(14, Math.round(fh*0.85)) + "px 'Monsieur La Doulaise',cursive"; ctx.fillText(v.text, x0 + fw*0.02, cy, fw*0.96); }
  }
}
async function downloadFilledDoc(q, val, fileName){
  await ensureJsPDF();
  try { if (document.fonts && document.fonts.load) await document.fonts.load("40px 'Monsieur La Doulaise'"); } catch (e) {}
  const jsPDFc = window.jspdf.jsPDF;
  const data = (val && val.fields) || {};
  const fields = (q.fields || []).filter((f)=> typeof f.x === "number" && typeof f.y === "number").map((f)=> Object.assign({}, f, { _v: data[f.id] }));
  const sigImgs = {};
  await Promise.all(fields.filter((f)=> f.kind === "signature" && typeof data[f.id] === "string" && data[f.id].indexOf("data:") === 0).map((f)=> esignLoadImg(data[f.id]).then((im)=>{ sigImgs[f.id] = im; }).catch(()=>{})));
  const name = (String(fileName || "document").replace(/[^a-z0-9_-]+/ig, "_").slice(0, 60)) || "document";
  if (q.documentKind === "pdf"){
    const lib = await loadPdfJs();
    const pdfDoc = await lib.getDocument(q.document).promise;
    let out = null;
    for (let i = 0; i < pdfDoc.numPages; i++){
      const page = await pdfDoc.getPage(i + 1);
      const vp = page.getViewport({ scale: 2 });
      const canvas = document.createElement("canvas"); canvas.width = Math.round(vp.width); canvas.height = Math.round(vp.height);
      const ctx = canvas.getContext("2d");
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      fields.filter((f)=> (f.page || 0) === i).forEach((f)=> esignDrawField(ctx, f, canvas.width, canvas.height, sigImgs[f.id]));
      const orient = canvas.width >= canvas.height ? "l" : "p";
      if (!out) out = new jsPDFc({ unit: "px", format: [canvas.width, canvas.height], orientation: orient });
      else out.addPage([canvas.width, canvas.height], orient);
      out.addImage(canvas.toDataURL("image/jpeg", 0.9), "JPEG", 0, 0, canvas.width, canvas.height);
    }
    if (out) out.save(name + ".pdf");
  } else {
    const img = await esignLoadImg(q.document);
    let W = img.naturalWidth || img.width, H = img.naturalHeight || img.height;
    const cap = 1600; if (W > cap){ const sc = cap/W; W = Math.round(W*sc); H = Math.round(H*sc); }
    const canvas = document.createElement("canvas"); canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, W, H);
    fields.forEach((f)=> esignDrawField(ctx, f, W, H, sigImgs[f.id]));
    const orient = W >= H ? "l" : "p";
    const out = new jsPDFc({ unit: "px", format: [W, H], orientation: orient });
    out.addImage(canvas.toDataURL("image/jpeg", 0.92), "JPEG", 0, 0, W, H);
    out.save(name + ".pdf");
  }
}

function ensureJsPDF(){ return new Promise((res, rej)=>{ if (window.jspdf && window.jspdf.jsPDF) return res(); const sc = document.createElement("script"); sc.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"; sc.onload = ()=>res(); sc.onerror = ()=>rej(new Error("pdf_load")); document.head.appendChild(sc); }); }

function statLines(q, rows){
  const vals = rows.map((r)=>r.data[q.id]).filter((v)=> v !== undefined && v !== null && v !== "");
  const title = q.label || q.id;
  const type = QTYPES[q.type].label + " · " + vals.length + " answered";
  if (q.type === "conjoint"){
    const attrs = q.attributes || [];
    const counts = {};
    rows.forEach((r)=>{ const v = r.data[q.id]; if (!Array.isArray(v)) return; v.forEach((c)=>{ if (!c || c.none) return; attrs.forEach((a)=>{ const lv = c[a.name]; if (lv == null) return; counts[a.name] = counts[a.name] || {}; counts[a.name][lv] = (counts[a.name][lv] || 0) + 1; }); }); });
    const bars = []; attrs.forEach((a)=>{ (a.levels||[]).forEach((lv)=>{ bars.push({ k: a.name + ": " + lv, v: (counts[a.name] && counts[a.name][lv]) || 0 }); }); });
    const lines = attrs.map((a)=>{ const lc = counts[a.name] || {}; const top = Object.entries(lc).sort((x,y)=>y[1]-x[1])[0]; return a.name + ": " + (top ? (top[0] + " (" + top[1] + ")") : "no data"); });
    return { title, type, bars, lines };
  }
  if (q.type === "maxdiff"){
    const sc = {}; (q.items||[]).forEach((it)=>{ sc[it] = { b:0, w:0 }; });
    rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object"){ if (o.best && sc[o.best]) sc[o.best].b++; if (o.worst && sc[o.worst]) sc[o.worst].w++; } });
    const arr = (q.items||[]).map((it)=>({ k: it, v: sc[it].b - sc[it].w })).sort((a,b)=>b.v - a.v);
    return { title, type, bars: arr, lines: ["Preference score: chosen best minus chosen worst"] };
  }
  if (q.type === "multiple_choice"){
    const c = {}; q.options.forEach((o)=>c[o] = 0);
    rows.forEach((r)=>{ const v = r.data[q.id]; if (Array.isArray(v)) v.forEach((o)=>c[o] = (c[o] || 0) + 1); else if (v) c[v] = (c[v] || 0) + 1; });
    const e = Object.entries(c).sort((a,b)=>b[1] - a[1]);
    return { title, type, bars: e.map(([k,v])=>({ k, v })), lines: e.length ? ["Most selected: " + e[0][0] + " (" + e[0][1] + ")", "Least selected: " + e[e.length-1][0] + " (" + e[e.length-1][1] + ")"] : [] };
  }
  if (q.type === "rank_order"){
    const s = {}, n = {}; q.items.forEach((it)=>{ s[it] = 0; n[it] = 0; });
    rows.forEach((r)=>{ const a = r.data[q.id]; if (Array.isArray(a)) a.forEach((it,i)=>{ if (s[it] !== undefined){ s[it] += i + 1; n[it]++; } }); });
    const rank = q.items.map((it)=>({ it, avg: n[it] ? s[it] / n[it] : null })).filter((x)=>x.avg != null).sort((a,b)=>a.avg - b.avg);
    return { title, type, bars: [], lines: rank.length ? rank.map((x,i)=>(i + 1) + ". " + x.it + " (avg " + x.avg.toFixed(2) + ")") : ["No data"] };
  }
  if (q.type === "constant_sum"){
    const s = {}, n = {}; q.items.forEach((it)=>{ s[it] = 0; n[it] = 0; });
    rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object") q.items.forEach((it)=>{ const v = parseFloat(o[it]); if (!isNaN(v)){ s[it] += v; n[it]++; } }); });
    return { title, type, bars: q.items.map((it)=>({ k: it, v: n[it] ? Math.round(s[it] / n[it] * 10) / 10 : 0 })), lines: ["Average allocation, total " + q.total + (q.unit ? (" " + q.unit) : "")] };
  }
  if (q.type === "matrix"){
    return { title, type, bars: [], lines: q.rows.map((row)=>{ const c = {}; rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object"){ const a = o[row]; (Array.isArray(a) ? a : [a]).forEach((x)=>{ if (x) c[x] = (c[x] || 0) + 1; }); } }); const top = Object.entries(c).sort((a,b)=>b[1] - a[1])[0]; return row + ": " + (top ? top[0] + " (" + top[1] + ")" : "no data"); }) };
  }
  if (q.type === "side_by_side"){
    const cols = q.columns || [];
    return { title, type, bars: [], lines: (q.rows || []).map((row)=>{ const parts = cols.map((c)=>{ const cc = {}; rows.forEach((r)=>{ const o = r.data[q.id]; if (o && o[row] && o[row][c.label]){ const x = o[row][c.label]; cc[x] = (cc[x] || 0) + 1; } }); const top = Object.entries(cc).sort((a,b)=>b[1] - a[1])[0]; return c.label + ": " + (top ? top[0] : "-"); }); return row + " - " + parts.join(", "); }) };
  }
  if (q.type === "star_rating"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n)); const avg = nums.length ? nums.reduce((a,b)=>a + b, 0) / nums.length : 0;
    const bars = []; for (let k = 1; k <= q.max; k++) bars.push({ k: k + " star", v: nums.filter((n)=>n === k).length });
    return { title, type, bars, lines: ["Average: " + avg.toFixed(2) + " / " + q.max] };
  }
  if (q.type === "slider"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n)); const avg = nums.length ? nums.reduce((a,b)=>a + b, 0) / nums.length : 0;
    return { title, type, bars: [], lines: nums.length ? ["Average: " + avg.toFixed(1), "Min " + Math.min(...nums) + ", Max " + Math.max(...nums)] : ["No data"] };
  }
  if (q.type === "nps"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n)); const N = nums.length || 1; const p = nums.filter((x)=>x >= 9).length, d = nums.filter((x)=>x <= 6).length, ps = nums.filter((x)=>x === 7 || x === 8).length;
    return { title, type, bars: [], lines: ["NPS: " + (nums.length ? Math.round((p / N - d / N) * 100) : "-"), "Promoters " + p + ", Passives " + ps + ", Detractors " + d] };
  }
  if (q.type === "date"){
    const ds = vals.map(String).filter(Boolean).sort();
    return { title, type, bars: [], lines: ds.length ? ["Earliest " + ds[0] + ", latest " + ds[ds.length-1]] : ["No data"] };
  }
  if (q.type === "signature") return { title, type, bars: [], lines: [vals.length + " signed"] };
  return { title, type, bars: [], lines: [vals.length + " text response" + (vals.length === 1 ? "" : "s")] };
}

function svgToPng(svg, color, widthPx){
  return new Promise((resolve)=>{
    try {
      const s = svg.replace(/currentColor/g, color).replace('style="height:100%;width:auto;display:block"', 'width="750" height="225"');
      const src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(s)));
      const img = new Image();
      img.onload = ()=>{ try {
        const ratio = (img.height && img.width) ? img.height / img.width : 0.3;
        const w = widthPx, h = Math.round(widthPx * ratio);
        const c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve({ data: c.toDataURL("image/png"), w, h });
      } catch (e) { resolve(null); } };
      img.onerror = ()=>resolve(null);
      img.src = src;
    } catch (e) { resolve(null); }
  });
}

async function fetchFontB64(url){
  const blob = await fetch(url).then((r)=>{ if (!r.ok) throw new Error("font " + r.status); return r.blob(); });
  return await new Promise((res, rej)=>{ const fr = new FileReader(); fr.onload = ()=>res(String(fr.result).split(",")[1]); fr.onerror = ()=>rej(new Error("font_read")); fr.readAsDataURL(blob); });
}
const PDF_FONT_FILES = {
  sans: { family:"Figtree", reg:"https://cdn.jsdelivr.net/npm/@expo-google-fonts/figtree/Figtree_400Regular.ttf", bold:"https://cdn.jsdelivr.net/npm/@expo-google-fonts/figtree/Figtree_700Bold.ttf" },
  slab: { family:"RobotoSlab", reg:"https://cdn.jsdelivr.net/npm/@expo-google-fonts/roboto-slab/RobotoSlab_400Regular.ttf", bold:"https://cdn.jsdelivr.net/npm/@expo-google-fonts/roboto-slab/RobotoSlab_700Bold.ttf" },
  zetetiq: { family:"MozillaText", reg:"https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/mozillatext/MozillaText%5Bwght%5D.ttf", bold:null },
};
async function loadPdfFonts(doc, key){
  const builtin = { serif:"times", mono:"courier" };
  if (builtin[key]) return { family: builtin[key] };
  const f = PDF_FONT_FILES[key] || PDF_FONT_FILES.sans;
  try {
    const regFile = f.family + "-R.ttf";
    doc.addFileToVFS(regFile, await fetchFontB64(f.reg));
    doc.addFont(regFile, f.family, "normal");
    let boldFile = regFile;
    if (f.bold){ try { boldFile = f.family + "-B.ttf"; doc.addFileToVFS(boldFile, await fetchFontB64(f.bold)); } catch (e) { boldFile = regFile; } }
    doc.addFont(boldFile, f.family, "bold");
    return { family: f.family };
  } catch (e){ return { family: "helvetica" }; }
}

function imgDims(src){
  return new Promise((res)=>{
    try {
      const im = new Image(); let done = false;
      const finish = ()=>{ if (done) return; done = true; res({ w: im.naturalWidth || im.width || 300, h: im.naturalHeight || im.height || 120 }); };
      im.onload = finish; im.onerror = ()=>{ if (!done){ done = true; res({ w: 300, h: 120 }); } };
      im.src = src;
      setTimeout(finish, 2500);
    } catch (e){ res({ w: 300, h: 120 }); }
  });
}
async function drawExportLogo(doc, form, W, M){
  const hdr = (form.schema && form.schema.settings && form.schema.settings.headerImage) || null;
  if (hdr){
    try {
      const d = await imgDims(hdr);
      const maxW = 120, maxH = 46;
      let lw = maxW, lh = lw * (d.h / d.w);
      if (lh > maxH){ lh = maxH; lw = lh * (d.w / d.h); }
      const fmt = hdr.indexOf("image/png") >= 0 ? "PNG" : "JPEG";
      const pad = 6, cy = 18, cx = W - M - lw - pad * 2;
      doc.setFillColor(255, 255, 255); doc.roundedRect(cx, cy, lw + pad * 2, lh + pad * 2, 5, 5, "F");
      doc.addImage(hdr, fmt, cx + pad, cy + pad, lw, lh);
      return;
    } catch (e){}
  }
  const _base = (form.theme && form.theme.primary) || "#5C88CD";
  let logoDk = null, logoLt = null;
  try { logoDk = await svgToPng(LOGO_SVG, darkenHex(_base, 0.34), 150); } catch (e){}
  try { logoLt = await svgToPng(LOGO_SVG, lightenHex(_base, 0.5), 150); } catch (e){}
  if (logoDk && logoDk.data){ const lw = 92, lh = lw * (logoDk.h / logoDk.w); const lx = W - M - lw, ly = 22; if (logoLt && logoLt.data) doc.addImage(logoLt.data, "PNG", lx, ly + 0.8, lw, lh); doc.addImage(logoDk.data, "PNG", lx, ly, lw, lh); }
}

function answerText(v){
  if (v === null || v === undefined || v === "") return "No answer";
  if (Array.isArray(v)) return v.length ? v.join(", ") : "No answer";
  if (typeof v === "object") return Object.keys(v).map((k)=> k + ": " + (Array.isArray(v[k]) ? v[k].join("/") : v[k])).join("; ");
  return String(v);
}

      <div className="between" style={{marginBottom:12}}><span className="muted">{filtered.length === rows.length ? (rows.length + " response" + (rows.length===1?"":"s")) : (filtered.length + " of " + rows.length + " shown")}</span><span style={{display:"flex",gap:8,flexWrap:"wrap"}}><ExportButtons id={id} form={form} rows={rows} />{pollQ && <button className="btn sm" onClick={downloadPollCsv}>Availability grid CSV</button>}<button className="btn sm danger" onClick={clearAll}>Clear all</button></span></div>
      <div className="card" style={{overflowX:"auto"}}>
        <table className="table">
          <thead><tr><th>Submitted</th><th className="hide-sm">Location</th><th className="hide-sm">Device</th>{previewCols.map(c=>(<th key={c}>{labels[c]}</th>))}<th></th></tr></thead>
          <tbody>
            {filtered.map(r=>(
              <tr key={r.id} className="clickable" onClick={()=>setOpen(r)}>
                <td style={{fontSize:13}}>{fmtDate(r.created_at)}</td>
                <td className="hide-sm" style={{fontSize:13}}>{[r.meta.city, r.meta.country].filter(Boolean).join(", ") || "-"}</td>
                <td className="hide-sm" style={{fontSize:13}}>{[r.meta.browser, r.meta.os].filter(Boolean).join(" / ") || "-"}</td>
                {previewCols.map(c=>(<td key={c} style={{fontSize:13,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cell(r.data[c])}</td>))}
                <td onClick={(e)=>e.stopPropagation()} style={{whiteSpace:"nowrap"}}><button className="btn sm" disabled={pdfBusy} onClick={async ()=>{ setPdfBusy(true); try { await exportResponsePdf(form, r); } catch (e) { toast("Could not build the PDF."); } setPdfBusy(false); }}>PDF</button> <button className="btn sm danger" onClick={async ()=>{ if (!window.confirm("Delete this response?")) return; const { ok } = await api.deleteResponse(id, r.id); if (ok) setRows((prev)=> prev.filter((x)=> x.id !== r.id)); else toast("Could not delete this response."); }}>Delete</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {filtered.length === 0 && <div className="muted" style={{marginTop:10,fontSize:13}}>No responses match your filters.</div>}
      {open && (
        <Modal title={"Response · " + fmtDate(open.created_at)} onClose={()=>setOpen(null)}>
          <div className="pad-lg">
            <div className="between" style={{marginBottom:12}}><span className="muted" style={{fontSize:13}}>Response detail</span><button className="btn sm primary" disabled={pdfBusy} onClick={async ()=>{ setPdfBusy(true); try { await exportResponsePdf(form, open); } catch (e) { toast("Could not build the PDF."); } setPdfBusy(false); }}>{pdfBusy ? "Preparing..." : "Export PDF"}</button></div>
            {(form.schema.questions||[]).filter(q=>QTYPES[q.type] && QTYPES[q.type].isInput).map(q=>(
              <div key={q.id} style={{marginBottom:14}}><div className="label">{q.label||q.id}</div><div>{q.type === "signature" ? (open.data[q.id] ? <img src={open.data[q.id]} alt="signature" style={{maxWidth:280,border:"1px solid var(--line)",borderRadius:8,background:"#f5f2f0"}} /> : <span className="muted">Not signed</span>) : q.type === "scheduling" ? (open.data[q.id] ? (typeof open.data[q.id] === "object" ? fmtPollAnswer(open.data[q.id]) : fmtSlot(open.data[q.id])) : <span className="muted">Not booked</span>) : q.type === "document_sign" ? <div><DocSignAnswer q={q} val={open.data[q.id]} />{q.document && <button className="btn sm" style={{marginTop:10}} onClick={()=>{ toast("Preparing document..."); downloadFilledDoc(q, open.data[q.id], (form.title || "document") + "-filled").catch(()=>toast("Could not generate the document.")); }}>Download filled document</button>}</div> : q.type === "file_upload" ? <FileAnswer val={open.data[q.id]} formId={id} /> : (cell(open.data[q.id]) || <span className="muted">No answer</span>)}</div></div>
            ))}
            {open.meta && Array.isArray(open.meta.followups) && open.meta.followups.length > 0 && (
              <div style={{marginBottom:14}}><div className="label">Follow-ups</div>{open.meta.followups.map((fu, i)=>(<div key={i} style={{marginBottom:8}}><div style={{fontSize:13,fontWeight:600}}>{fu.question}</div><div>{fu.answer || <span className="muted">No answer</span>}</div></div>))}</div>
            )}
            <hr style={{border:0,borderTop:"1px solid var(--line)",margin:"14px 0"}} />
            <div className="mono" style={{fontSize:12,color:"var(--ink-soft)"}}>{[open.meta.city, open.meta.region, open.meta.country].filter(Boolean).join(", ")} · {[open.meta.browser, open.meta.os].filter(Boolean).join(" / ")}{open.meta.viewport ? " · " + open.meta.viewport.w + "x" + open.meta.viewport.h : ""}</div>
          </div>
        </Modal>
      )}
    </div>
  );
}
function BarCard({ title, rows, note }){
  const max = Math.max(1, ...rows.map((r)=>r.c));
  return (<div className="card pad-lg"><div className="label" style={{marginBottom:10}}>{title}</div>
    {rows.length === 0 ? <div className="muted" style={{fontSize:13}}>No data yet.</div> :
      rows.map((r,i)=>(<div className="bar-row" key={i}><span className="k">{r.k || "Unknown"}</span><span className="track2"><span className="fill" style={{width:(r.c / max * 100) + "%"}}></span></span><span className="v">{r.v !== undefined ? r.v : r.c}</span></div>))}
    {note && <div className="hint" style={{marginTop:10}}>{note}</div>}
  </div>);
}

function QuestionStat({ q, rows }){
  const vals = rows.map((r)=>r.data[q.id]).filter((v)=> v !== undefined && v !== null && v !== "");
  const answered = vals.length;
  const head = (extra) => (
    <div className="between" style={{marginBottom:10,gap:10}}>
      <div className="label" style={{margin:0}}>{q.label || q.id}</div>
      <span className="mono" style={{fontSize:11,color:"var(--ink-soft)",whiteSpace:"nowrap"}}>{QTYPES[q.type].label} · {answered} answered{extra ? (" · " + extra) : ""}</span>
    </div>
  );

  if (q.type === "conjoint"){
    const attrs = q.attributes || [];
    const counts = {}; let totalChosen = 0, noneCount = 0;
    rows.forEach((r)=>{ const v = r.data[q.id]; if (!Array.isArray(v)) return; v.forEach((c)=>{ if (!c) return; if (c.none){ noneCount++; return; } totalChosen++; attrs.forEach((a)=>{ const lv = c[a.name]; if (lv == null) return; counts[a.name] = counts[a.name] || {}; counts[a.name][lv] = (counts[a.name][lv] || 0) + 1; }); }); });
    return (<div className="card pad-lg">{head(totalChosen + " choices" + (noneCount ? (" · " + noneCount + " none") : ""))}
      {attrs.length ? attrs.map((a)=>{ const lc = counts[a.name] || {}; const entries = (a.levels||[]).map((lv)=>({ k: lv, v: lc[lv] || 0 })); const mx = Math.max(1, ...entries.map((e)=>e.v)); return (<div key={a.id} style={{marginTop:10}}><div className="label" style={{marginBottom:4,fontSize:12}}>{a.name}</div>{entries.map((e,i)=>(<div className="bar-row" key={i}><span className="k">{e.k}</span><span className="track2"><span className="fill" style={{width:((e.v / mx) * 100) + "%"}}></span></span><span className="v">{e.v}</span></div>))}</div>); }) : <div className="muted" style={{fontSize:13}}>No attributes.</div>}
      <div className="hint" style={{marginTop:8}}>Times each level appeared in a chosen option.</div>
    </div>);
  }

  if (q.type === "multiple_choice"){
    const counts = {}; q.options.forEach((o)=>counts[o] = 0);
    rows.forEach((r)=>{ const v = r.data[q.id]; if (Array.isArray(v)) v.forEach((o)=>{ counts[o] = (counts[o] || 0) + 1; }); else if (v) counts[v] = (counts[v] || 0) + 1; });
    const entries = Object.entries(counts).sort((a,b)=>b[1] - a[1]);
    const mx = Math.max(1, ...entries.map((e)=>e[1]));
    const most = entries[0], least = entries[entries.length - 1];
    return (<div className="card pad-lg">{head()}
      {entries.length ? entries.map(([k,c],i)=>(<div className="bar-row" key={i}><span className="k">{k}</span><span className="track2"><span className="fill" style={{width:(c / mx * 100) + "%"}}></span></span><span className="v">{c}</span></div>)) : <div className="muted" style={{fontSize:13}}>No data yet.</div>}
      {entries.length > 0 && most[1] > 0 && <div className="hint" style={{marginTop:10}}>Most selected: {most[0]} ({most[1]}). Least: {least[0]} ({least[1]}).</div>}
    </div>);
  }

  if (q.type === "matrix"){
    return (<div className="card pad-lg">{head()}
      <table className="table" style={{fontSize:13}}><tbody>
        {q.rows.map((row,ri)=>{ const c = {}; rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object"){ const a = o[row]; (Array.isArray(a) ? a : [a]).forEach((x)=>{ if (x) c[x] = (c[x] || 0) + 1; }); } }); const top = Object.entries(c).sort((a,b)=>b[1] - a[1])[0]; return (<tr key={ri}><td style={{fontWeight:500}}>{row}</td><td>{top ? (top[0] + " (" + top[1] + ")") : <span className="muted">No data</span>}</td></tr>); })}
      </tbody></table>
      <div className="hint" style={{marginTop:8}}>Most common answer per statement.</div>
    </div>);
  }

  if (q.type === "side_by_side"){
    const cols = q.columns || [];
    return (<div className="card pad-lg">{head()}
      <div className="matrix-wrap"><table className="table" style={{fontSize:13}}>
        <thead><tr><th></th>{cols.map((c)=>(<th key={c.id} style={{textAlign:"left"}}>{c.label}</th>))}</tr></thead>
        <tbody>{(q.rows || []).map((row,ri)=>(<tr key={ri}><td style={{fontWeight:500}}>{row}</td>{cols.map((c)=>{ const cc = {}; rows.forEach((r)=>{ const o = r.data[q.id]; if (o && o[row] && o[row][c.label]){ const x = o[row][c.label]; cc[x] = (cc[x] || 0) + 1; } }); const top = Object.entries(cc).sort((a,b)=>b[1] - a[1])[0]; return (<td key={c.id}>{top ? (top[0] + " (" + top[1] + ")") : <span className="muted">-</span>}</td>); })}</tr>))}</tbody>
      </table></div>
      <div className="hint" style={{marginTop:8}}>Most common answer per item and column.</div>
    </div>);
  }

  if (q.type === "hot_spot"){
    const pts = rows.map((r)=> r.data[q.id]).filter((v)=> v && typeof v === "object" && typeof v.x === "number");
    return (<div className="card pad-lg">{head(pts.length + " points")}
      {q.image ? (<div className="hotspot-heat"><img src={q.image} alt="" />{pts.map((p,i)=>(<span key={i} className="heat-dot" style={{left:p.x + "%",top:p.y + "%"}}></span>))}</div>) : <div className="muted" style={{fontSize:13}}>No image.</div>}
      <div className="hint" style={{marginTop:8}}>Every response shown as a point on the image.</div>
    </div>);
  }

  if (q.type === "maxdiff"){
    const sc = {}; (q.items||[]).forEach((it)=>{ sc[it] = { b:0, w:0 }; });
    rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object"){ if (o.best && sc[o.best]) sc[o.best].b++; if (o.worst && sc[o.worst]) sc[o.worst].w++; } });
    const arr = (q.items||[]).map((it)=>({ k: it, score: sc[it].b - sc[it].w })).sort((a,b)=>b.score - a.score);
    const mn = Math.min(0, ...arr.map((x)=>x.score)), mx = Math.max(1, ...arr.map((x)=>x.score)); const span = (mx - mn) || 1;
    return (<div className="card pad-lg">{head()}
      {arr.length ? arr.map((x,i)=>(<div className="bar-row" key={i}><span className="k">{x.k}</span><span className="track2"><span className="fill" style={{width:(((x.score - mn) / span) * 100) + "%"}}></span></span><span className="v">{x.score > 0 ? "+" : ""}{x.score}</span></div>)) : <div className="muted" style={{fontSize:13}}>No data yet.</div>}
      <div className="hint" style={{marginTop:8}}>Preference score: times chosen best minus times chosen worst.</div>
    </div>);
  }

  if (q.type === "rank_order"){
    const sums = {}, cnt = {}; q.items.forEach((it)=>{ sums[it] = 0; cnt[it] = 0; });
    rows.forEach((r)=>{ const arr = r.data[q.id]; if (Array.isArray(arr)) arr.forEach((it,idx)=>{ if (sums[it] !== undefined){ sums[it] += idx + 1; cnt[it]++; } }); });
    const ranking = q.items.map((it)=>({ it, avg: cnt[it] ? sums[it] / cnt[it] : null })).filter((x)=>x.avg !== null).sort((a,b)=>a.avg - b.avg);
    return (<div className="card pad-lg">{head()}
      {ranking.length ? <ol className="rankresult">{ranking.map((x,i)=>(<li key={i}><span className="rr-pos">{i + 1}</span><span className="rr-name">{x.it}</span><span className="rr-avg">avg {x.avg.toFixed(2)}</span></li>))}</ol> : <div className="muted" style={{fontSize:13}}>No data yet.</div>}
      <div className="hint" style={{marginTop:8}}>Final ranking by average position (1 is best).</div>
    </div>);
  }

  if (q.type === "constant_sum"){
    const sums = {}, cnt = {}; q.items.forEach((it)=>{ sums[it] = 0; cnt[it] = 0; });
    rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object") q.items.forEach((it)=>{ const n = parseFloat(o[it]); if (!isNaN(n)){ sums[it] += n; cnt[it]++; } }); });
    const barRows = q.items.map((it)=>({ k: it, c: cnt[it] ? Math.round(sums[it] / cnt[it] * 10) / 10 : 0 }));
    const mx = Math.max(1, ...barRows.map((x)=>x.c));
    return (<div className="card pad-lg">{head()}
      {barRows.map((r,i)=>(<div className="bar-row" key={i}><span className="k">{r.k}</span><span className="track2"><span className="fill" style={{width:(r.c / mx * 100) + "%"}}></span></span><span className="v">{r.c}</span></div>))}
      <div className="hint" style={{marginTop:8}}>Average allocation per item (total {q.total}{q.unit ? (" " + q.unit) : ""}).</div>
    </div>);
  }

  if (q.type === "star_rating"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n));
    const avg = nums.length ? nums.reduce((a,b)=>a + b, 0) / nums.length : 0;
    const dist = []; for (let k = 1; k <= q.max; k++) dist.push({ k: k + "\u2605", c: nums.filter((n)=>n === k).length });
    const mx = Math.max(1, ...dist.map((d)=>d.c));
    return (<div className="card pad-lg">{head(nums.length ? ("avg " + avg.toFixed(2) + " / " + q.max) : "")}
      {dist.map((d,i)=>(<div className="bar-row" key={i}><span className="k">{d.k}</span><span className="track2"><span className="fill" style={{width:(d.c / mx * 100) + "%"}}></span></span><span className="v">{d.c}</span></div>))}
    </div>);
  }

  if (q.type === "slider"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n));
    const avg = nums.length ? nums.reduce((a,b)=>a + b, 0) / nums.length : 0;
    return (<div className="card pad-lg">{head()}<div className="statgrid">
      <div><div className="bignum">{nums.length ? avg.toFixed(1) : "-"}</div><div className="hint">Average</div></div>
      <div><div className="bignum">{nums.length ? Math.min(...nums) : "-"}</div><div className="hint">Min</div></div>
      <div><div className="bignum">{nums.length ? Math.max(...nums) : "-"}</div><div className="hint">Max</div></div>
    </div></div>);
  }

  if (q.type === "nps"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n));
    const n = nums.length || 1;
    const prom = nums.filter((x)=>x >= 9).length, det = nums.filter((x)=>x <= 6).length, pass = nums.filter((x)=>x === 7 || x === 8).length;
    const nps = Math.round((prom / n - det / n) * 100);
    return (<div className="card pad-lg">{head()}<div className="statgrid">
      <div><div className="bignum">{nums.length ? nps : "-"}</div><div className="hint">NPS</div></div>
      <div><div className="bignum">{prom}</div><div className="hint">Promoters</div></div>
      <div><div className="bignum">{pass}</div><div className="hint">Passives</div></div>
      <div><div className="bignum">{det}</div><div className="hint">Detractors</div></div>
    </div></div>);
  }

  if (q.type === "date"){
    const ds = vals.map(String).filter(Boolean).sort();
    return (<div className="card pad-lg">{head()}<div className="hint">{ds.length ? ("Earliest " + ds[0] + ", latest " + ds[ds.length - 1]) : "No data yet."}</div></div>);
  }

  if (q.type === "image_choice"){
    const counts = {};
    rows.forEach((r)=>{ const v = r.data[q.id]; if (Array.isArray(v)) v.forEach((o)=>{ if (o) counts[o] = (counts[o] || 0) + 1; }); else if (v) counts[v] = (counts[v] || 0) + 1; });
    const entries = Object.entries(counts).sort((a,b)=>b[1] - a[1]);
    const mx = Math.max(1, ...entries.map((e)=>e[1]));
    return (<div className="card pad-lg">{head()}
      {entries.length ? entries.map(([k,c],i)=>(<div className="bar-row" key={i}><span className="k">{k}</span><span className="track2"><span className="fill" style={{width:(c / mx * 100) + "%"}}></span></span><span className="v">{c}</span></div>)) : <div className="muted" style={{fontSize:13}}>No data yet.</div>}
    </div>);
  }

  if (q.type === "number_entry"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n));
    const avg = nums.length ? nums.reduce((a,b)=>a + b, 0) / nums.length : 0;
    return (<div className="card pad-lg">{head()}<div className="statgrid">
      <div><div className="bignum">{nums.length ? (Math.round(avg * 100) / 100) : "-"}</div><div className="hint">Average</div></div>
      <div><div className="bignum">{nums.length ? Math.min(...nums) : "-"}</div><div className="hint">Min</div></div>
      <div><div className="bignum">{nums.length ? Math.max(...nums) : "-"}</div><div className="hint">Max</div></div>
    </div></div>);
  }

  if (q.type === "drill_down"){
    const counts = {};
    rows.forEach((r)=>{ const v = r.data[q.id]; const key = Array.isArray(v) ? v.join(" / ") : (v || ""); if (key) counts[key] = (counts[key] || 0) + 1; });
    const entries = Object.entries(counts).sort((a,b)=>b[1] - a[1]);
    const mx = Math.max(1, ...entries.map((e)=>e[1]));
    return (<div className="card pad-lg">{head()}
      {entries.length ? entries.map(([k,c],i)=>(<div className="bar-row" key={i}><span className="k">{k}</span><span className="track2"><span className="fill" style={{width:(c / mx * 100) + "%"}}></span></span><span className="v">{c}</span></div>)) : <div className="muted" style={{fontSize:13}}>No data yet.</div>}
    </div>);
  }

  return (<div className="card pad-lg">{head()}<div className="hint">{answered ? (answered + " text response" + (answered === 1 ? "" : "s") + ". See the Responses tab for details.") : "No data yet."}</div></div>);
}

function ToneCard({ tone }){
  const p = tone.positive, n = tone.neutral, neg = tone.negative;
  const haveCounts = [p, n, neg].every((x)=> typeof x === "number");
  const tot = haveCounts ? Math.max(1, p + n + neg) : 0;
  return (
    <div className="card pad-lg">
      <div className="label" style={{marginBottom:10}}>Tone of open-text answers</div>
      {haveCounts && (
        <div className="tonebar">
          <span style={{width:(p / tot * 100) + "%"}} className="t-pos" title={"Positive " + p}></span>
          <span style={{width:(n / tot * 100) + "%"}} className="t-neu" title={"Neutral " + n}></span>
          <span style={{width:(neg / tot * 100) + "%"}} className="t-neg" title={"Negative " + neg}></span>
        </div>
      )}
      {haveCounts && <div className="hint" style={{margin:"8px 0"}}>Positive {p} · Neutral {n} · Negative {neg}</div>}
      {tone.read && <div style={{fontSize:14}}>{tone.read}</div>}
    </div>
  );
}

function AnalyticsTab({ id, form }){
  const [a, setA] = useState(null);
  const [rows, setRows] = useState(null);
  const [tone, setTone] = useState(undefined);
  useEffect(()=>{ api.analytics(id).then(({data})=> setA(data || {})); },[id]);
  useEffect(()=>{ api.tone(id).then(({data})=> setTone(data && data.tone ? data.tone : null)); },[id]);
  useEffect(()=>{ api.responses(id).then(({data})=> setRows((data && data.responses) || [])); },[id]);
  if (!a || rows === null) return <div className="muted">Loading...</div>;
  const inputQs = (form.schema.questions || []).filter((q)=> QTYPES[q.type] && QTYPES[q.type].isInput);
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr",gap:18,maxWidth:680}}>
      <ExportButtons id={id} form={form} rows={rows} />
      {(()=>{ const sc = rows.filter((r)=> r.meta && typeof r.meta.score === "number"); if (!sc.length) return null; const avg = sc.reduce((a,r)=> a + r.meta.score, 0) / sc.length; const mx = sc.reduce((a,r)=> Math.max(a, r.meta.maxScore || 0), 0); const best = sc.reduce((a,r)=> Math.max(a, r.meta.score), -Infinity); return (<div className="card pad-lg"><div className="label" style={{marginBottom:10}}>Quiz scores</div><div className="statgrid"><div><div className="bignum">{Math.round(avg * 100) / 100}{mx ? (" / " + mx) : ""}</div><div className="hint">Average</div></div><div><div className="bignum">{best}</div><div className="hint">Highest</div></div><div><div className="bignum">{sc.length}</div><div className="hint">Scored</div></div></div></div>); })()}
      {(()=>{ const st = (form.schema && form.schema.settings) || {}; if (!st.experiment) return null; const c = {}; rows.forEach((r)=>{ const v = (r.meta && r.meta.variant) || "Unassigned"; c[v] = (c[v] || 0) + 1; }); const entries = Object.entries(c).sort((a,b)=> a[0] < b[0] ? -1 : (a[0] > b[0] ? 1 : 0)); const mx = Math.max(1, ...entries.map((e)=>e[1])); return (<div className="card pad-lg"><div className="label" style={{marginBottom:10}}>A/B variants</div>{entries.map(([k,n],i)=>(<div className="bar-row" key={i}><span className="k">{k === "Unassigned" ? k : ("Variant " + k)}</span><span className="track2"><span className="fill" style={{width:((n / mx) * 100) + "%"}}></span></span><span className="v">{n}</span></div>))}<div className="hint" style={{marginTop:8}}>How responses split across variants.</div></div>); })()}
      {(()=>{ const dq = rows.filter((r)=> r.meta && r.meta.disqualified).length; if (!dq) return null; const total = rows.length || 1; return (<div className="card pad-lg"><div className="label" style={{marginBottom:10}}>Screen-outs</div><div className="statgrid"><div><div className="bignum">{dq}</div><div className="hint">Disqualified</div></div><div><div className="bignum">{Math.round((dq / total) * 100)}%</div><div className="hint">Of responses</div></div></div></div>); })()}
      <div className="card pad-lg"><div className="label">Total responses</div><div style={{fontFamily:"var(--display)",fontSize:46,fontWeight:600,lineHeight:1}}>{a.total || 0}</div></div>
      {(()=>{ const secs = rows.map((r)=> r.meta && typeof r.meta.seconds === "number" ? r.meta.seconds : null).filter((x)=> x != null && x > 0); if (!secs.length) return null; const avg = secs.reduce((x,y)=>x+y,0) / secs.length; const sorted = secs.slice().sort((x,y)=>x-y); const mid = Math.floor(sorted.length / 2); const med = sorted.length % 2 ? sorted[mid] : (sorted[mid-1] + sorted[mid]) / 2; const fmt = (v)=>{ v = Math.round(v); if (v < 60) return v + "s"; const m = Math.floor(v/60); const r2 = v % 60; return m + "m" + (r2 ? (" " + r2 + "s") : ""); }; return (<div className="card pad-lg"><div className="label" style={{marginBottom:10}}>Time to complete</div><div className="statgrid"><div><div className="bignum">{fmt(avg)}</div><div className="hint">Average</div></div><div><div className="bignum">{fmt(med)}</div><div className="hint">Median</div></div><div><div className="bignum">{secs.length}</div><div className="hint">Timed</div></div></div></div>); })()}
      {tone && <ToneCard tone={tone} />}
      {inputQs.length > 0 && <div className="label" style={{marginTop:4}}>Question breakdown</div>}
      {inputQs.map((q)=><QuestionStat key={q.id} q={q} rows={rows} />)}
      <div className="label" style={{marginTop:4}}>Audience</div>
      <BarCard title="Responses by day" rows={(a.byDay || []).map((d)=>({ k:d.date, c:d.count }))} />
      <BarCard title="By country" rows={(a.byCountry || []).map((d)=>({ k:d.name, c:d.count }))} />
      <BarCard title="By browser" rows={(a.byBrowser || []).map((d)=>({ k:d.name, c:d.count }))} />
    </div>
  );
}

function App(){
  const [path, setPath] = useState(window.location.pathname);
  const [user, setUser] = useState(undefined);
  const [toastMsg, setToastMsg] = useState(null);
  const toastTimer = useRef(null);
  const toast = useCallback((m)=>{ setToastMsg(m); clearTimeout(toastTimer.current); toastTimer.current = setTimeout(()=>setToastMsg(null), 2400); },[]);
  const navigate = useCallback((to, replace)=>{ if (replace) window.history.replaceState({}, "", to); else window.history.pushState({}, "", to); setPath(to); window.scrollTo(0,0); },[]);
  useEffect(()=>{ const onPop=()=>setPath(window.location.pathname); window.addEventListener("popstate", onPop); return ()=>window.removeEventListener("popstate", onPop); },[]);
  useEffect(()=>{ api.me().then(({data})=> setUser((data && data.user) || null)).catch(()=>setUser(null)); },[]);
  useEffect(()=>{ ensureTranslateWidget(); },[]);
  const [theme, setTheme] = useState(()=>{ try { const v = localStorage.getItem("zq-theme"); if (v === "light" || v === "dark") return v; } catch (e) {} return (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light"; });
  useEffect(()=>{ try { document.documentElement.setAttribute("data-theme", theme); } catch (e) {} },[theme]);
  useEffect(()=>{
    const tip = document.createElement("div"); tip.className = "cursor-tip"; tip.style.display = "none"; document.body.appendChild(tip);
    let cur = null;
    const tipText = (el)=> (el.getAttribute("data-tip") || el.getAttribute("title") || el.getAttribute("data-otitle") || "");
    const findTip = (t)=>{ let el = t; while (el && el !== document.body){ if (el.getAttribute && (el.getAttribute("data-tip") || el.getAttribute("title") || el.getAttribute("data-otitle"))) return el; el = el.parentElement; } return null; };
    const place = (x,y)=>{ const r = tip.getBoundingClientRect(); let nx = x + 14, ny = y + 18; if (nx + r.width > window.innerWidth - 6) nx = x - r.width - 12; if (ny + r.height > window.innerHeight - 6) ny = y - r.height - 14; tip.style.left = Math.max(6,nx) + "px"; tip.style.top = Math.max(6,ny) + "px"; };
    const show = (el,x,y)=>{ const t = tipText(el); if (!t) return; if (el.hasAttribute("title")){ el.setAttribute("data-otitle", el.getAttribute("title")); el.removeAttribute("title"); } tip.textContent = t; tip.style.display = "block"; place(x,y); };
    const hide = (el)=>{ if (el && el.hasAttribute("data-otitle")){ el.setAttribute("title", el.getAttribute("data-otitle")); el.removeAttribute("data-otitle"); } tip.style.display = "none"; };
    const onOver = (e)=>{ const el = findTip(e.target); if (el === cur) return; if (cur) hide(cur); cur = el; if (el) show(el, e.clientX, e.clientY); };
    const onMove = (e)=>{ if (cur && tip.style.display !== "none") place(e.clientX, e.clientY); };
    const onDown = ()=>{ if (cur){ hide(cur); cur = null; } };
    document.addEventListener("pointerover", onOver);
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerdown", onDown, true);
    return ()=>{ document.removeEventListener("pointerover", onOver); document.removeEventListener("pointermove", onMove); document.removeEventListener("pointerdown", onDown, true); if (cur) hide(cur); tip.remove(); };
  }, []);
  const toggleTheme = useCallback(()=>{ setTheme((t)=>{ const n = t === "dark" ? "light" : "dark"; try { localStorage.setItem("zq-theme", n); } catch (e) {} return n; }); },[]);
  const ctx = useMemo(()=>({ user, setUser, navigate, toast, theme, toggleTheme }), [user, navigate, toast, theme, toggleTheme]);

  let view;
  if (user === undefined){
    view = <div className="center-screen"><div style={{color:"var(--bo)"}}><Logo size={34} /></div></div>;
  } else {
    const seg = path.split("/").filter(Boolean);
    const reserved = new Set(["dashboard","builder","login","admin","api","assets","favicon.ico","robots.txt"]);
    if (seg.length === 1 && !reserved.has(seg[0])) view = <PublicForm username="admin" slug={seg[0]} />;
    else if (seg.length === 2 && !reserved.has(seg[0])) view = <PublicForm username={seg[0]} slug={seg[1]} />;
    else if (seg.length === 0) view = user ? <Dashboard/> : <Landing/>;
    else if (seg[0] === "login") view = <Landing showLogin />;
    else if (!user) view = <Landing showLogin />;
    else if (seg[0] === "dashboard" && seg.length === 1) view = <Dashboard/>;
    else if (seg[0] === "admin" && seg.length === 1) view = (user.role === "admin") ? <AdminConsole/> : <Dashboard/>;
    else if (seg[0] === "dashboard" && seg.length === 2) view = <FormDashboard id={seg[1]} />;
    else if (seg[0] === "builder" && seg.length === 2) view = <Builder formId={seg[1]} />;
    else view = <div className="center-screen"><h2>Not found</h2><button className="btn" onClick={()=>navigate(user ? "/dashboard" : "/")}>Go home</button></div>;
  }
  return (<Ctx.Provider value={ctx}>{view}{toastMsg && <div className="toast">{toastMsg}</div>}</Ctx.Provider>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
