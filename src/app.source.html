            {rows.map(r=>(
              <tr key={r.id} className="clickable" onClick={()=>setOpen(r)}>
                <td style={{fontSize:13}}>{fmtDate(r.created_at)}</td>
                <td className="hide-sm" style={{fontSize:13}}>{[r.meta.city, r.meta.country].filter(Boolean).join(", ") || "-"}</td>
                <td className="hide-sm" style={{fontSize:13}}>{[r.meta.browser, r.meta.os].filter(Boolean).join(" / ") || "-"}</td>
                {previewCols.map(c=>(<td key={c} style={{fontSize:13,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cell(r.data[c])}</td>))}
                <td className="muted" style={{fontSize:18}}>›</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {open && (
        <Modal title={"Response · " + fmtDate(open.created_at)} onClose={()=>setOpen(null)}>
          <div className="pad-lg">
            {(form.schema.questions||[]).filter(q=>QTYPES[q.type] && QTYPES[q.type].isInput).map(q=>(
              <div key={q.id} style={{marginBottom:14}}><div className="label">{q.label||q.id}</div><div>{cell(open.data[q.id]) || <span className="muted">No answer</span>}</div></div>
            ))}
            <hr style={{border:0,borderTop:"1px solid var(--line)",margin:"14px 0"}} />
            <div className="mono" style={{fontSize:12,color:"var(--ink-soft)"}}>{[open.meta.city, open.meta.region, open.meta.country].filter(Boolean).join(", ")} · {[open.meta.browser, open.meta.os].filter(Boolean).join(" / ")}{open.meta.viewport ? " · " + open.meta.viewport.w + "x" + open.meta.viewport.h : ""}</div>
          </div>
        </Modal>
      )}
    </div>
  );
}
function BarCard({ title, rows, note }){
  const max = Math.max(1, ...rows.map((r)=>r.c));
  return (<div className="card pad-lg"><div className="label" style={{marginBottom:10}}>{title}</div>
    {rows.length === 0 ? <div className="muted" style={{fontSize:13}}>No data yet.</div> :
      rows.map((r,i)=>(<div className="bar-row" key={i}><span className="k">{r.k || "Unknown"}</span><span className="track2"><span className="fill" style={{width:(r.c / max * 100) + "%"}}></span></span><span className="v">{r.v !== undefined ? r.v : r.c}</span></div>))}
    {note && <div className="hint" style={{marginTop:10}}>{note}</div>}
  </div>);
}

function QuestionStat({ q, rows }){
  const vals = rows.map((r)=>r.data[q.id]).filter((v)=> v !== undefined && v !== null && v !== "");
  const answered = vals.length;
  const head = (extra) => (
    <div className="between" style={{marginBottom:10,gap:10}}>
      <div className="label" style={{margin:0}}>{q.label || q.id}</div>
      <span className="mono" style={{fontSize:11,color:"var(--ink-soft)",whiteSpace:"nowrap"}}>{QTYPES[q.type].label} · {answered} answered{extra ? (" · " + extra) : ""}</span>
    </div>
  );

  if (q.type === "multiple_choice"){
    const counts = {}; q.options.forEach((o)=>counts[o] = 0);
    rows.forEach((r)=>{ const v = r.data[q.id]; if (Array.isArray(v)) v.forEach((o)=>{ counts[o] = (counts[o] || 0) + 1; }); else if (v) counts[v] = (counts[v] || 0) + 1; });
    const entries = Object.entries(counts).sort((a,b)=>b[1] - a[1]);
    const mx = Math.max(1, ...entries.map((e)=>e[1]));
    const most = entries[0], least = entries[entries.length - 1];
    return (<div className="card pad-lg">{head()}
      {entries.length ? entries.map(([k,c],i)=>(<div className="bar-row" key={i}><span className="k">{k}</span><span className="track2"><span className="fill" style={{width:(c / mx * 100) + "%"}}></span></span><span className="v">{c}</span></div>)) : <div className="muted" style={{fontSize:13}}>No data yet.</div>}
      {entries.length > 0 && most[1] > 0 && <div className="hint" style={{marginTop:10}}>Most selected: {most[0]} ({most[1]}). Least: {least[0]} ({least[1]}).</div>}
    </div>);
  }

  if (q.type === "matrix"){
    return (<div className="card pad-lg">{head()}
      <table className="table" style={{fontSize:13}}><tbody>
        {q.rows.map((row,ri)=>{ const c = {}; rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object"){ const a = o[row]; (Array.isArray(a) ? a : [a]).forEach((x)=>{ if (x) c[x] = (c[x] || 0) + 1; }); } }); const top = Object.entries(c).sort((a,b)=>b[1] - a[1])[0]; return (<tr key={ri}><td style={{fontWeight:500}}>{row}</td><td>{top ? (top[0] + " (" + top[1] + ")") : <span className="muted">No data</span>}</td></tr>); })}
      </tbody></table>
      <div className="hint" style={{marginTop:8}}>Most common answer per statement.</div>
    </div>);
  }

  if (q.type === "rank_order"){
    const sums = {}, cnt = {}; q.items.forEach((it)=>{ sums[it] = 0; cnt[it] = 0; });
    rows.forEach((r)=>{ const arr = r.data[q.id]; if (Array.isArray(arr)) arr.forEach((it,idx)=>{ if (sums[it] !== undefined){ sums[it] += idx + 1; cnt[it]++; } }); });
    const ranking = q.items.map((it)=>({ it, avg: cnt[it] ? sums[it] / cnt[it] : null })).filter((x)=>x.avg !== null).sort((a,b)=>a.avg - b.avg);
    return (<div className="card pad-lg">{head()}
      {ranking.length ? <ol className="rankresult">{ranking.map((x,i)=>(<li key={i}><span className="rr-pos">{i + 1}</span><span className="rr-name">{x.it}</span><span className="rr-avg">avg {x.avg.toFixed(2)}</span></li>))}</ol> : <div className="muted" style={{fontSize:13}}>No data yet.</div>}
      <div className="hint" style={{marginTop:8}}>Final ranking by average position (1 is best).</div>
    </div>);
  }

  if (q.type === "constant_sum"){
    const sums = {}, cnt = {}; q.items.forEach((it)=>{ sums[it] = 0; cnt[it] = 0; });
    rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object") q.items.forEach((it)=>{ const n = parseFloat(o[it]); if (!isNaN(n)){ sums[it] += n; cnt[it]++; } }); });
    const barRows = q.items.map((it)=>({ k: it, c: cnt[it] ? Math.round(sums[it] / cnt[it] * 10) / 10 : 0 }));
    const mx = Math.max(1, ...barRows.map((x)=>x.c));
    return (<div className="card pad-lg">{head()}
      {barRows.map((r,i)=>(<div className="bar-row" key={i}><span className="k">{r.k}</span><span className="track2"><span className="fill" style={{width:(r.c / mx * 100) + "%"}}></span></span><span className="v">{r.c}</span></div>))}
      <div className="hint" style={{marginTop:8}}>Average allocation per item (total {q.total}{q.unit ? (" " + q.unit) : ""}).</div>
    </div>);
  }

  if (q.type === "star_rating"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n));
    const avg = nums.length ? nums.reduce((a,b)=>a + b, 0) / nums.length : 0;
    const dist = []; for (let k = 1; k <= q.max; k++) dist.push({ k: k + "\u2605", c: nums.filter((n)=>n === k).length });
    const mx = Math.max(1, ...dist.map((d)=>d.c));
    return (<div className="card pad-lg">{head(nums.length ? ("avg " + avg.toFixed(2) + " / " + q.max) : "")}
      {dist.map((d,i)=>(<div className="bar-row" key={i}><span className="k">{d.k}</span><span className="track2"><span className="fill" style={{width:(d.c / mx * 100) + "%"}}></span></span><span className="v">{d.c}</span></div>))}
    </div>);
  }

  if (q.type === "slider"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n));
    const avg = nums.length ? nums.reduce((a,b)=>a + b, 0) / nums.length : 0;
    return (<div className="card pad-lg">{head()}<div className="statgrid">
      <div><div className="bignum">{nums.length ? avg.toFixed(1) : "-"}</div><div className="hint">Average</div></div>
      <div><div className="bignum">{nums.length ? Math.min(...nums) : "-"}</div><div className="hint">Min</div></div>
      <div><div className="bignum">{nums.length ? Math.max(...nums) : "-"}</div><div className="hint">Max</div></div>
    </div></div>);
  }

  if (q.type === "nps"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n));
    const n = nums.length || 1;
    const prom = nums.filter((x)=>x >= 9).length, det = nums.filter((x)=>x <= 6).length, pass = nums.filter((x)=>x === 7 || x === 8).length;
    const nps = Math.round((prom / n - det / n) * 100);
    return (<div className="card pad-lg">{head()}<div className="statgrid">
      <div><div className="bignum">{nums.length ? nps : "-"}</div><div className="hint">NPS</div></div>
      <div><div className="bignum">{prom}</div><div className="hint">Promoters</div></div>
      <div><div className="bignum">{pass}</div><div className="hint">Passives</div></div>
      <div><div className="bignum">{det}</div><div className="hint">Detractors</div></div>
    </div></div>);
  }

  if (q.type === "date"){
    const ds = vals.map(String).filter(Boolean).sort();
    return (<div className="card pad-lg">{head()}<div className="hint">{ds.length ? ("Earliest " + ds[0] + ", latest " + ds[ds.length - 1]) : "No data yet."}</div></div>);
  }

  return (<div className="card pad-lg">{head()}<div className="hint">{answered ? (answered + " text response" + (answered === 1 ? "" : "s") + ". See the Responses tab for details.") : "No data yet."}</div></div>);
}

function AnalyticsTab({ id, form }){
  const [a, setA] = useState(null);
  const [rows, setRows] = useState(null);
  useEffect(()=>{ api.analytics(id).then(({data})=> setA(data || {})); },[id]);
  useEffect(()=>{ api.responses(id).then(({data})=> setRows((data && data.responses) || [])); },[id]);
  if (!a || rows === null) return <div className="muted">Loading...</div>;
  const inputQs = (form.schema.questions || []).filter((q)=> QTYPES[q.type] && QTYPES[q.type].isInput);
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr",gap:18,maxWidth:680}}>
      <ExportButtons id={id} form={form} rows={rows} />
      <div className="card pad-lg"><div className="label">Total responses</div><div style={{fontFamily:"var(--display)",fontSize:46,fontWeight:600,lineHeight:1}}>{a.total || 0}</div></div>
      {inputQs.length > 0 && <div className="label" style={{marginTop:4}}>Question breakdown</div>}
      {inputQs.map((q)=><QuestionStat key={q.id} q={q} rows={rows} />)}
      <div className="label" style={{marginTop:4}}>Audience</div>
      <BarCard title="Responses by day" rows={(a.byDay || []).map((d)=>({ k:d.date, c:d.count }))} />
      <BarCard title="By country" rows={(a.byCountry || []).map((d)=>({ k:d.name, c:d.count }))} />
      <BarCard title="By browser" rows={(a.byBrowser || []).map((d)=>({ k:d.name, c:d.count }))} />
    </div>
  );
}

function App(){
  const [path, setPath] = useState(window.location.pathname);
  const [user, setUser] = useState(undefined);
  const [toastMsg, setToastMsg] = useState(null);
  const toastTimer = useRef(null);
  const toast = useCallback((m)=>{ setToastMsg(m); clearTimeout(toastTimer.current); toastTimer.current = setTimeout(()=>setToastMsg(null), 2400); },[]);
  const navigate = useCallback((to, replace)=>{ if (replace) window.history.replaceState({}, "", to); else window.history.pushState({}, "", to); setPath(to); window.scrollTo(0,0); },[]);
  useEffect(()=>{ const onPop=()=>setPath(window.location.pathname); window.addEventListener("popstate", onPop); return ()=>window.removeEventListener("popstate", onPop); },[]);
  useEffect(()=>{ api.me().then(({data})=> setUser((data && data.user) || null)).catch(()=>setUser(null)); },[]);
  const ctx = useMemo(()=>({ user, setUser, navigate, toast }), [user, navigate, toast]);

  let view;
  if (user === undefined){
    view = <div className="center-screen"><div style={{color:"var(--bo)"}}><Logo size={34} /></div></div>;
  } else {
    const seg = path.split("/").filter(Boolean);
    const reserved = new Set(["dashboard","builder","login","api","assets","favicon.ico","robots.txt"]);
    if (seg.length === 1 && !reserved.has(seg[0])) view = <PublicForm username="admin" slug={seg[0]} />;
    else if (seg.length === 2 && !reserved.has(seg[0])) view = <PublicForm username={seg[0]} slug={seg[1]} />;
    else if (seg.length === 0) view = user ? <Dashboard/> : <Landing/>;
    else if (seg[0] === "login") view = <Landing showLogin />;
    else if (!user) view = <Landing showLogin />;
    else if (seg[0] === "dashboard" && seg.length === 1) view = <Dashboard/>;
    else if (seg[0] === "dashboard" && seg.length === 2) view = <FormDashboard id={seg[1]} />;
    else if (seg[0] === "builder" && seg.length === 2) view = <Builder formId={seg[1]} />;
    else view = <div className="center-screen"><h2>Not found</h2><button className="btn" onClick={()=>navigate(user ? "/dashboard" : "/")}>Go home</button></div>;
  }
  return (<Ctx.Provider value={ctx}>{view}{toastMsg && <div className="toast">{toastMsg}</div>}</Ctx.Provider>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
