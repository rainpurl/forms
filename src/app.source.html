<style>
:root{
  --bo:#5b4fe0;            /* primary blue-purple */
  --bo-dark:#4536c9;
  --ink:#1b1830;
  --ink-soft:#6a6580;
  --line:#e7e4f3;
  --line-strong:#d6d1ea;
  --paper:#f6f5fc;
  --card:#ffffff;
  --good:#2f7d52;
  --bad:#b23b3b;
  --radius:14px;
  --sans:'Mozilla Text',system-ui,-apple-system,sans-serif;
  --display:'Mozilla Headline','Mozilla Text',system-ui,sans-serif;
  --mono:'Mozilla Text',system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit}
button{font-family:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
h1,h2,h3{font-family:var(--display);font-weight:500;letter-spacing:-0.01em;margin:0}
.mono{font-family:var(--mono)}
.muted{color:var(--ink-soft)}

/* layout */
.wrap{max-width:1040px;margin:0 auto;padding:0 22px}
.page{padding:28px 0 80px}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.stack{display:flex;flex-direction:column}
.grow{flex:1}

/* nav */
.nav{border-bottom:1px solid var(--line);background:rgba(246,245,252,.88);backdrop-filter:saturate(1.4) blur(8px);position:sticky;top:0;z-index:40}
.nav .wrap{height:58px;display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-0.02em;color:var(--bo);cursor:pointer;border:0;background:none;padding:0}
.brand .dot{color:var(--ink)}
.greet{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}

/* buttons */
.btn{appearance:none;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);padding:9px 15px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;transition:.12s ease;line-height:1}
.btn:hover{border-color:#cfcae2;background:#faf9ff}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--bo);border-color:var(--bo);color:#fff}
.btn.primary:hover{background:var(--bo-dark);border-color:var(--bo-dark)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:#edebf8}
.btn.danger{color:#fff;background:var(--bad);border-color:var(--bad)}
.btn.danger:hover{filter:brightness(.95)}
.btn.sm{padding:6px 11px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.iconbtn{border:1px solid var(--line-strong);background:var(--card);width:32px;height:32px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.iconbtn:hover{background:#f0eefb}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius)}
.pad{padding:18px}
.pad-lg{padding:24px}

/* badges */
.badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em}
.badge.open{background:#e8f3ec;color:var(--good)}
.badge.closed{background:#edebf8;color:var(--ink-soft)}

/* tables */
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;padding:10px 14px;border-bottom:1px solid var(--line)}
.table td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.table tr.clickable{cursor:pointer}
.table tr.clickable:hover td{background:#f4f3fe}
.table tr:last-child td{border-bottom:0}

/* inputs */
.field{display:block;margin-bottom:14px}
.label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;margin-bottom:6px}
.input,.textarea,.select{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:10px 12px;background:#fff;color:var(--ink);outline:none;transition:.12s}
.input:focus,.textarea:focus,.select:focus{border-color:var(--bo);box-shadow:0 0 0 3px rgba(91,79,224,.16)}
.textarea{min-height:84px;resize:vertical}
.hint{font-size:12.5px;color:var(--ink-soft);margin-top:5px}
.err{font-size:12.5px;color:var(--bad);margin-top:5px;font-weight:600}
.switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none;font-size:14px}
.switch input{display:none}
.switch .track{width:38px;height:22px;border-radius:999px;background:var(--line-strong);position:relative;transition:.15s}
.switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.switch input:checked + .track{background:var(--bo)}
.switch input:checked + .track .knob{left:18px}

/* ai summary card */
.ai{background:linear-gradient(180deg,#fff,#fbfbff);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;position:relative}
.ai .ai-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai .spark{width:16px;height:16px;color:var(--bo)}
.ai .ai-title{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--bo);font-weight:700}
.ai .ai-body{font-size:14.5px;line-height:1.55;color:var(--ink);white-space:pre-wrap}
.ai .ai-foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:10px;border-top:1px dashed var(--line-strong)}
.ai .ai-meta{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.shimmer{height:13px;border-radius:6px;background:linear-gradient(90deg,#eae7f6 25%,#f3f1fb 37%,#eae7f6 63%);background-size:400% 100%;animation:sh 1.4s ease infinite;margin:7px 0}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* bars (analytics) */
.bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13.5px}
.bar-row .k{width:130px;flex:none;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .track2{flex:1;background:#edebf8;border-radius:6px;height:20px;overflow:hidden}
.bar-row .fill{height:100%;background:var(--bo);border-radius:6px}
.bar-row .v{width:42px;flex:none;text-align:right;font-family:var(--mono);font-size:12px}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px}
.tab{appearance:none;border:0;background:none;padding:11px 14px;cursor:pointer;font-weight:600;font-size:14px;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--bo);border-bottom-color:var(--bo)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(24,21,46,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:60}
.modal{background:#fff;border-radius:16px;max-width:520px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.25)}

/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.25)}

/* question card (builder) */
.qcard{border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:12px;overflow:hidden}
.qcard .qhead{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#faf9ff;border-bottom:1px solid var(--line)}
.qcard .qtype{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--bo);font-weight:700}
.qcard .qsummary{font-size:14px;color:var(--ink)}
.qbody{padding:14px}
.addmenu{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.addmenu button{text-align:left;border:1px solid var(--line-strong);background:#fff;border-radius:10px;padding:11px 12px;cursor:pointer}
.addmenu button:hover{border-color:var(--bo);background:#f3f1ff}
.addmenu .t{font-weight:600;font-size:14px}
.addmenu .h{font-size:12px;color:var(--ink-soft);margin-top:2px}

/* landing */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.landing .lo{font-family:var(--display);font-weight:700;font-size:42px;color:var(--bo);letter-spacing:-0.03em}
.landing .lo .dot{color:var(--ink)}
.landing .tag{max-width:430px;color:var(--ink-soft);font-size:16px;margin:14px 0 28px}
.gbtn{display:inline-flex;align-items:center;gap:10px;justify-content:center;width:100%;padding:12px 16px;border-radius:11px;border:1px solid var(--line-strong);background:#fff;font-weight:600;cursor:pointer}
.gbtn:hover{background:#f4f3fe}

/* form scope (respondent + preview): themed */
.form-scope{--fp:#5b4fe0;--fs:#1b1830;--fa:#5b4fe0;font-family:var(--sans)}
.form-scope .fcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px}
.form-scope .ftitle{font-family:var(--display);font-size:27px;color:var(--fs);font-weight:600;line-height:1.2}
.form-scope .fdesc{color:var(--ink-soft);margin-top:8px;font-size:15px}
.form-scope .q{padding:18px 0;border-bottom:1px solid var(--line)}
.form-scope .q:last-of-type{border-bottom:0}
.form-scope .qlabel{font-weight:600;font-size:16px;margin-bottom:10px;color:var(--fs)}
.form-scope .qlabel .req{color:var(--fa);margin-left:3px}
.form-scope .opt{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line-strong);border-radius:10px;margin:7px 0;cursor:pointer;transition:.1s}
.form-scope .opt:hover{border-color:var(--fp)}
.form-scope .opt.sel{border-color:var(--fp);background:color-mix(in srgb,var(--fp) 8%,#fff);box-shadow:0 0 0 1px var(--fp) inset}
.form-scope .opt input{accent-color:var(--fp)}
.form-scope .finput{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:11px 12px;outline:none}
.form-scope .finput:focus{border-color:var(--fp);box-shadow:0 0 0 3px color-mix(in srgb,var(--fp) 18%,transparent)}
.form-scope .submit{background:var(--fa);color:#fff;border:0;padding:12px 22px;border-radius:11px;font-weight:700;font-size:15px;cursor:pointer}
.form-scope .submit:hover{filter:brightness(.95)}
.form-scope .nps{display:flex;gap:6px;flex-wrap:wrap}
.form-scope .nps button{width:42px;height:42px;border:1px solid var(--line-strong);background:#fff;border-radius:9px;cursor:pointer;font-weight:600}
.form-scope .nps button.sel{background:var(--fa);color:#fff;border-color:var(--fa)}
.form-scope .nps-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:6px}
.form-scope input[type=range]{width:100%;accent-color:var(--fp)}
.form-scope .scale{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-soft);margin-top:4px}
.form-scope .ferr{color:#b23b3b;font-size:13px;margin-top:8px;font-weight:600}
.form-page{min-height:100vh;padding:34px 18px 70px;background:var(--paper)}
.form-page-inner{max-width:680px;margin:0 auto}
.center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;gap:14px}

.empty{text-align:center;padding:52px 20px;color:var(--ink-soft)}
.copyfield{display:flex;align-items:center;gap:8px;border:1px solid var(--line-strong);border-radius:10px;padding:7px 7px 7px 12px;background:#faf9ff}
.copyfield code{font-family:var(--mono);font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
@media(max-width:620px){.addmenu{grid-template-columns:1fr}.bar-row .k{width:92px}.hide-sm{display:none}}

/* ---- builder: properties panel + canvas layout ---- */
.builder{display:flex;flex-direction:column;height:100vh;background:#f3f2fb}
.b-top{height:54px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#fff;border-bottom:1px solid var(--line)}
.b-top .saved-note{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
.b-tools{position:relative}
.menu{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--line-strong);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.14);padding:6px;min-width:170px;z-index:50}
.menu button{display:block;width:100%;text-align:left;border:0;background:none;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:14px;color:var(--ink)}
.menu button:hover{background:#f0eefb}
.menu button.danger-text{color:var(--bad)}
.b-main{flex:1;display:flex;min-height:0}
.b-rail{width:54px;flex:none;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding-top:12px;gap:6px}
.b-rail button{width:38px;height:38px;border:0;background:none;border-radius:9px;cursor:pointer;color:var(--ink-soft);display:inline-flex;align-items:center;justify-content:center}
.b-rail button:hover{background:#f0eefb;color:var(--ink)}
.b-rail button.active{background:#eceaff;color:var(--bo)}
.b-panel{width:320px;flex:none;background:#fff;border-right:1px solid var(--line);overflow:auto;padding:18px}
.panel-title{font-family:var(--display);font-size:18px;margin-bottom:14px}
.panel-section{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;margin:16px 0 9px;padding-top:13px;border-top:1px solid var(--line)}
.panel-section:first-of-type{border-top:0;padding-top:0;margin-top:4px}
.opt-radio{display:flex;align-items:center;gap:9px;padding:7px 0;cursor:pointer;font-size:14px}
.opt-radio.disabled{opacity:.5;cursor:not-allowed}
.opt-radio input{accent-color:var(--bo)}
.stepper{display:inline-flex;align-items:center;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden}
.stepper button{width:36px;height:34px;border:0;background:#fff;cursor:pointer;font-size:17px;color:var(--ink)}
.stepper button:hover{background:#f0eefb}
.stepper button:disabled{opacity:.4;cursor:not-allowed}
.stepper span{min-width:42px;text-align:center;font-family:var(--mono);font-size:14px;border-left:1px solid var(--line);border-right:1px solid var(--line);height:34px;display:inline-flex;align-items:center;justify-content:center}
.b-canvas{flex:1;overflow:auto;padding:26px 22px 90px}
.b-canvas-inner{max-width:840px;margin:0 auto}
.canvas-title{width:100%;border:0;background:none;font-family:var(--display);font-size:26px;font-weight:600;color:var(--ink);padding:6px 4px;margin-bottom:14px;outline:none;border-bottom:1px solid transparent}
.canvas-title:focus{border-bottom-color:var(--line-strong)}
.qblock{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:18px}
.qblock-head{padding:11px 16px;background:#f6f5ff;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700}
.qblock-body{padding:14px}
.qblock-foot{padding:12px 14px;border-top:1px solid var(--line);background:#faf9ff}

/* ---- new question types: respondent ---- */

/* ---- round 4: animations, drag-drop, trash, pages, analytics ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.985)}to{opacity:1;transform:none}}

.qccard,.pbreak{animation:fadeUp .25s ease both}
.overlay{animation:fadeIn .18s ease both}
.modal{animation:pop .22s cubic-bezier(.2,.8,.2,1) both}

.menu{animation:pop .15s ease both}

.form-scope .fbtn-ghost{border:1px solid var(--line-strong);background:#fff;color:var(--fs);padding:11px 18px;border-radius:10px;font-weight:600;cursor:pointer;transition:background .14s}

/* trash */

/* analytics aggregates */
.statgrid{display:flex;gap:26px;flex-wrap:wrap}

.rankresult .rr-pos{width:24px;height:24px;flex:none;border-radius:50%;background:var(--bo);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:var(--mono)}
.rankresult .rr-name{flex:1}

/* ---- round 5: real logo, fonts, header image, end-of-form, footer ---- */

.himg-upload{display:inline-flex;align-items:center;gap:8px;border:1px dashed var(--line-strong);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:13px;color:var(--ink-soft);background:#fff;transition:border-color .12s,color .12s}

.drag-handle{cursor:grab;touch-action:none}
.drag-handle:active{cursor:grabbing}

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useLayoutEffect, useRef, useMemo, useCallback, createContext, useContext } = React;

/* ----------------------------- api client ----------------------------- */
async function req(url, opts){
  const r = await fetch(url, Object.assign({ credentials:"include" }, opts||{}));
  let data = null;
  try { data = await r.json(); } catch(e){ data = null; }
  return { ok: r.ok, status: r.status, data };
}
const api = {
  me: () => req("/api/me"),
  loginAdmin: (password) => req("/api/auth/admin", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ password }) }),
  logout: () => req("/api/auth/logout", { method:"POST" }),
  listForms: () => req("/api/forms"),
  createForm: (payload) => req("/api/forms", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) }),
  getForm: (id) => req("/api/forms/" + id),
  updateForm: (id, payload) => req("/api/forms/" + id, { method:"PUT", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) }),
  deleteForm: (id) => req("/api/forms/" + id, { method:"DELETE" }),
  responses: (id) => req("/api/forms/" + id + "/responses"),
  analytics: (id) => req("/api/forms/" + id + "/analytics"),
  dashSummary: (refresh) => req("/api/summary" + (refresh ? "?refresh=1" : "")),
  formSummary: (id, refresh) => req("/api/forms/" + id + "/summary" + (refresh ? "?refresh=1" : "")),
  publicForm: (username, slug) => req("/api/public/" + encodeURIComponent(username) + "/" + encodeURIComponent(slug)),
  submit: (formId, payload) => req("/api/public/" + formId + "/responses", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) }),
};

/* ----------------------------- helpers ----------------------------- */
const uid = () => Math.random().toString(36).slice(2, 9);
const isEmpty = (v) => v === null || v === undefined || v === "" || (Array.isArray(v) && v.length === 0);
const FORM_FONTS = {
  sans: "Figtree,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif",
  serif: "'Georgia Pro',Georgia,'Times New Roman',serif",
  mono: "ui-monospace,'SF Mono',Menlo,monospace",
  slab: "'Roboto Slab',Georgia,serif",
  zetetiq: "'Mozilla Text','Mozilla Headline',system-ui,sans-serif",
};
function readImageScaled(file, maxW, cb){
  const reader = new FileReader();
  reader.onerror = ()=>cb(null);
  reader.onload = ()=>{
    const img = new Image();
    img.onerror = ()=>cb(null);
    img.onload = ()=>{
      const scale = Math.min(1, maxW / (img.width || maxW));
      const w = Math.max(1, Math.round((img.width || maxW) * scale));
      const h = Math.max(1, Math.round((img.height || maxW) * scale));
      try {
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL("image/jpeg", 0.82));
      } catch (e) { cb(reader.result); }
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function fmtDate(s){
  if (!s) return "";
  const d = new Date(s.replace(" ", "T") + (s.includes("Z") ? "" : "Z"));
  if (isNaN(d)) return s;
  return d.toLocaleString(undefined, { year:"numeric", month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
}
function Spark(){
  return (<svg className="spark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6L12 2zM19 14l.8 2.7L22.5 17l-2.7.8L19 20.5l-.8-2.7L15.5 17l2.7-.8L19 14z"/></svg>);
}

/* ----------------------------- app context ----------------------------- */
const Ctx = createContext(null);
const useApp = () => useContext(Ctx);

/* ----------------------------- question registry ----------------------------- */
const QTYPES = {
  multiple_choice: {
    label: "Multiple choice",
    hint: "Single, multi-select, or dropdown",
    isInput: true,
    make: () => ({ type:"multiple_choice", id: uid(), label:"Untitled question", required:false, request:false, multi:false, display:"list", options:["Option 1","Option 2"], randomize:false }),
    summary: (q) => q.options.length + " options, " + (q.display === "dropdown" ? "dropdown" : (q.multi ? "multiple answers" : "one answer")),
    validate: (q, v) => {
      if (!q.required) return null;
      if (q.multi) return (Array.isArray(v) && v.length) ? null : "Please select at least one option.";
      return v ? null : "Please select an option.";
    },
    Editor: ({ q, update }) => {
      const setOpt = (i, val) => { const o = q.options.slice(); o[i] = val; update({ options:o }); };
      return (
        <div>
          <Field label="Question"><input className="input" value={q.label} onChange={(ev)=>update({label:ev.target.value})} /></Field>
          <Field label="Type">
            <select className="select" value={q.mode} onChange={(ev)=>update({mode:ev.target.value})}>
              <option value="single">Single select (radio)</option>
              <option value="multi">Multi select (checkbox)</option>
              <option value="dropdown">Dropdown</option>
            </select>
          </Field>
          <div className="label">Options</div>
          {q.options.map((opt, i) => (
            <div className="row" key={i} style={{marginBottom:7}}>
              <input className="input" value={opt} onChange={(ev)=>setOpt(i, ev.target.value)} />
              <button className="iconbtn" title="Remove" disabled={q.options.length <= 1} onClick={()=>update({options: q.options.filter((_,k)=>k!==i)})}>×</button>
            </div>
          ))}
          <button className="btn sm" onClick={()=>update({options: q.options.concat(["Option " + (q.options.length + 1)])})}>+ Add option</button>
          <div style={{marginTop:14}} className="row">
            <Toggle checked={q.required} onChange={(c)=>update({required:c})} label="Required (force response)" />
            <Toggle checked={q.request} onChange={(c)=>update({request:c})} label="Request response" />
            <Toggle checked={q.randomize} onChange={(c)=>update({randomize:c})} label="Randomize options" />
          </div>
        </div>
      );
    },
    Renderer: ({ q, value, onChange, error }) => {
      const opts = useMemo(()=> q.randomize ? shuffle(q.options) : q.options, [q.id]);
      if (q.display === "dropdown"){
        return (
          <div className="q">
            <QLabel q={q} />
            <select className="finput" value={value || ""} onChange={(ev)=>onChange(ev.target.value)}>
              <option value="">Select...</option>
              {opts.map((o,i)=>(<option key={i} value={o}>{o}</option>))}
            </select>
            {error && <div className="ferr">{error}</div>}
          </div>
        );
      }
      const multi = !!q.multi;
      const arr = Array.isArray(value) ? value : [];
      const toggle = (o) => {
        if (multi) onChange(arr.includes(o) ? arr.filter(x=>x!==o) : arr.concat([o]));
        else onChange(o);
      };
      return (
        <div className="q">
          <QLabel q={q} />
          {opts.map((o,i)=>{
            const sel = multi ? arr.includes(o) : value === o;
            return (
              <label className={"opt" + (sel ? " sel" : "")} key={i}>
                <input type={multi ? "checkbox" : "radio"} checked={sel} onChange={()=>toggle(o)} />
                <span>{o}</span>
              </label>
            );
          })}
          {error && <div className="ferr">{error}</div>}
        </div>
      );
    },
  },

  text_entry: {
    label: "Text entry",
    hint: "Short line or long paragraph",
    isInput: true,
    make: () => ({ type:"text_entry", id: uid(), label:"Untitled question", required:false, request:false, mode:"short", placeholder:"", validation:"none", minLength:0 }),
    summary: (q) => (q.mode === "short" ? "short text" : "paragraph") + (q.validation !== "none" ? ", " + q.validation : ""),
    validate: (q, v) => {
      const s = v == null ? "" : String(v);
      if (q.required && !s.trim()) return "This field is required.";
      if (!s.trim()) return null;
      if (q.validation === "email" && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(s)) return "Enter a valid email address.";
      if (q.validation === "phone" && !/^[\d\s()+\-]{7,}$/.test(s)) return "Enter a valid phone number.";
      if (q.validation === "number" && !/^-?\d+(\.\d+)?$/.test(s.trim())) return "Enter a number.";
      if (q.minLength && s.trim().length < q.minLength) return "Please enter at least " + q.minLength + " characters.";
      return null;
    },
    Editor: ({ q, update }) => (
      <div>
        <Field label="Question"><input className="input" value={q.label} onChange={(ev)=>update({label:ev.target.value})} /></Field>
        <div className="row">

/* small shared bits */
function Field({ label, children, style }){ return (<label className="field" style={style}><span className="label">{label}</span>{children}</label>); }
function Toggle({ checked, onChange, label }){
  return (<label className="switch"><input type="checkbox" checked={!!checked} onChange={(e)=>onChange(e.target.checked)} /><span className="track"><span className="knob"></span></span><span>{label}</span></label>);
}
function QLabel({ q }){ return (<div className="qlabel">{q.label}{q.required && <span className="req">*</span>}</div>); }

/* ----------------------------- overview card ----------------------------- */
function AiSummary({ fetcher }){
  const [state, setState] = useState({ loading:true, summary:"", meta:null, error:null });
  const load = useCallback((refresh)=>{
    setState(s=>({ ...s, loading:true }));
    fetcher(refresh).then(({ok,data})=>{
      if (!ok || !data){ setState({ loading:false, summary:"", meta:null, error:"Could not load summary." }); return; }
      setState({ loading:false, summary:data.summary||"", meta:data, error:null });
    });
  },[fetcher]);
  useEffect(()=>{ load(false); },[load]);
  const m = state.meta;
  let metaText = "thinking...";
  if (!state.loading && m){
    if (m.generated === false) metaText = "basic summary";
    else if (m.cached) metaText = "cached";
    else if (m.generated) metaText = "generated just now";
    else metaText = "";
  }
  return (
    <div className="ai" style={{marginBottom:22}}>
      <div className="ai-head"><Spark/><span className="ai-title">Overview</span></div>
      {state.loading
        ? (<div><div className="shimmer" style={{width:"94%"}}/><div className="shimmer" style={{width:"88%"}}/><div className="shimmer" style={{width:"55%"}}/></div>)
        : (<div className="ai-body">{state.summary || state.error || "No summary available."}</div>)}
      <div className="ai-foot">
        <span className="ai-meta">{metaText}</span>
        <button className="btn sm ghost" disabled={state.loading} onClick={()=>load(true)}>Refresh</button>
      </div>
    </div>
  );
}

/* ----------------------------- shared form renderer ----------------------------- */
function answerToText(v){
  if (v === null || v === undefined) return "";
  if (Array.isArray(v)) return v.join(", ");
  if (typeof v === "object") return Object.keys(v).map((k)=>k + ":" + (Array.isArray(v[k]) ? v[k].join("/") : v[k])).join(",");
  return String(v);
}
function qVisible(q, answers){
  const lg = q.logic;
  if (!lg || !lg.q) return true;
  const a = answers[lg.q];
  const empty = a === undefined || a === null || a === "" || (Array.isArray(a) && a.length === 0);
  if (empty) return false;
  const val = String(lg.value || "").toLowerCase();
  const arr = Array.isArray(a) ? a.map((x)=>String(x).toLowerCase()) : null;
  const txt = answerToText(a).toLowerCase();
  if (lg.op === "ne") return arr ? !arr.includes(val) : (txt !== val);
  if (lg.op === "contains") return arr ? arr.some((x)=>x.includes(val)) : txt.includes(val);
  return arr ? arr.includes(val) : (txt === val);
}

function FormRenderer({ form, preview, onSubmit, submitting }){
  const questions = form.schema.questions || [];
  const settings = form.schema.settings || {};
  const conversational = !!settings.conversational;
  const startRef = useRef(Date.now());
  const steps = useMemo(()=>{
    const real = questions.filter((q)=> q.type !== "hidden_field");
    if (conversational){
      const items = real.filter((q)=> q.type !== "page_break");
      const list = settings.randomizeQuestions ? shuffle(items) : items;
      const out = list.map((q)=>[q]);
      return out.length ? out : [[]];
    }
    const ps = [[]];
    for (const q of real){ if (q.type === "page_break") ps.push([]); else ps[ps.length - 1].push(q); }
    let out = ps.filter((p)=>p.length);
    if (!out.length) out = [[]];
    return settings.randomizeQuestions ? out.map((p)=>shuffle(p)) : out;
  }, [form.id, questions.length, settings.randomizeQuestions, conversational]);

  const [page, setPage] = useState(0);
  const [answers, setAnswers] = useState({});
  const [errors, setErrors] = useState({});
  const setA = (qid, v) => setAnswers((a)=>({ ...a, [qid]: v }));

  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const init = {};
    questions.forEach((q)=>{ if (q.type === "hidden_field"){ init[q.id] = q.source === "fixed" ? (q.value || "") : (params.get(q.key) || q.value || ""); } });
    if (Object.keys(init).length) setAnswers((a)=>({ ...init, ...a }));
  }, [form.id]);

  const theme = form.theme || {};
  const scopeStyle = { "--fp": theme.primary || "#5b4fe0", "--fs": theme.secondary || "#1b1830", "--fa": theme.accent || theme.primary || "#5b4fe0", fontFamily: FORM_FONTS[theme.font] || FORM_FONTS.sans };

  const stepHasVisible = (i) => steps[i] && steps[i].some((q)=> qVisible(q, answers));
  const cur = Math.min(page, steps.length - 1);
  const visibleIdxs = steps.map((_, i)=>i).filter(stepHasVisible);
  const nextIdx = visibleIdxs.find((i)=> i > cur);
  const prevList = visibleIdxs.filter((i)=> i < cur);
  const prevIdx = prevList.length ? prevList[prevList.length - 1] : undefined;
  const hasNext = nextIdx !== undefined;
  const pos = (visibleIdxs.indexOf(cur) + 1) || 1;
  const total = visibleIdxs.length || 1;
  const multi = total > 1;

  const validateList = (list) => {
    const errs = {};
    for (const q of list){ const def = QTYPES[q.type]; if (!def || !def.isInput) continue; if (!qVisible(q, answers)) continue; const e = def.validate(q, answers[q.id]); if (e) errs[q.id] = e; }
    return errs;
  };
  const goNext = () => {
    if (!preview){ const errs = validateList(steps[cur]); if (Object.keys(errs).length){ setErrors(errs); return; } }
    setErrors({}); if (nextIdx !== undefined){ setPage(nextIdx); window.scrollTo(0, 0); }
  };
  const goBack = () => { setErrors({}); if (prevIdx !== undefined){ setPage(prevIdx); window.scrollTo(0, 0); } };
  const handleSubmit = () => {
    if (preview) return;
    const allErrs = {};
    for (const q of questions){ const def = QTYPES[q.type]; if (!def || !def.isInput) continue; if (!qVisible(q, answers)) continue; const e = def.validate(q, answers[q.id]); if (e) allErrs[q.id] = e; }
    if (Object.keys(allErrs).length){ setErrors(allErrs); const bad = steps.findIndex((st)=> st.some((q)=> allErrs[q.id])); if (bad >= 0) setPage(bad); return; }
    const skipped = questions.filter((q)=> QTYPES[q.type] && QTYPES[q.type].isInput && q.type !== "hidden_field" && qVisible(q, answers) && q.request && isEmpty(answers[q.id]));
    if (skipped.length){ const names = skipped.map((q)=>q.label || "a question").join(", "); if (!window.confirm("You skipped: " + names + ". Submit anyway?")) return; }
    setErrors({});
    const params = new URLSearchParams(window.location.search);
    const utm = {}; ["source","medium","campaign","term","content"].forEach((k)=>{ const v = params.get("utm_" + k); if (v) utm[k] = v; });
    const seconds = Math.max(0, Math.round((Date.now() - startRef.current) / 1000));
    onSubmit(answers, { seconds, utm });
  };

  const shown = (steps[cur] || []).filter((q)=> qVisible(q, answers));
  return (
    <div className="form-scope" style={scopeStyle}>
      <div className="fcard">
        {settings.headerImage && <img className="fheader-img" src={settings.headerImage} alt="" />}
        <div className="ftitle">{form.title}</div>
        {form.description && <div className="fdesc">{form.description}</div>}
        {multi && <div className="fprogress"><div className="fprogress-bar" style={{width:((pos / total) * 100) + "%"}}></div></div>}
        <div className="fpage" key={cur} style={{marginTop:12}}>
          {shown.map((q)=>{ const def = QTYPES[q.type]; if (!def) return null; const R = def.Renderer; return <R key={q.id} q={q} value={answers[q.id]} onChange={(v)=>setA(q.id, v)} error={errors[q.id]} />; })}
          {shown.length === 0 && <div className="muted" style={{fontSize:13}}>Nothing to show on this step.</div>}
        </div>
        <div className="fnav" style={{marginTop:18}}>
          {multi && prevIdx !== undefined && <button className="fbtn-ghost" onClick={goBack} disabled={submitting}>Back</button>}
          {multi && <span className="fpage-count">Page {pos} of {total}</span>}
          <span className="grow"></span>
          {hasNext
            ? <button className="submit" onClick={goNext}>Next</button>
            : <button className="submit" onClick={handleSubmit} disabled={preview || submitting}>{submitting ? "Submitting..." : "Submit"}</button>}
        </div>
        {preview && <div className="muted" style={{fontSize:13,marginTop:8}}>Preview mode, submit disabled</div>}
      </div>
    </div>
  );
}

function PublicForm({ username, slug }){
  const [st, setSt] = useState({ loading:true });
  const [submitting, setSubmitting] = useState(false);
  const [done, setDone] = useState(false);
  useEffect(()=>{
    let m = true;
    api.publicForm(username, slug).then(({ok,data})=>{
      if (!m) return;
      if (!ok || !data || data.error || !data.form) setSt({ loading:false, notFound:true });
      else setSt({ loading:false, form:data.form });
    });
    return ()=>{ m = false; };
  },[username, slug]);

  if (st.loading) return <div className="center-screen"><div className="muted">Loading...</div></div>;
  if (st.notFound) return <div className="center-screen"><h2>Form not found</h2><p className="muted">This link may be wrong, or the form was removed.</p></div>;
  const form = st.form;
  const scope = { "--fa": (form.theme && form.theme.accent) || "#5b4fe0", fontFamily: FORM_FONTS[form.theme && form.theme.font] || FORM_FONTS.sans };

  if (!form.is_open){
    return (<div className="form-page"><div className="form-page-inner"><div className="form-scope" style={scope}><div className="fcard"><div className="ftitle">{form.title}</div><p className="fdesc">This form is no longer accepting responses.</p></div></div></div></div>);
  }
  if (done){
    const set = (form.schema && form.schema.settings) || {};
    const btnUrl = set.endButtonUrl ? (/^https?:\/\//i.test(set.endButtonUrl) ? set.endButtonUrl : ("https://" + set.endButtonUrl)) : null;
    return (<div className="form-page"><div className="form-page-inner"><div className="form-scope" style={scope}><div className="fcard" style={{textAlign:"center"}}>{set.headerImage && <img className="fheader-img" src={set.headerImage} alt="" />}<div style={{fontSize:38,color:"var(--fa)"}}>✓</div><div className="ftitle" style={{marginTop:6}}>{set.endTitle || "Thank you"}</div><p className="fdesc">{set.endMessage || "Your response has been recorded."}</p>{set.endButtonLabel && btnUrl && <a className="fcta" href={btnUrl} target="_blank" rel="noopener">{set.endButtonLabel}</a>}</div></div><div style={{textAlign:"center",marginTop:18}}><a className="builtby" href="https://zetetiq.pages.dev" target="_blank" rel="noopener">powered by <Logo size={13} /></a></div></div></div>);
  }
  const submit = (answers, extra) => {
    extra = extra || {};
    setSubmitting(true);
    api.submit(form.id, { data: answers, viewport: { w: window.innerWidth, h: window.innerHeight }, referrer: document.referrer, seconds: extra.seconds, utm: extra.utm }).then(({ok,data})=>{
      setSubmitting(false);
      if (ok && data && data.ok){
        const r = form.schema && form.schema.settings && form.schema.settings.redirectUrl;
        if (r){ window.location.href = /^https?:\/\//i.test(r) ? r : ("https://" + r); return; }
        setDone(true);
      }
      else window.alert((data && data.error === "form_closed") ? "This form just closed." : "Something went wrong. Please try again.");
    });
  };
  return (
    <div className="form-page"><div className="form-page-inner">
      <FormRenderer form={form} onSubmit={submit} submitting={submitting} />
      <div style={{textAlign:"center",marginTop:18}}><a className="builtby" href="https://zetetiq.pages.dev" target="_blank" rel="noopener">powered by <Logo size={13} /></a></div>
    </div></div>
  );
}

          <div className="pad-lg">

            <div className="between"><button className="btn ghost" onClick={()=>setOpen(false)}>Cancel</button><button className="btn primary" disabled={busy || !pw} onClick={doLogin}>{busy ? "Checking..." : "Log in"}</button></div>

function MCCanvas({ q, update }){
  const marker = q.multi ? "sq" : "rd";
  const setOpt = (i, v) => { const o = q.options.slice(); o[i] = v; update({ options: o }); };
  const add = () => update({ options: q.options.concat(["Option " + (q.options.length + 1)]) });
  const rm = (i) => update({ options: q.options.filter((_, k) => k !== i) });
  return (
    <div>
      {q.display === "dropdown" && <div className="mono" style={{fontSize:11,color:"var(--ink-soft)",marginBottom:6}}>Shown as a dropdown</div>}
      {q.options.map((o, i) => (
        <div className="wq-choice" key={i}>
          <span className={"wq-mark " + marker}></span>
          <input className="wq-choice-input" placeholder={"Click to write Choice " + (i + 1)} value={o} onChange={(e)=>setOpt(i, e.target.value)} />
          <button className="iconbtn" style={{width:26,height:26}} title="Remove choice" disabled={q.options.length <= 1} onClick={()=>rm(i)}>×</button>
        </div>
      ))}
      <button className="wq-addchoice" onClick={add}>+ Add choice</button>
    </div>
  );
}

      <input type="range" min={q.min} max={q.max} step={q.step} defaultValue={mid} disabled style={{width:"100%",accentColor:"var(--bo)"}} />

function CanvasCard({ q, index, selected, onSelect, update, onDup, onDel, onUp, onDown, dnd, cardRef }){
  const [menu, setMenu] = useState(false);
  const handle = {
    draggable: true,
    onDragStart: (e)=>{ e.stopPropagation(); dnd.start(index); try { e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", String(index)); } catch (_) {} },
    onDragEnd: ()=>dnd.end(),
  };
  const dropProps = {
    onDragOver: (e)=>{ e.preventDefault(); dnd.over_(index); },
    onDrop: (e)=>{ e.preventDefault(); dnd.drop(index); },
  };
  if (q.type === "page_break"){
    return (
      <div ref={cardRef} className={"pbreak" + (selected ? " sel" : "") + (dnd.draggingId === q.id ? " dragging" : "")} onClick={onSelect} {...dropProps}>
        <span className="drag-handle" {...handle} title="Drag to reorder">⠿</span>
        <span className="pbreak-line"></span>
        <span className="pbreak-label">Page break</span>
        <span className="pbreak-line"></span>
        <button className="iconbtn" title="Remove" onClick={(e)=>{ e.stopPropagation(); onDel(); }}>×</button>
      </div>
    );
  }
  if (q.type === "hidden_field"){
    return (
      <div ref={cardRef} className={"qccard" + (selected ? " sel" : "") + (dnd.draggingId === q.id ? " dragging" : "")} onClick={onSelect} {...dropProps}>
        <div className="qcc-head">
          <span className="drag-handle" {...handle} title="Drag to reorder">⠿</span>
          <span className="qcc-num">Q{index + 1}</span>
          <span className="qcc-type mono">Hidden field</span>
          <span className="grow"></span>
          <div className="qcc-menu" onClick={(e)=>e.stopPropagation()}>
            <button className="iconbtn" title="More" onClick={()=>setMenu((m)=>!m)}>···</button>
            {menu && (<div className="menu" style={{right:0,left:"auto"}}><button onClick={()=>{ onDup(); setMenu(false); }}>Duplicate</button><button className="danger-text" onClick={()=>{ onDel(); setMenu(false); }}>Move to trash</button></div>)}
          </div>
        </div>
        <div className="wq-body"><div className="hint">Captures <b>{q.key || "field"}</b> {q.source === "fixed" ? "as a fixed value" : "from the URL"}, hidden from respondents. Edit it in the left panel.</div></div>
      </div>
    );
  }
  return (
    <div ref={cardRef} className={"qccard" + (selected ? " sel" : "") + (dnd.draggingId === q.id ? " dragging" : "")} onClick={onSelect} {...dropProps}>
      <div className="qcc-head">
        <span className="drag-handle" {...handle} title="Drag to reorder">⠿</span>
        <span className="qcc-num">Q{index + 1}</span>
        <span className="qcc-type mono">{QTYPES[q.type].label}</span>

        <span className="grow"></span>
        <div className="qcc-menu" onClick={(e)=>e.stopPropagation()}>
          <button className="iconbtn" title="More" onClick={()=>setMenu((m)=>!m)}>···</button>
          {menu && (
            <div className="menu" style={{right:0,left:"auto"}}>
              <button onClick={()=>{ onUp(); setMenu(false); }}>Move up</button>
              <button onClick={()=>{ onDown(); setMenu(false); }}>Move down</button>
              <button onClick={()=>{ onDup(); setMenu(false); }}>Duplicate</button>
              <button className="danger-text" onClick={()=>{ onDel(); setMenu(false); }}>Move to trash</button>
            </div>
          )}
        </div>
      </div>
      {q.type === "text_graphic" ? (
        <div>
          <input className="wq-title" placeholder="Heading" value={q.heading || ""} onChange={(e)=>update({heading:e.target.value})} />
          <textarea className="wq-textarea" placeholder="Add text or instructions" value={q.content || ""} onChange={(e)=>update({content:e.target.value})} />
        </div>
      ) : (

      )}
      <div className="wq-body">
        {q.type === "multiple_choice" && <MCCanvas q={q} update={update} />}
        {q.type === "text_entry" && (q.mode === "long"
          ? <div className="wq-prev-input tall">{q.placeholder || "Long answer text"}</div>
          : <div className="wq-prev-input">{q.placeholder || "Short answer text"}</div>)}
        {q.type === "slider" && <SliderPrev q={q} />}
        {q.type === "nps" && <NpsPrev q={q} />}
        {q.type === "matrix" && <MatrixCanvas q={q} update={update} />}

      </div>

  );

          <option value="list">List</option>
          <option value="dropdown">Dropdown</option>
        </select>
      </Field>
      <Toggle checked={!!q.randomize} onChange={(c)=>update({randomize:c})} label="Randomize choice order" />
      <div className="panel-section">Response requirements</div>
      <Toggle checked={!!q.required} onChange={(c)=>update({required:c})} label="Force response" />

function TextControls({ q, update }){
  return (

        <select className="select" value={q.mode} onChange={(e)=>update({mode:e.target.value})}>

function LogicControls({ q, questions, update }){
  const idx = questions.findIndex((x)=>x.id === q.id);
  const priors = questions.slice(0, idx < 0 ? questions.length : idx).filter((x)=> QTYPES[x.type] && QTYPES[x.type].isInput && x.type !== "hidden_field");
  const lg = q.logic || null;
  const on = !!(lg && lg.q);
  const src = priors.find((x)=>x.id === (lg && lg.q));
  const opts = src && src.type === "multiple_choice" ? src.options : (src && src.type === "matrix" ? src.cols : null);
  return (
    <div>
      <div className="panel-section">Display logic</div>
      {priors.length === 0
        ? <div className="hint">Place this question after another input question to show it conditionally.</div>
        : (<div>
            <Toggle checked={on} onChange={(c)=> update({ logic: c ? { q: priors[0].id, op: "eq", value: "" } : null })} label="Show only if a condition is met" />
            {on && (
              <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
                <select className="select" value={lg.q} onChange={(e)=>update({ logic: { q: e.target.value, op: lg.op, value: "" } })}>
                  {priors.map((p)=>(<option key={p.id} value={p.id}>{p.label || p.id}</option>))}
                </select>
                <select className="select" value={lg.op} onChange={(e)=>update({ logic: { ...lg, op: e.target.value } })}>
                  <option value="eq">is</option>
                  <option value="ne">is not</option>
                  <option value="contains">contains</option>
                </select>
                {opts
                  ? (<select className="select" value={lg.value} onChange={(e)=>update({ logic: { ...lg, value: e.target.value } })}><option value="">Choose a value</option>{opts.map((o,i)=>(<option key={i} value={o}>{o}</option>))}</select>)
                  : (<input className="input" placeholder="Value" value={lg.value} onChange={(e)=>update({ logic: { ...lg, value: e.target.value } })} />)}
                <div className="hint">This question appears only when the answer above matches.</div>
              </div>
            )}
          </div>)}
    </div>
  );
}

function LeftEditor({ q, update, questions, setQuestions }){
  const changeType = (type) => {
    if (type === q.type) return;
    const made = QTYPES[type].make();
    made.id = q.id;
    if ("label" in made && q.label !== undefined) made.label = q.label;
    made.required = !!q.required;
    made.request = !!q.request;
    setQuestions(questions.map((x)=> x.id === q.id ? made : x));
  };
  return (
    <div>
      <div className="panel-title">Edit question</div>
      <Field label="Question type">
        <select className="select" value={q.type} onChange={(e)=>changeType(e.target.value)}>
          {QTYPE_ORDER.map((t)=>(<option key={t} value={t}>{QTYPES[t].label}</option>))}
        </select>
      </Field>
      {q.type === "multiple_choice" && <MCControls q={q} update={update} />}
      {q.type === "text_entry" && <TextControls q={q} update={update} />}
      {q.type === "slider" && <SliderControls q={q} update={update} />}
      {q.type === "nps" && <NpsControls q={q} update={update} />}
      {q.type === "matrix" && <MatrixControls q={q} update={update} />}
      {q.type === "rank_order" && <RankControls q={q} update={update} />}
      {q.type === "constant_sum" && <ConstantSumControls q={q} update={update} />}
      {q.type === "form_field" && <FormFieldControls q={q} update={update} />}
      {q.type === "date" && <DateControls q={q} update={update} />}
      {q.type === "star_rating" && <StarControls q={q} update={update} />}
      {q.type === "text_graphic" && <div className="hint" style={{marginTop:6}}>Edit the heading, text, and image directly on the question in the canvas.</div>}
      {q.type === "hidden_field" && <HiddenControls q={q} update={update} />}
      {QTYPES[q.type] && QTYPES[q.type].isInput && q.type !== "hidden_field" && <LogicControls q={q} questions={questions} update={update} />}
    </div>
  );
}

  const [trash, setTrash] = useState([]);            // session only, never saved
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const [dragId, setDragId] = useState(null);
  const [chooser, setChooser] = useState(isNew);

  useEffect(()=>{
    if (isNew) return;
    api.getForm(formId).then(({ ok, data })=>{
      if (ok && data && data.form){ const f = normalizeForm(data.form); setForm(f); if (f.schema.questions[0]) setSel(f.schema.questions[0].id); }
      else setLoadErr(true);
    });
  },[formId, isNew]);

  const cardRefs = useRef({});
  const prevRects = useRef({});
  const flipSig = form ? (form.schema.questions || []).map((q)=>q.id).join(",") : "";
  useLayoutEffect(()=>{
    const refs = cardRefs.current;
    Object.keys(refs).forEach((qid)=>{
      const el = refs[qid]; if (!el) return;
      const prev = prevRects.current[qid];
      const rect = el.getBoundingClientRect();
      if (prev && qid !== dragId){
        const dy = prev.top - rect.top;
        if (Math.abs(dy) > 1){
          el.style.transition = "none";
          el.style.transform = "translateY(" + dy + "px)";
          requestAnimationFrame(()=>{ el.style.transition = "transform 210ms cubic-bezier(.2,.8,.2,1)"; el.style.transform = ""; });
        }
      }
    });
    const next = {};
    Object.keys(refs).forEach((qid)=>{ const el = refs[qid]; if (el) next[qid] = el.getBoundingClientRect(); });
    prevRects.current = next;
  }, [flipSig]);

  if (loadErr) return <FullMsg text="Form not found." onBack={()=>navigate("/dashboard")} />;
  if (!form) return <FullMsg text="Loading..." />;

  const questions = form.schema.questions || [];
  const selQ = questions.find((q)=>q.id === sel) || null;

  const setTheme = (patch)=> setForm((f)=>({ ...f, theme:{ ...f.theme, ...patch } }));
  const setSettings = (patch)=> setForm((f)=>({ ...f, schema:{ ...f.schema, settings:{ ...f.schema.settings, ...patch } } }));
  const setQuestions = (qs)=> setForm((f)=>({ ...f, schema:{ ...f.schema, questions: qs } }));
  const addQ = (type)=>{ const q = QTYPES[type].make(); setQuestions(questions.concat([q])); setSel(q.id); setMode("edit"); };
  const updateQ = (qid, patch)=> setQuestions(questions.map((q)=> q.id === qid ? { ...q, ...patch } : q));
  const removeQ = (qid)=>{ const q = questions.find((x)=>x.id === qid); if (q) setTrash((t)=>[q, ...t]); setQuestions(questions.filter((x)=>x.id !== qid)); if (sel === qid) setSel(null); };
  const restoreQ = (tid)=>{ const q = trash.find((x)=>x.id === tid); if (!q) return; setTrash((t)=>t.filter((x)=>x.id !== tid)); setQuestions(questions.concat([q])); setSel(q.id); setMode("edit"); };
  const moveQ = (i, dir)=>{ const qs = questions.slice(); const j = i + dir; if (j < 0 || j >= qs.length) return; const t = qs[i]; qs[i] = qs[j]; qs[j] = t; setQuestions(qs); };
  const dupQ = (qid)=>{ const qs = questions.slice(); const idx = qs.findIndex((q)=>q.id === qid); const copy = { ...qs[idx], id: uid() }; qs.splice(idx + 1, 0, copy); setQuestions(qs); setSel(copy.id); };
  const reorder = (from, to)=>{ if (from === null || from === to) return; const qs = questions.slice(); const [m] = qs.splice(from, 1); qs.splice(to, 0, m); setQuestions(qs); };
  const moveById = (j)=>{ setQuestions((prev)=>{ const from = prev.findIndex((q)=>q.id === dragId); if (from === -1 || from === j) return prev; const a = prev.slice(); const [m] = a.splice(from, 1); a.splice(j, 0, m); return a; }); };
  const dnd = { draggingId: dragId, start: (i)=>setDragId(questions[i] ? questions[i].id : null), over_: (j)=>{ if (dragId != null) moveById(j); }, drop: ()=>setDragId(null), end: ()=>setDragId(null) };

  const del = ()=>{ if (!id) return; if (!window.confirm("Delete this form and all its responses? This cannot be undone.")) return; api.deleteForm(id).then(()=>{ toast("Form deleted"); navigate("/dashboard"); }); };

  const save = ()=>{
    setSaving(true);
    const payload = { title: form.title, description: form.description, theme: form.theme, schema: form.schema };
    const stamp = ()=> setSavedAt(new Date().toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" }));
    if (!id){
      api.createForm(payload).then(({ ok, data })=>{ setSaving(false); if (ok && data && data.id){ setId(data.id); if (data.slug) setForm((f)=>({ ...f, slug: data.slug })); window.history.replaceState({}, "", "/builder/" + data.id); stamp(); toast("Published"); } else toast("Save failed"); });
    } else {
      api.updateForm(id, payload).then(({ ok })=>{ setSaving(false); if (ok){ stamp(); toast("Saved"); } else toast("Save failed"); });
    }
  };

  const statusBadge = !id ? { cls:"closed", text:"Draft" } : (form.is_open ? { cls:"open", text:"Live" } : { cls:"closed", text:"Closed" });

  const copyLink = () => {
    if (!id){ toast("Publish your form first to get a shareable link."); return; }
    const slug = form.slug;
    if (!slug){ toast("Reopen this form from your dashboard to copy its link."); return; }
    const uname = form.username || (user && user.username) || "admin";
    const link = window.location.origin + "/" + (uname === "admin" ? "" : uname + "/") + slug;
    try { if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(link); } catch (e) {}
    toast("Link copied");
  };

  return (
    <div className="builder">
      {chooser && (
        <div className="overlay" onClick={()=>setChooser(false)}>
          <div className="modal addq-modal" onClick={(e)=>e.stopPropagation()}>
            <div className="addq-modal-head"><div className="panel-title" style={{margin:0}}>Start your form</div><button className="iconbtn" onClick={()=>setChooser(false)} title="Close">×</button></div>
            <div className="addq-grid">
              <button className="addq-item" onClick={()=>setChooser(false)}><div className="t">Blank form</div><div className="h">Start from scratch</div></button>
              {FORM_TEMPLATES.map((t)=>(<button key={t.key} className="addq-item" onClick={()=>{ const f = t.build(); setForm(f); setSel(f.schema.questions[0] ? f.schema.questions[0].id : null); setMode("edit"); setChooser(false); }}><div className="t">{t.name}</div><div className="h">{t.desc}</div></button>))}
            </div>
          </div>
        </div>
      )}
      <div className="b-top">
        <div className="row" style={{gap:12}}>
          <button className="brand" onClick={()=>navigate("/dashboard")}><Logo size={26} /></button>
          <div className="b-tools">
            <button className="btn sm" onClick={()=>setTools((o)=>!o)}>Tools ▾</button>
            {tools && (
              <div className="menu">
                {id && <button onClick={()=>{ navigate("/dashboard/" + id); }}>View responses</button>}
                <button onClick={()=>{ setMode("theme"); setTools(false); }}>Theme</button>
                <button onClick={()=>{ setMode("settings"); setTools(false); }}>Form settings</button>
                {id && <button className="danger-text" onClick={()=>{ setTools(false); del(); }}>Delete form</button>}
              </div>
            )}
          </div>
          <span className="saved-note">{savedAt ? "Saved at " + savedAt : (id ? "Saved" : "Not saved yet")}</span>
          <span className={"badge " + statusBadge.cls}>{statusBadge.text}</span>
        </div>
        <div className="row">
          <button className="btn" onClick={()=>setPreview((p)=>!p)}>{preview ? "Edit" : "Preview"}</button>
          <button className="btn" onClick={copyLink}>Copy link</button>
          <button className="btn primary" disabled={saving} onClick={save}>{saving ? "Saving..." : "Publish"}</button>
        </div>
      </div>

      {preview ? (
        <div className="b-preview"><div style={{maxWidth:680, margin:"26px auto", padding:"0 18px"}}><FormRenderer form={form} preview /></div></div>
      ) : (
        <div className="b-main" onClick={()=>{ if (tools) setTools(false); }}>
          <div className="b-rail">
            <button className={mode === "edit" ? "active" : ""} title="Questions" onClick={()=>setMode("edit")}><IconList /></button>
            <button className={mode === "theme" ? "active" : ""} title="Theme" onClick={()=>setMode("theme")}><IconTheme /></button>
            <button className={mode === "settings" ? "active" : ""} title="Form settings" onClick={()=>setMode("settings")}><IconCog /></button>
          </div>

          <div className="b-panel">
            {mode === "edit" && (selQ
              ? <LeftEditor q={selQ} update={(p)=>updateQ(selQ.id, p)} questions={questions} setQuestions={setQuestions} />
              : <div><div className="panel-title">Edit question</div><div className="muted" style={{fontSize:14}}>Select a question in the canvas to edit it here, or add a new question.</div></div>)}
            {mode === "theme" && <ThemePanel form={form} setTheme={setTheme} setSettings={setSettings} />}
            {mode === "settings" && <SettingsPanel form={form} setForm={setForm} setSettings={setSettings} id={id} del={del} />}
          </div>

          <div className="b-canvas">
            {mode === "theme" ? (
              <div style={{maxWidth:680,margin:"26px auto",padding:"0 18px"}}><FormRenderer form={form} preview /></div>
            ) : (
            <div className="b-canvas-inner">
              {form.schema.settings.headerImage && <img className="fheader-img" src={form.schema.settings.headerImage} alt="" style={{marginBottom:12}} />}
              <input className="canvas-title" value={form.title} placeholder="Untitled form" onChange={(e)=>setForm((f)=>({ ...f, title:e.target.value }))} />
              <div className="qblock">
                <div className="qblock-head">Default question block</div>
                <div className="qblock-body">
                  {questions.length === 0 && <div className="muted" style={{padding:"18px 4px"}}>No questions yet. Use Add new question below.</div>}
                  {questions.map((q, i)=>(
                    <CanvasCard key={q.id} q={q} index={i} selected={sel === q.id} dnd={dnd} cardRef={(el)=>{ if (el) cardRefs.current[q.id] = el; else delete cardRefs.current[q.id]; }}
                      onSelect={()=>{ setSel(q.id); setMode("edit"); }}
                      update={(p)=>updateQ(q.id, p)}
                      onDup={()=>dupQ(q.id)} onDel={()=>removeQ(q.id)} onUp={()=>moveQ(i, -1)} onDown={()=>moveQ(i, 1)} />
                  ))}
                </div>
                <div className="qblock-foot"><AddQuestionMenu onAdd={addQ} /></div>
              </div>

              <div className="endcard">
                <div className="mono" style={{fontSize:11,textTransform:"uppercase",letterSpacing:".05em",color:"var(--ink-soft)",fontWeight:700,marginBottom:8}}>End of form</div>
                <div style={{textAlign:"center",color:"var(--ink-soft)"}}>Thanks. Your response has been recorded.</div>
              </div>

              <div className="trashbox">
                <div className="trashbox-head">
                  <span className="t">Trash · {trash.length} question{trash.length === 1 ? "" : "s"}</span>
                  {trash.length > 0 && <button className="btn ghost sm" onClick={()=>setTrash([])}>Empty trash</button>}
                </div>
                {trash.length === 0
                  ? <div className="muted" style={{padding:"14px 16px",fontSize:13}}>Deleted questions land here for this session. They are cleared if you leave or refresh.</div>
                  : trash.map((q)=>(
                      <div className="trash-item" key={q.id}>
                        <span className="ti-label">{q.type === "page_break" ? "Page break" : (q.label || q.heading || "Untitled question")}</span>
                        <span className="ti-type">{QTYPES[q.type] ? QTYPES[q.type].label : q.type}</span>
                        <button className="btn sm" onClick={()=>restoreQ(q.id)}>Restore</button>
                      </div>
                    ))}
              </div>
            </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function FormDashboard({ id }){
  const { navigate, toast, user } = useApp();
  const [form, setForm] = useState(null);
  const [tab, setTab] = useState("responses");
  const [loadErr, setLoadErr] = useState(false);
  const fetcher = useCallback((r)=>api.formSummary(id, r),[id]);
  useEffect(()=>{ api.getForm(id).then(({ok,data})=>{ if (ok && data && data.form) setForm(data.form); else setLoadErr(true); }); },[id]);

  if (loadErr) return (<div><TopNav/><div className="wrap page"><div className="empty card"><p>Form not found.</p></div></div></div>);
  if (!form) return (<div><TopNav/><div className="wrap page"><div className="muted">Loading...</div></div></div>);

  const url = form.username === "admin" ? window.location.origin + "/" + form.slug : window.location.origin + "/" + form.username + "/" + form.slug;
  const toggleOpen = ()=>{ const next = !form.is_open; setForm(f=>({...f, is_open: next})); api.updateForm(id, { is_open: next }).then(()=>toast(next ? "Form reopened" : "Form closed")); };
  const del = ()=>{ if (!window.confirm("Delete this form and all its responses? This cannot be undone.")) return; api.deleteForm(id).then(()=>{ toast("Form deleted"); navigate("/dashboard"); }); };

  return (
    <div>
      <TopNav/>
      <div className="wrap page">
        <button className="btn ghost sm" style={{marginBottom:14}} onClick={()=>navigate("/dashboard")}>← All forms</button>
        <div className="between" style={{marginBottom:6,flexWrap:"wrap",gap:10}}>
          <div className="row" style={{gap:12}}><h1 style={{fontSize:25}}>{form.title}</h1><span className={"badge "+(form.is_open?"open":"closed")}>{form.is_open?"Open":"Closed"}</span></div>
          <div className="row"><a className="btn sm" href={url} target="_blank" rel="noopener">View form</a><button className="btn sm" onClick={()=>navigate("/builder/"+id)}>Edit</button></div>
        </div>
        <div className="copyfield" style={{marginBottom:20,maxWidth:520}}><code>{url}</code><button className="btn sm" onClick={()=>{ if(navigator.clipboard) navigator.clipboard.writeText(url); toast("Link copied"); }}>Copy</button></div>

        <AiSummary fetcher={fetcher} />

        <div className="tabs">{["responses","analytics","settings"].map(t=>(<button key={t} className={"tab"+(tab===t?" active":"")} onClick={()=>setTab(t)}>{t[0].toUpperCase()+t.slice(1)}</button>))}</div>

        {tab==="responses" && <ResponsesTab id={id} form={form} />}
        {tab==="analytics" && <AnalyticsTab id={id} form={form} />}
        {tab==="settings" && (
          <div className="card pad-lg" style={{maxWidth:560}}>
            <div className="between" style={{marginBottom:8}}>
              <div><div style={{fontWeight:600}}>Accepting responses</div><div className="hint">When closed, the public link shows a closed message.</div></div>
              <Toggle checked={form.is_open} onChange={toggleOpen} label="" />
            </div>
            <hr style={{border:0,borderTop:"1px solid var(--line)",margin:"16px 0"}} />
            <div style={{fontWeight:600,marginBottom:8}}>Danger zone</div>
            <button className="btn danger" onClick={del}>Delete form</button>
          </div>
        )}
      </div>
    </div>
  );
}

  const s = typeof size === "number" ? size : 20;
  return (
    <span className={"logo" + (className ? " " + className : "")} role="img" aria-label="zetetiq"

/* ----------------------------- pdf report ----------------------------- */
function hexRgb(h){ h = String(h || "#5b4fe0").replace("#",""); if (h.length === 3) h = h.split("").map((c)=>c + c).join(""); const n = parseInt(h, 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }
function ensureJsPDF(){ return new Promise((res, rej)=>{ if (window.jspdf && window.jspdf.jsPDF) return res(); const sc = document.createElement("script"); sc.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"; sc.onload = ()=>res(); sc.onerror = ()=>rej(new Error("pdf_load")); document.head.appendChild(sc); }); }

function statLines(q, rows){
  const vals = rows.map((r)=>r.data[q.id]).filter((v)=> v !== undefined && v !== null && v !== "");
  const title = q.label || q.id;
  const type = QTYPES[q.type].label + " · " + vals.length + " answered";
  if (q.type === "multiple_choice"){
    const c = {}; q.options.forEach((o)=>c[o] = 0);
    rows.forEach((r)=>{ const v = r.data[q.id]; if (Array.isArray(v)) v.forEach((o)=>c[o] = (c[o] || 0) + 1); else if (v) c[v] = (c[v] || 0) + 1; });
    const e = Object.entries(c).sort((a,b)=>b[1] - a[1]);
    return { title, type, bars: e.map(([k,v])=>({ k, v })), lines: e.length ? ["Most selected: " + e[0][0] + " (" + e[0][1] + ")", "Least selected: " + e[e.length-1][0] + " (" + e[e.length-1][1] + ")"] : [] };
  }
  if (q.type === "rank_order"){
    const s = {}, n = {}; q.items.forEach((it)=>{ s[it] = 0; n[it] = 0; });
    rows.forEach((r)=>{ const a = r.data[q.id]; if (Array.isArray(a)) a.forEach((it,i)=>{ if (s[it] !== undefined){ s[it] += i + 1; n[it]++; } }); });
    const rank = q.items.map((it)=>({ it, avg: n[it] ? s[it] / n[it] : null })).filter((x)=>x.avg != null).sort((a,b)=>a.avg - b.avg);
    return { title, type, bars: [], lines: rank.length ? rank.map((x,i)=>(i + 1) + ". " + x.it + " (avg " + x.avg.toFixed(2) + ")") : ["No data"] };
  }
  if (q.type === "constant_sum"){
    const s = {}, n = {}; q.items.forEach((it)=>{ s[it] = 0; n[it] = 0; });
    rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object") q.items.forEach((it)=>{ const v = parseFloat(o[it]); if (!isNaN(v)){ s[it] += v; n[it]++; } }); });
    return { title, type, bars: q.items.map((it)=>({ k: it, v: n[it] ? Math.round(s[it] / n[it] * 10) / 10 : 0 })), lines: ["Average allocation, total " + q.total + (q.unit ? (" " + q.unit) : "")] };
  }
  if (q.type === "matrix"){
    return { title, type, bars: [], lines: q.rows.map((row)=>{ const c = {}; rows.forEach((r)=>{ const o = r.data[q.id]; if (o && typeof o === "object"){ const a = o[row]; (Array.isArray(a) ? a : [a]).forEach((x)=>{ if (x) c[x] = (c[x] || 0) + 1; }); } }); const top = Object.entries(c).sort((a,b)=>b[1] - a[1])[0]; return row + ": " + (top ? top[0] + " (" + top[1] + ")" : "no data"); }) };
  }
  if (q.type === "star_rating"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n)); const avg = nums.length ? nums.reduce((a,b)=>a + b, 0) / nums.length : 0;
    const bars = []; for (let k = 1; k <= q.max; k++) bars.push({ k: k + " star", v: nums.filter((n)=>n === k).length });
    return { title, type, bars, lines: ["Average: " + avg.toFixed(2) + " / " + q.max] };
  }
  if (q.type === "slider"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n)); const avg = nums.length ? nums.reduce((a,b)=>a + b, 0) / nums.length : 0;
    return { title, type, bars: [], lines: nums.length ? ["Average: " + avg.toFixed(1), "Min " + Math.min(...nums) + ", Max " + Math.max(...nums)] : ["No data"] };
  }
  if (q.type === "nps"){
    const nums = vals.map(Number).filter((n)=>!isNaN(n)); const N = nums.length || 1; const p = nums.filter((x)=>x >= 9).length, d = nums.filter((x)=>x <= 6).length, ps = nums.filter((x)=>x === 7 || x === 8).length;
    return { title, type, bars: [], lines: ["NPS: " + (nums.length ? Math.round((p / N - d / N) * 100) : "-"), "Promoters " + p + ", Passives " + ps + ", Detractors " + d] };
  }
  if (q.type === "date"){
    const ds = vals.map(String).filter(Boolean).sort();
    return { title, type, bars: [], lines: ds.length ? ["Earliest " + ds[0] + ", latest " + ds[ds.length-1]] : ["No data"] };
  }
  return { title, type, bars: [], lines: [vals.length + " text response" + (vals.length === 1 ? "" : "s")] };
}

function svgToPng(svg, color, widthPx){
  return new Promise((resolve)=>{
    try {
      const s = svg.replace(/currentColor/g, color).replace('style="height:100%;width:auto;display:block"', 'width="750" height="225"');
      const src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(s)));
      const img = new Image();
      img.onload = ()=>{ try {
        const ratio = (img.height && img.width) ? img.height / img.width : 0.3;
        const w = widthPx, h = Math.round(widthPx * ratio);
        const c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve({ data: c.toDataURL("image/png"), w, h });
      } catch (e) { resolve(null); } };
      img.onerror = ()=>resolve(null);
      img.src = src;
    } catch (e) { resolve(null); }
  });
}

async function exportReport(form, rows){
  await ensureJsPDF();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"pt", format:"a4" });
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const M = 42;
  const theme = form.theme || {};
  const [pr,pg,pb] = hexRgb(theme.primary || "#5b4fe0");
  const [ar,ag,ab] = hexRgb(theme.accent || theme.primary || "#5b4fe0");
  const FONT_MAP = { sans:"helvetica", serif:"times", mono:"courier", slab:"times", zetetiq:"helvetica" };
  const ff = FONT_MAP[theme.font] || "helvetica";
  const ink = [27,24,48], soft = [120,116,140], track = [231,228,243];
  const ensure = (y, need)=>{ if (y + need > H - 40){ doc.addPage(); return 56; } return y; };
  doc.setFillColor(pr,pg,pb); doc.rect(0,0,W,82,"F");
  let logo = null; try { logo = await svgToPng(LOGO_SVG, "#ffffff", 150); } catch (e) {}
  if (logo && logo.data){ const lw = 92, lh = lw * (logo.h / logo.w); doc.addImage(logo.data, "PNG", W - M - lw, 22, lw, lh); }
  doc.setTextColor(255,255,255); doc.setFont(ff,"bold"); doc.setFontSize(20);
  doc.text((form.title || "Form").slice(0,42), M, 40);
  doc.setFont(ff,"normal"); doc.setFontSize(11); doc.text("Response report", M, 60);
  doc.setFontSize(10); doc.text(new Date().toLocaleDateString(), M, 74);
  let y = 116;
  doc.setTextColor.apply(doc, ink); doc.setFont(ff,"bold"); doc.setFontSize(13);
  doc.text("Total responses: " + rows.length, M, y); y += 24;

  const inputQs = (form.schema.questions || []).filter((q)=> QTYPES[q.type] && QTYPES[q.type].isInput && q.type !== "hidden_field");
  inputQs.forEach((q)=>{
    const st = statLines(q, rows);
    y = ensure(y, 44);
    doc.setFont(ff,"bold"); doc.setFontSize(11.5); doc.setTextColor.apply(doc, ink);
    doc.text(st.title.slice(0,70), M, y); y += 13;
    doc.setFont(ff,"normal"); doc.setFontSize(8.5); doc.setTextColor.apply(doc, soft);
    doc.text(st.type, M, y); y += 14;
    doc.setFontSize(9.5);
    if (st.bars && st.bars.length){
      const maxv = Math.max(1, ...st.bars.map((b)=>b.v));
      st.bars.slice(0,10).forEach((b)=>{
        y = ensure(y, 16);
        doc.setTextColor.apply(doc, ink); doc.text(String(b.k).slice(0,34), M, y + 8);
        const bx = 250, bw = W - M - bx - 36;
        doc.setFillColor.apply(doc, track); doc.rect(bx, y, bw, 9, "F");
        doc.setFillColor(ar,ag,ab); doc.rect(bx, y, Math.max(0, bw * (b.v / maxv)), 9, "F");
        doc.setTextColor.apply(doc, ink); doc.text(String(b.v), W - M, y + 8, { align:"right" });
        y += 16;
      });
    }
    (st.lines || []).forEach((ln)=>{ y = ensure(y, 14); doc.setTextColor.apply(doc, soft); doc.text("- " + ln, M, y + 8); y += 14; });
    y += 12;
  });

  const tally = (key)=>{ const c = {}; rows.forEach((r)=>{ const v = (r.meta && r.meta[key]) || "Unknown"; c[v] = (c[v] || 0) + 1; }); return Object.entries(c).sort((a,b)=>b[1] - a[1]).slice(0,6); };
  [["Top countries", tally("country")], ["Browsers", tally("browser")]].forEach(([label, list])=>{
    if (!list.length) return;
    y = ensure(y, 30);
    doc.setFont(ff,"bold"); doc.setFontSize(11.5); doc.setTextColor.apply(doc, ink); doc.text(label, M, y); y += 14;
    doc.setFont(ff,"normal"); doc.setFontSize(9.5);
    list.forEach(([k,v])=>{ y = ensure(y, 14); doc.setTextColor.apply(doc, soft); doc.text("- " + k + ": " + v, M, y + 8); y += 14; });
    y += 8;
  });

  doc.setFont(ff,"normal"); doc.setFontSize(9); doc.setTextColor.apply(doc, soft);
  doc.text("Generated by zetetiq", M, H - 24);
  doc.save((form.title || "form").replace(/[^a-z0-9]+/gi, "-").toLowerCase() + "-report.pdf");
}

function ExportButtons({ id, form, rows }){
  const { toast } = useApp();
  const [pdfBusy, setPdfBusy] = useState(false);
  return (
    <div className="row exp-row" style={{gap:10,flexWrap:"wrap"}}>
      <a className="btn" href={"/api/forms/" + id + "/export"}>Download CSV</a>
      <button className="btn primary" disabled={pdfBusy || !rows || !rows.length} onClick={async ()=>{ setPdfBusy(true); try { await exportReport(form, rows || []); } catch (e) { toast("Could not build the report."); } setPdfBusy(false); }}>{pdfBusy ? "Preparing report..." : "Export report (PDF)"}</button>
    </div>
  );
}

function ResponsesTab({ id, form }){

  useEffect(()=>{ api.responses(id).then(({data})=> setRows((data && data.responses) || [])); },[id]);
  const labels = useMemo(()=>{ const m={}; (form.schema.questions||[]).forEach(q=>{ if (QTYPES[q.type] && QTYPES[q.type].isInput) m[q.id]=q.label||q.id; }); return m; },[form]);
  const previewCols = useMemo(()=> Object.keys(labels).slice(0,2), [labels]);
  const cell = (v)=>{ if (v===null||v===undefined) return ""; if (Array.isArray(v)) return v.join(", "); if (typeof v==="object") return Object.keys(v).map(k=>k+": "+(Array.isArray(v[k])?v[k].join("/"):v[k])).join(" | "); return String(v); };
  if (rows === null) return <div className="muted">Loading...</div>;
  if (rows.length === 0) return <div className="card empty"><p>No responses yet.</p></div>;
  return (
    <div>
      <div className="between" style={{marginBottom:12}}><span className="muted">{rows.length} response{rows.length===1?"":"s"}</span><ExportButtons id={id} form={form} rows={rows} /></div>

          <thead><tr><th>Submitted</th><th className="hide-sm">Location</th><th className="hide-sm">Device</th>{previewCols.map(c=>(<th key={c}>{labels[c]}</th>))}<th></th></tr></thead>
