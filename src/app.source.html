<style>
:root{
  --bo:#5b4fe0;            /* primary blue-purple */
  --bo-dark:#4536c9;
  --ink:#1b1830;
  --ink-soft:#6a6580;
  --line:#e7e4f3;
  --line-strong:#d6d1ea;
  --paper:#f6f5fc;
  --card:#ffffff;
  --good:#2f7d52;
  --bad:#b23b3b;
  --radius:14px;
  --sans:'Mozilla Text',system-ui,-apple-system,sans-serif;
  --display:'Mozilla Headline','Mozilla Text',system-ui,sans-serif;
  --mono:'Mozilla Text',system-ui,sans-serif;
  --hover:#f1eefc;
  --nav-bg:rgba(246,245,252,.88);
}
html[data-theme="dark"]{
  --bo:#7c72f2; --bo-dark:#6b61e8;
  --ink:#ece9f8; --ink-soft:#a9a4c6;
  --line:#2a2740; --line-strong:#3a3660;
  --paper:#121020; --card:#1d1a31;
  --good:#54c98a; --bad:#e98a8a;
  --hover:#272343;
  --nav-bg:rgba(18,16,32,.86);
}
html[data-theme="dark"] .badge.open{background:rgba(84,201,138,.18)}
html[data-theme="dark"] .badge.closed{background:rgba(169,164,198,.16)}
html[data-theme="dark"] .bar-row .track2{background:#272343}
html[data-theme="dark"] .shimmer{background:linear-gradient(90deg,#272343 25%,#322d52 37%,#272343 63%);background-size:400% 100%}
html[data-theme="dark"] .ai{background:#191730}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit}
button{font-family:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
h1,h2,h3{font-family:var(--display);font-weight:500;letter-spacing:-0.01em;margin:0}
.mono{font-family:var(--mono)}
.muted{color:var(--ink-soft)}

/* layout */
.wrap{max-width:1040px;margin:0 auto;padding:0 22px}
.page{padding:28px 0 80px}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.stack{display:flex;flex-direction:column}
.grow{flex:1}

/* nav */
.nav{border-bottom:1px solid var(--line);background:var(--nav-bg);backdrop-filter:saturate(1.4) blur(8px);position:sticky;top:0;z-index:40}
.nav .wrap{height:58px;display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-0.02em;color:var(--bo);cursor:pointer;border:0;background:none;padding:0}
.brand .dot{color:var(--ink)}
.greet{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}

/* buttons */
.btn{appearance:none;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);padding:9px 15px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;transition:.12s ease;line-height:1}
.btn:hover{border-color:var(--line-strong);background:var(--hover)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--bo);border-color:var(--bo);color:#fff}
.btn.primary:hover{background:var(--bo-dark);border-color:var(--bo-dark)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:var(--hover)}
.btn.danger{color:#fff;background:var(--bad);border-color:var(--bad)}
.btn.danger:hover{filter:brightness(.95)}
.btn.sm{padding:6px 11px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.iconbtn{border:1px solid var(--line-strong);background:var(--card);width:32px;height:32px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.iconbtn:hover{background:var(--hover)}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius)}
.pad{padding:18px}
.pad-lg{padding:24px}

/* badges */
.badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em}
.badge.open{background:#e8f3ec;color:var(--good)}
.badge.closed{background:#edebf8;color:var(--ink-soft)}

/* tables */
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;padding:10px 14px;border-bottom:1px solid var(--line)}
.table td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.table tr.clickable{cursor:pointer}
.table tr.clickable:hover td{background:#f4f3fe}
.table tr:last-child td{border-bottom:0}

/* inputs */
.field{display:block;margin-bottom:14px}
.label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;margin-bottom:6px}
.input,.textarea,.select{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:10px 12px;background:var(--card);color:var(--ink);outline:none;transition:.12s}
.input:focus,.textarea:focus,.select:focus{border-color:var(--bo);box-shadow:0 0 0 3px rgba(91,79,224,.16)}
.textarea{min-height:84px;resize:vertical}
.hint{font-size:12.5px;color:var(--ink-soft);margin-top:5px}
.err{font-size:12.5px;color:var(--bad);margin-top:5px;font-weight:600}
.switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none;font-size:14px}
.switch input{display:none}
.switch .track{width:38px;height:22px;border-radius:999px;background:var(--line-strong);position:relative;transition:.15s}
.switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.switch input:checked + .track{background:var(--bo)}
.switch input:checked + .track .knob{left:18px}

/* ai summary card */
.ai{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;position:relative}
.ai .ai-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai .spark{width:16px;height:16px;color:var(--bo)}
.ai .ai-title{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--bo);font-weight:700}
.ai .ai-body{font-size:14.5px;line-height:1.55;color:var(--ink);white-space:pre-wrap}
.ai .ai-foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:10px;border-top:1px dashed var(--line-strong)}
.ai .ai-meta{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.shimmer{height:13px;border-radius:6px;background:linear-gradient(90deg,#eae7f6 25%,#f3f1fb 37%,#eae7f6 63%);background-size:400% 100%;animation:sh 1.4s ease infinite;margin:7px 0}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* bars (analytics) */
.bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13.5px}
.bar-row .k{width:130px;flex:none;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .track2{flex:1;background:#edebf8;border-radius:6px;height:20px;overflow:hidden}
.bar-row .fill{height:100%;background:var(--bo);border-radius:6px}
.bar-row .v{width:42px;flex:none;text-align:right;font-family:var(--mono);font-size:12px}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px}
.tab{appearance:none;border:0;background:none;padding:11px 14px;cursor:pointer;font-weight:600;font-size:14px;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--bo);border-bottom-color:var(--bo)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(24,21,46,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:60}
.modal{background:var(--card);border-radius:16px;max-width:520px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.25)}

/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.25)}

/* question card (builder) */
.qcard{border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:12px;overflow:hidden}
.qcard .qhead{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--hover);border-bottom:1px solid var(--line)}
.qcard .qtype{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--bo);font-weight:700}
.qcard .qsummary{font-size:14px;color:var(--ink)}
.qbody{padding:14px}
.addmenu{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.addmenu button{text-align:left;border:1px solid var(--line-strong);background:var(--card);border-radius:10px;padding:11px 12px;cursor:pointer}
.addmenu button:hover{border-color:var(--bo);background:var(--hover)}
.addmenu .t{font-weight:600;font-size:14px}
.addmenu .h{font-size:12px;color:var(--ink-soft);margin-top:2px}

/* landing */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.landing .lo{font-family:var(--display);font-weight:700;font-size:42px;color:var(--bo);letter-spacing:-0.03em}
.landing .lo .dot{color:var(--ink)}
.landing .tag{max-width:430px;color:var(--ink-soft);font-size:16px;margin:14px 0 28px}
.gbtn{display:inline-flex;align-items:center;gap:10px;justify-content:center;width:100%;padding:12px 16px;border-radius:11px;border:1px solid var(--line-strong);background:var(--card);font-weight:600;cursor:pointer}
.gbtn:hover{background:#f4f3fe}

/* form scope (respondent + preview): themed */
.form-scope{--fp:#5b4fe0;--fs:#1b1830;--fa:#5b4fe0;font-family:var(--sans)}
.form-page,.form-scope{--paper:#f6f5fc;--card:#ffffff;--ink:#1b1830;--ink-soft:#6a6580;--line:#e7e4f3;--line-strong:#d6d1ea;--good:#2f7d52;--bad:#b23b3b;--hover:#f1eefc}
.form-scope .fcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px}
.form-scope .ftitle{font-family:inherit;font-size:27px;color:var(--fs);font-weight:600;line-height:1.2}
.form-scope .fdesc{color:var(--ink-soft);margin-top:8px;font-size:15px}
.form-scope .q{padding:18px 0;border-bottom:1px solid var(--line)}
.form-scope .q:last-of-type{border-bottom:0}
.form-scope .qlabel{font-weight:600;font-size:16px;margin-bottom:10px;color:var(--fs)}
.form-scope .qlabel .req{color:var(--fa);margin-left:3px}
.form-scope .opt{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line-strong);border-radius:10px;margin:7px 0;cursor:pointer;transition:.1s}
.form-scope .opt:hover{border-color:var(--fp)}
.form-scope .opt.sel{border-color:var(--fp);background:color-mix(in srgb,var(--fp) 8%,#fff);box-shadow:0 0 0 1px var(--fp) inset}
.form-scope .opt input{accent-color:var(--fp)}
.form-scope .finput{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:11px 12px;outline:none}
.form-scope .finput:focus{border-color:var(--fp);box-shadow:0 0 0 3px color-mix(in srgb,var(--fp) 18%,transparent)}
.form-scope .submit{background:var(--fa);color:#fff;border:0;padding:12px 22px;border-radius:11px;font-weight:700;font-size:15px;cursor:pointer}
.form-scope .submit:hover{filter:brightness(.95)}
.form-scope .nps{display:flex;gap:6px;flex-wrap:wrap}
.form-scope .nps button{width:42px;height:42px;border:1px solid var(--line-strong);background:var(--card);border-radius:9px;cursor:pointer;font-weight:600}
.form-scope .nps button.sel{background:var(--fa);color:#fff;border-color:var(--fa)}
.form-scope .nps-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:6px}
.form-scope input[type=range]{width:100%;accent-color:var(--fp)}
.form-scope .scale{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-soft);margin-top:4px}
.form-scope .ferr{color:#b23b3b;font-size:13px;margin-top:8px;font-weight:600}
.form-page{min-height:100vh;padding:34px 18px 70px;background:var(--paper)}
.form-page-inner{max-width:680px;margin:0 auto}
.center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;gap:14px}

.empty{text-align:center;padding:52px 20px;color:var(--ink-soft)}
.copyfield{display:flex;align-items:center;gap:8px;border:1px solid var(--line-strong);border-radius:10px;padding:7px 7px 7px 12px;background:var(--hover)}
.copyfield code{font-family:var(--mono);font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
@media(max-width:620px){.addmenu{grid-template-columns:1fr}.bar-row .k{width:92px}.hide-sm{display:none}}

/* ---- builder: properties panel + canvas layout ---- */
.builder{display:flex;flex-direction:column;height:100vh;background:#f3f2fb}
.b-top{height:54px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--card);border-bottom:1px solid var(--line)}
.b-top .saved-note{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
.b-tools{position:relative}
.menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--card);border:1px solid var(--line-strong);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.14);padding:6px;min-width:170px;z-index:50}
.menu button{display:block;width:100%;text-align:left;border:0;background:none;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:14px;color:var(--ink)}
.menu button:hover{background:var(--hover)}
.menu button.danger-text{color:var(--bad)}
.b-main{flex:1;display:flex;min-height:0}
.b-rail{width:54px;flex:none;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding-top:12px;gap:6px}
.b-rail button{width:38px;height:38px;border:0;background:none;border-radius:9px;cursor:pointer;color:var(--ink-soft);display:inline-flex;align-items:center;justify-content:center}
.b-rail button:hover{background:var(--hover);color:var(--ink)}
.b-rail button.active{background:rgba(124,114,242,.16);color:var(--bo)}
.b-panel{width:320px;flex:none;background:var(--card);border-right:1px solid var(--line);overflow:auto;padding:18px}
.panel-title{font-family:var(--display);font-size:18px;margin-bottom:14px}
.panel-section{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;margin:16px 0 9px;padding-top:13px;border-top:1px solid var(--line)}
.panel-section:first-of-type{border-top:0;padding-top:0;margin-top:4px}
.opt-radio{display:flex;align-items:center;gap:9px;padding:7px 0;cursor:pointer;font-size:14px}
.opt-radio.disabled{opacity:.5;cursor:not-allowed}
.opt-radio input{accent-color:var(--bo)}
.stepper{display:inline-flex;align-items:center;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden}
.stepper button{width:36px;height:34px;border:0;background:var(--card);cursor:pointer;font-size:17px;color:var(--ink)}
.stepper button:hover{background:var(--hover)}
.stepper button:disabled{opacity:.4;cursor:not-allowed}
.stepper span{min-width:42px;text-align:center;font-family:var(--mono);font-size:14px;border-left:1px solid var(--line);border-right:1px solid var(--line);height:34px;display:inline-flex;align-items:center;justify-content:center}
.b-canvas{flex:1;overflow:auto;padding:26px 22px 90px}
.b-canvas-inner{max-width:840px;margin:0 auto}
.canvas-title{width:100%;border:0;background:none;font-family:var(--display);font-size:26px;font-weight:600;color:var(--ink);padding:6px 4px;margin-bottom:14px;outline:none;border-bottom:1px solid transparent}
.canvas-title:focus{border-bottom-color:var(--line-strong)}
.qblock{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:18px}
.qblock-head{padding:11px 16px;background:var(--hover);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700}
.qblock-body{padding:14px}
.qblock-foot{padding:12px 14px;border-top:1px solid var(--line);background:var(--hover)}
.qccard{border:1px solid var(--line);border-radius:11px;background:var(--card);padding:14px;margin-bottom:12px;cursor:pointer;transition:border-color .1s, box-shadow .1s}
.qccard:last-child{margin-bottom:0}
.qccard:hover{border-color:var(--line-strong)}
.qccard.sel{border-color:var(--bo);box-shadow:0 0 0 2px rgba(91,79,224,.2)}
.qcc-head{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.qcc-num{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--bo)}
.qcc-type{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft)}
.qcc-menu{position:relative}
.wq-title{width:100%;border:0;background:none;font-size:16px;font-weight:600;color:var(--ink);outline:none;padding:3px 2px;border-radius:6px}
.wq-title:focus{background:#f4f3ff}
.wq-title::placeholder{color:#a39ec2;font-weight:500}
.wq-textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:8px;min-height:64px;outline:none;resize:vertical;font-family:inherit}
.wq-body{margin-top:10px}
.wq-choice{display:flex;align-items:center;gap:9px;margin:6px 0}
.wq-mark{width:16px;height:16px;flex:none;border:1.5px solid var(--line-strong);background:var(--card)}
.wq-mark.rd{border-radius:50%}
.wq-mark.sq{border-radius:4px}
.wq-choice-input{flex:1;border:0;border-bottom:1px solid transparent;background:none;padding:5px 2px;outline:none;font-size:14px}
.wq-choice-input:focus{border-bottom-color:var(--line-strong);background:#f4f3ff}
.wq-choice-input::placeholder{color:#a39ec2}
.wq-addchoice{border:0;background:none;color:var(--bo);font-weight:600;font-size:13px;cursor:pointer;padding:6px 2px;margin-top:2px}
.wq-addchoice:hover{text-decoration:underline}
.wq-prev{margin-top:4px}
.wq-prev-input{border:1px solid var(--line-strong);border-radius:8px;padding:9px 11px;color:var(--ink-soft);font-size:14px;background:var(--hover)}
.wq-prev-input.tall{min-height:64px}
.addq{position:relative;display:inline-block}
.addq-menu{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--card);border:1px solid var(--line-strong);border-radius:12px;box-shadow:0 14px 36px rgba(0,0,0,.16);padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px;width:420px;z-index:50}
.addq-menu button{text-align:left;border:1px solid var(--line-strong);background:var(--card);border-radius:10px;padding:10px 12px;cursor:pointer}
.addq-menu button:hover{border-color:var(--bo);background:var(--hover)}
.addq-menu .t{font-weight:600;font-size:14px}
.addq-menu .h{font-size:12px;color:var(--ink-soft);margin-top:2px}
.endcard{background:var(--card);border:1px dashed var(--line-strong);border-radius:14px;padding:16px}
.b-preview{flex:1;overflow:auto;background:#f3f2fb}
@media(max-width:860px){
  .b-rail{display:none}
  .b-panel{width:250px;padding:14px}
  .addq-menu{grid-template-columns:1fr;width:240px}
}


/* ---- new question types: respondent ---- */
.form-scope .matrix-wrap{overflow-x:auto}
.form-scope table.matrix{border-collapse:collapse;width:100%;font-size:14px}
.form-scope table.matrix th{font-weight:600;color:var(--fs);padding:8px 10px;text-align:center;border-bottom:1px solid var(--line-strong)}
.form-scope table.matrix th.mrow{text-align:left;font-weight:500}
.form-scope table.matrix td{text-align:center;padding:8px 10px;border-bottom:1px solid var(--line)}
.form-scope table.matrix tbody tr:nth-child(even) td{background:color-mix(in srgb,var(--fp) 4%,#fff)}
.form-scope .mcell input{accent-color:var(--fa);width:18px;height:18px;cursor:pointer}
.form-scope .ranklist{display:flex;flex-direction:column;gap:8px}
.form-scope .rankrow{display:flex;align-items:center;gap:12px;border:1px solid var(--line-strong);border-radius:10px;padding:9px 12px;background:var(--card)}
.form-scope .rnum{width:26px;height:26px;flex:none;border-radius:50%;background:var(--fa);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.form-scope .rlabel{flex:1}
.form-scope .rbtns button{width:30px;height:30px;border:1px solid var(--line-strong);background:var(--card);border-radius:7px;cursor:pointer;margin-left:4px;font-size:14px}
.form-scope .rbtns button:disabled{opacity:.35;cursor:not-allowed}
.form-scope .csrow{display:flex;align-items:center;gap:10px;margin:8px 0}
.form-scope .cslabel{flex:1}
.form-scope .csinput{width:110px;flex:none}
.form-scope .csunit{color:var(--ink-soft);font-size:13px}
.form-scope .cstotal{margin-top:10px;font-weight:600;color:var(--ink-soft)}
.form-scope .cstotal.ok{color:var(--good)}
.form-scope .fformrow{margin:10px 0}
.form-scope .fflabel{display:block;font-weight:500;margin-bottom:5px;color:var(--fs)}
.form-scope .stars{display:flex;gap:6px}
.form-scope .stars .star{font-size:30px;line-height:1;background:none;border:0;cursor:pointer;color:var(--line-strong);padding:0}
.form-scope .stars .star.on{color:var(--fa)}
/* ---- new question types: builder canvas ---- */
.mxcanvas{overflow-x:auto}
.mxgrid{display:grid;gap:4px 6px;align-items:center;min-width:340px}
.mxcol{display:flex;flex-direction:column;align-items:center;gap:2px}
.mxdot{display:flex;align-items:center;justify-content:center}
.rnum.sm{width:22px;height:22px;flex:none;border-radius:50%;background:var(--bo);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.csbox{min-width:60px;text-align:center;border:1px solid var(--line-strong);border-radius:7px;padding:5px 8px;color:var(--ink-soft);font-size:13px}
.fformedit{margin:8px 0}
.stars.prev{display:flex;gap:5px}
.stars.prev .star{font-size:24px;color:var(--line-strong);line-height:1}


/* ---- round 4: animations, drag-drop, trash, pages, analytics ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.985)}to{opacity:1;transform:none}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
.qccard,.pbreak{animation:fadeUp .25s ease both}
.overlay{animation:fadeIn .18s ease both}
.modal{animation:pop .22s cubic-bezier(.2,.8,.2,1) both}
.toast{animation:toastIn .28s ease both}
.menu{animation:pop .15s ease both}
.tab{transition:color .15s,border-color .15s}
.form-scope .opt,.form-scope .nps button,.form-scope .stars .star,.form-scope .submit,.form-scope .rankrow{transition:all .14s ease}
.qccard{transition:border-color .12s,box-shadow .12s,opacity .12s,transform .12s}
/* drag and drop */
.drag-handle{cursor:grab;color:var(--ink-soft);font-size:14px;line-height:1;padding:2px 5px;border-radius:6px;user-select:none}
.drag-handle:hover{background:var(--paper);color:var(--ink)}
.drag-handle:active{cursor:grabbing}
.qccard.dragging,.pbreak.dragging{opacity:.5;border:1px dashed var(--bo) !important;box-shadow:none !important}
.qccard.over{box-shadow:0 -3px 0 0 var(--bo);border-color:var(--bo)}
.pbreak.over{box-shadow:0 -3px 0 0 var(--bo)}
.form-scope .rankrow .rgrip{cursor:grab;color:var(--ink-soft);user-select:none;font-size:14px}
.form-scope .rankrow .rgrip:active{cursor:grabbing}
.form-scope .rankrow.dragging{opacity:.5}
.form-scope .rankrow.over{box-shadow:0 -3px 0 0 var(--fa)}
/* page break divider (builder) */
.pbreak{display:flex;align-items:center;gap:10px;margin:10px 2px;padding:6px 8px;border-radius:9px;cursor:pointer}
.pbreak.sel{background:rgba(124,114,242,.16)}
.pbreak-line{flex:1;height:1px;background:var(--line-strong)}
.pbreak-label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--bo);font-weight:700}
/* paginated form */
.form-scope .fprogress{height:6px;background:color-mix(in srgb,var(--fp) 12%,#fff);border-radius:999px;overflow:hidden;margin-top:14px}
.form-scope .fprogress-bar{height:100%;background:var(--fa);border-radius:999px;transition:width .35s ease}
.form-scope .fnav{display:flex;align-items:center;gap:12px}
.form-scope .fpage-count{font-size:13px;color:var(--ink-soft)}
.form-scope .fbtn-ghost{border:1px solid var(--line-strong);background:var(--card);color:var(--fs);padding:11px 18px;border-radius:10px;font-weight:600;cursor:pointer;transition:background .14s}
.form-scope .fbtn-ghost:hover{background:#f6f5ff}
.form-scope .fpage{animation:fadeUp .28s ease both}
/* add-question modal */
.addq-modal{max-width:560px}
.addq-modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
.addq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px 18px;max-height:62vh;overflow:auto}
.addq-item{text-align:left;border:1px solid var(--line-strong);background:var(--card);border-radius:10px;padding:11px 12px;cursor:pointer;transition:border-color .12s,background .12s}
.addq-item:hover{border-color:var(--bo);background:#f6f5ff}
.addq-item .t{font-weight:600;font-size:14px}
.addq-item .h{font-size:12px;color:var(--ink-soft);margin-top:2px}
@media(max-width:560px){.addq-grid{grid-template-columns:1fr}}
/* trash */
.trashbox{margin-top:18px;border:1px solid var(--line);border-radius:14px;background:var(--card);overflow:hidden}
.trashbox-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:#faf7ff;border-bottom:1px solid var(--line)}
.trashbox-head .t{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700}
.trash-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--line);animation:fadeUp .2s ease both}
.trash-item:last-child{border-bottom:0}
.trash-item .ti-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trash-item .ti-type{font-size:11px;color:var(--ink-soft);font-family:var(--mono);text-transform:uppercase}
/* analytics aggregates */
.statgrid{display:flex;gap:26px;flex-wrap:wrap}
.bignum{font-family:var(--display);font-size:30px;font-weight:600;line-height:1}
.rankresult{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
.rankresult li{display:flex;align-items:center;gap:12px}
.rankresult .rr-pos{width:24px;height:24px;flex:none;border-radius:50%;background:var(--bo);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:var(--mono)}
.rankresult .rr-name{flex:1}
.rankresult .rr-avg{font-size:12px;color:var(--ink-soft);font-family:var(--mono)}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}


/* ---- round 5: real logo, fonts, header image, end-of-form, footer ---- */
.fheader-img{display:block;width:100%;max-height:240px;object-fit:cover;border-radius:12px;margin-bottom:14px}
.builtby{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-soft);text-decoration:none;font-family:var(--mono)}
.builtby:hover{color:var(--ink)}
.himg-upload{display:inline-flex;align-items:center;gap:8px;border:1px dashed var(--line-strong);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:13px;color:var(--ink-soft);background:var(--card);transition:border-color .12s,color .12s}
.himg-upload:hover{border-color:var(--bo);color:var(--ink)}
.himg-preview{display:flex;align-items:center;gap:10px}
.himg-preview img{width:120px;height:60px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.form-scope .fcta{display:inline-block;background:var(--fa);color:#fff;border:0;padding:11px 22px;border-radius:10px;font-weight:600;text-decoration:none;cursor:pointer;transition:filter .12s}
.form-scope .fcta:hover{filter:brightness(1.06)}


.exp-row .btn{padding:9px 16px;font-size:14px}
.b-canvas-live{max-width:680px;margin:26px auto;padding:0 18px}
.drag-handle{cursor:grab;touch-action:none}
.drag-handle:active{cursor:grabbing}

.followup{margin-top:12px;padding:12px 14px;border-left:3px solid var(--fa);background:rgba(91,79,224,.05);border-radius:0 10px 10px 0;animation:fadeUp .25s ease both}
.followup .qlabel{margin-bottom:8px}
.followup.loading{color:var(--ink-soft);font-size:13px;border-left-color:var(--line-strong);background:transparent}
.followup-note{margin-top:10px;font-size:12px;color:var(--ink-soft);border-left:3px dashed var(--line-strong);padding:8px 12px}
.tonebar{display:flex;height:12px;border-radius:6px;overflow:hidden}
.tonebar span{display:block;height:100%}
.tonebar .t-pos{background:var(--good)}
.tonebar .t-neu{background:var(--line-strong)}
.tonebar .t-neg{background:var(--bad)}

.sigpad{border:1px solid var(--line-strong);border-radius:10px;background:var(--card);overflow:hidden}
.sigpad.err{border-color:var(--bad)}
.sigcanvas{display:block;width:100%;height:auto;touch-action:none;cursor:crosshair}
.sigrow{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.sighint{font-size:12px;color:var(--ink-soft)}

.theme-presets{display:flex;flex-wrap:wrap;gap:8px}
.theme-presets .preset{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line-strong);background:var(--card);border-radius:9px;padding:6px 10px;cursor:pointer;font-size:13px;color:var(--ink)}
.theme-presets .preset:hover{border-color:var(--bo);background:var(--hover)}
.theme-presets .preset .sw{width:14px;height:14px;border-radius:4px;display:inline-block;border:1px solid rgba(0,0,0,.08)}

.nav .navbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:64px;padding:0 24px;gap:12px}
.nav .navbar .brand{justify-self:start}
.navleft{display:flex;align-items:center;gap:10px;justify-self:start}
.navnew{justify-self:center;font-size:16px;padding:13px 30px;border-radius:13px}
.navright{justify-self:end;display:flex;align-items:center;gap:12px}
.themebtn{appearance:none;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);width:38px;height:38px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.12s}
.themebtn:hover{background:var(--hover)}
.tpl-section{margin-top:26px}
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:12px}
.tpl-card{text-align:left;border:1px solid var(--line-strong);background:var(--card);border-radius:13px;padding:15px 16px;cursor:pointer;transition:border-color .12s,box-shadow .12s,transform .08s;color:var(--ink)}
.tpl-card:hover{border-color:var(--bo);box-shadow:0 8px 22px rgba(91,79,224,.14);transform:translateY(-1px)}
.tpl-card:disabled{opacity:.6;cursor:default;transform:none}
.tpl-card .tt{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
.tpl-card .td{font-size:13px;color:var(--ink-soft);margin-top:5px;line-height:1.45}
.tpl-card .tdot{width:10px;height:10px;border-radius:50%;flex:none;display:inline-block}
@media(max-width:620px){.nav .navbar{padding:0 14px;gap:8px}.navnew{font-size:14px;padding:10px 16px}.greet{display:none}}

.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.form-card{text-align:left;border:1px solid var(--line-strong);background:var(--card);border-radius:15px;padding:16px 17px;cursor:pointer;transition:border-color .12s,box-shadow .12s,transform .08s;color:var(--ink);display:flex;flex-direction:column;gap:8px;min-height:132px}
.form-card:hover{border-color:var(--bo);box-shadow:0 10px 26px rgba(91,79,224,.13);transform:translateY(-2px)}
.form-card .fc-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.form-card .fc-count{font-size:12px;color:var(--ink-soft)}
.form-card .fc-title{font-family:var(--display);font-size:19px;font-weight:600;line-height:1.25;flex:1;word-break:break-word}
.form-card .fc-meta{font-family:var(--mono);font-size:12px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.form-card .fc-foot{font-size:12px;color:var(--ink-soft)}
.bk-list{display:flex;flex-direction:column;gap:10px}
.bk-card{border:1px solid var(--line-strong);border-radius:12px;padding:12px;background:var(--card)}
.bk-row{display:flex;align-items:center;gap:10px}
.bk-name{font-weight:600;font-size:14px}
.bk-sw{display:inline-flex;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.bk-sw span{width:16px;height:18px;display:inline-block}
.bk-logo{display:block;max-height:42px;max-width:150px;margin-top:8px;border:1px solid var(--line);border-radius:6px;background:#fff;padding:3px;object-fit:contain}
.bk-actions{display:flex;gap:8px;margin-top:10px}
.embed-frame{margin-top:6px}
.form-scope .embed-frame iframe{display:block}

.mt-card{border:1px solid var(--line-strong);border-radius:10px;padding:12px 14px;margin-bottom:12px;background:var(--card)}
.mt-title{font-weight:600;font-size:15px;color:var(--fs)}
.mt-meta{font-size:13px;color:var(--ink-soft);margin-top:2px}
.slot-wrap{display:flex;flex-direction:column;gap:14px}
.slot-day .slot-date{font-size:13px;font-weight:600;color:var(--fs);margin-bottom:7px}
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:8px}
.slot-btn{position:relative;border:1px solid var(--line-strong);background:var(--card);border-radius:9px;padding:10px 8px;cursor:pointer;font-weight:600;font-size:14px;color:var(--fs)}
.slot-btn:hover:not(:disabled){border-color:var(--fa)}
.slot-btn.sel{background:var(--fa);color:#fff;border-color:var(--fa)}
.slot-btn:disabled{opacity:.5;cursor:not-allowed}
.slot-full{display:block;font-size:9px;font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.doc-view{display:block;margin-bottom:6px}
.doc-fields{margin-top:14px;display:flex;flex-direction:column;gap:14px}
.himg-preview{display:flex;align-items:center;gap:10px;margin-top:4px}
.himg-preview img{max-height:40px;border:1px solid var(--line);border-radius:6px}
.slot-edit{margin-top:8px;display:flex;flex-direction:column;gap:6px}

.slot-edit-when{flex:1;font-size:13px}
.slot-cap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-soft)}
.slot-cap input{width:50px;padding:5px 6px}
.doc-field-edit{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.doc-field-edit input{flex:1;min-width:0}
.doc-field-edit select{width:118px;flex:none}

.filezone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:1.5px dashed var(--line-strong);border-radius:12px;padding:22px 16px;cursor:pointer;text-align:center;transition:border-color .15s,background .15s}
.filezone:hover{border-color:var(--fa);background:var(--hover)}
.filezone.err{border-color:var(--bad)}

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useLayoutEffect, useRef, useMemo, useCallback, createContext, useContext } = React;

/* ----------------------------- api client ----------------------------- */
async function req(url, opts){
  const r = await fetch(url, Object.assign({ credentials:"include" }, opts||{}));
  let data = null;
  try { data = await r.json(); } catch(e){ data = null; }
  return { ok: r.ok, status: r.status, data };
}
const api = {
  me: () => req("/api/me"),
  loginAdmin: (password) => req("/api/auth/admin", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ password }) }),
  logout: () => req("/api/auth/logout", { method:"POST" }),
  listForms: () => req("/api/forms"),
  createForm: (payload) => req("/api/forms", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) }),
  getForm: (id) => req("/api/forms/" + id),
  followup: (formId, questionId, answer) => req("/api/public/" + formId + "/followup", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ questionId, answer }) }),
  tone: (id, refresh) => req("/api/forms/" + id + "/tone" + (refresh ? "?refresh=1" : "")),
  listBrandKits: () => req("/api/brand-kits"),
  createBrandKit: (payload) => req("/api/brand-kits", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) }),
  deleteBrandKit: (id) => req("/api/brand-kits/" + id, { method:"DELETE" }),
  updateForm: (id, payload) => req("/api/forms/" + id, { method:"PUT", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) }),
  deleteForm: (id) => req("/api/forms/" + id, { method:"DELETE" }),
  responses: (id) => req("/api/forms/" + id + "/responses"),
  analytics: (id) => req("/api/forms/" + id + "/analytics"),
  dashSummary: (refresh) => req("/api/summary" + (refresh ? "?refresh=1" : "")),
  formSummary: (id, refresh) => req("/api/forms/" + id + "/summary" + (refresh ? "?refresh=1" : "")),
  publicForm: (username, slug) => req("/api/public/" + encodeURIComponent(username) + "/" + encodeURIComponent(slug)),
  submit: (formId, payload) => req("/api/public/" + formId + "/responses", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) }),
  uploadFile: (formId, file) => { const fd = new FormData(); fd.append("file", file); return req("/api/public/" + formId + "/upload", { method:"POST", body: fd }); },
};

/* ----------------------------- helpers ----------------------------- */
const uid = () => Math.random().toString(36).slice(2, 9);
const isEmpty = (v) => v === null || v === undefined || v === "" || (Array.isArray(v) && v.length === 0);
const FORM_FONTS = {
  sans: "Figtree,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif",
  serif: "'Georgia Pro',Georgia,'Times New Roman',serif",
  mono: "ui-monospace,'SF Mono',Menlo,monospace",
  slab: "'Roboto Slab',Georgia,serif",
  zetetiq: "'Mozilla Text','Mozilla Headline',system-ui,sans-serif",
};
const _loadedFonts = {};
function loadGoogleFont(name){
  if (!name || typeof name !== "string") return;
  const key = name.trim(); if (!key || _loadedFonts[key]) return;
  _loadedFonts[key] = true;
  try {
    const link = document.createElement("link"); link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=" + encodeURIComponent(key).replace(/%20/g, "+") + ":wght@400;500;600;700&display=swap";
    document.head.appendChild(link);
  } catch (e) {}
}
function readImageScaled(file, maxW, cb){
  const reader = new FileReader();
  reader.onerror = ()=>cb(null);
  reader.onload = ()=>{
    const img = new Image();
    img.onerror = ()=>cb(null);
    img.onload = ()=>{
      const scale = Math.min(1, maxW / (img.width || maxW));
      const w = Math.max(1, Math.round((img.width || maxW) * scale));
      const h = Math.max(1, Math.round((img.height || maxW) * scale));
      try {
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL("image/jpeg", 0.82));
      } catch (e) { cb(reader.result); }
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function fmtDate(s){
  if (!s) return "";
  const d = new Date(s.replace(" ", "T") + (s.includes("Z") ? "" : "Z"));
  if (isNaN(d)) return s;
  return d.toLocaleString(undefined, { year:"numeric", month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
}
function fmtWhen(s){
  if (!s) return "";
  const d = new Date(s.replace(" ", "T") + (s.includes("Z") ? "" : "Z"));
  if (isNaN(d)) return s;
  return d.toLocaleDateString(undefined, { month:"short", day:"numeric" }) + " at " + d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" });
}
function Spark(){
  return (<svg className="spark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6L12 2zM19 14l.8 2.7L22.5 17l-2.7.8L19 20.5l-.8-2.7L15.5 17l2.7-.8L19 14z"/></svg>);
}

/* ----------------------------- app context ----------------------------- */
const Ctx = createContext(null);
const useApp = () => useContext(Ctx);

/* ----------------------------- question registry ----------------------------- */
function fmtSlot(s){
  if (!s) return "";
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" }) + " at " + d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" });
}
function readFileDataUrl(file, maxBytes, cb){
  if (!file){ cb(null); return; }
  if (file.size && maxBytes && file.size > maxBytes){ cb(null); return; }
  const reader = new FileReader();
  reader.onerror = ()=>cb(null);
  reader.onload = ()=>{ const r = reader.result; if (typeof r === "string" && maxBytes && r.length > maxBytes * 1.4){ cb(null); return; } cb(r); };
  reader.readAsDataURL(file);
}
function FileUploadRenderer({ q, value, onChange, error, formId, preview }){
  const { toast } = useApp();
  const [busy, setBusy] = useState(false);
  const multiple = !!q.multiple;
  const items = multiple ? (Array.isArray(value) ? value : (value ? [value] : [])) : (value && value.key ? [value] : []);
  const pick = (file)=>{
    if (!file) return;
    if (preview || !formId){ toast("File uploads work on the published form."); return; }
    const maxMb = q.maxMb || 10;
    if (file.size && file.size > maxMb * 1024 * 1024){ toast("That file is larger than " + maxMb + " MB."); return; }
    setBusy(true);
    api.uploadFile(formId, file).then(({ ok, data })=>{
      setBusy(false);
      if (!ok || !data || !data.key){ toast((data && data.error === "storage_unconfigured") ? "File uploads are not set up for this form yet." : "Upload failed. Please try again."); return; }
      const rec = { key: data.key, name: data.name, size: data.size, type: data.type };
      if (multiple) onChange(items.concat([rec])); else onChange(rec);
    });
  };
  const removeAt = (i)=>{ if (multiple){ const next = items.slice(); next.splice(i, 1); onChange(next); } else onChange(null); };
  return (
    <div className="q">
      <QLabel q={q} />
      <label className={"filezone" + (error ? " err" : "") + (busy ? " busy" : "")}>
        <input type="file" accept={q.accept || undefined} multiple={multiple} style={{display:"none"}} disabled={busy} onChange={(e)=>{ const fs = e.target.files; if (multiple){ Array.prototype.slice.call(fs).forEach(pick); } else { pick(fs && fs[0]); } e.target.value = ""; }} />
        <span className="filezone-ico">{busy ? "Uploading\u2026" : (multiple ? "Choose files" : "Choose a file")}</span>
        <span className="filezone-hint">{q.accept ? ("Accepted: " + q.accept) : "Any file type"}{q.maxMb ? (" \u00b7 up to " + q.maxMb + " MB") : ""}</span>
      </label>
      {items.length > 0 && <div className="filelist">{items.map((it, i)=>(<div key={i} className="fileitem"><span className="filename">{it.name || "File"}</span><button type="button" className="fbtn-ghost sm" onClick={()=>removeAt(i)}>Remove</button></div>))}</div>}
      {error && <div className="ferr">{error}</div>}
    </div>
  );
}
function FileUploadControls({ q, update }){
  return (
    <div>
      <Field label="Accepted file types">
        <select className="select" value={q.accept || ""} onChange={(e)=>update({accept:e.target.value})}>
          <option value="">Any file</option>
          <option value="image/*">Images</option>
          <option value="application/pdf">PDF</option>
          <option value=".doc,.docx,.pdf,.txt,.rtf">Documents</option>
          <option value=".csv,.xls,.xlsx">Spreadsheets</option>
          <option value="image/*,application/pdf">Images and PDF</option>
        </select>
      </Field>
      <Field label="Maximum size (MB)"><input className="input" type="number" min="1" max="50" value={q.maxMb || 10} onChange={(e)=>update({maxMb: parseInt(e.target.value || "10", 10)})} /></Field>
      <Toggle checked={!!q.multiple} onChange={(c)=>update({multiple:c})} label="Allow multiple files" />
      <div className="hint" style={{marginTop:6}}>File storage must be enabled for your deployment (a Cloudflare R2 bucket bound as FILES). Without it, uploads show a friendly message.</div>
      <div className="panel-section">Response requirements</div>
      <Toggle checked={!!q.required} onChange={(c)=>update({required:c})} label="Force response" />
      <Toggle checked={!!q.request} onChange={(c)=>update({request:c})} label="Request response" />
    </div>
  );
}
function FileAnswer({ val, formId }){
  const items = Array.isArray(val) ? val : (val && val.key ? [val] : []);
  if (!items.length) return <span className="muted">No file</span>;
  return (<div>{items.map((it, i)=>(<div key={i} style={{marginBottom:4}}><a href={"/api/forms/" + formId + "/file?key=" + encodeURIComponent(it.key) + "&download=1"} target="_blank" rel="noopener noreferrer">{it.name || "Download file"}</a>{it.size ? <span className="muted" style={{fontSize:12,marginLeft:8}}>{Math.round(it.size/1024) + " KB"}</span> : null}</div>))}</div>);
}

function SigPad({ value, onChange, error, height }){
  const ref = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);
  const ctxOf = () => { try { const c = ref.current; return c && c.getContext ? c.getContext("2d") : null; } catch (e) { return null; } };
  const pos = (e) => { const c = ref.current; const r = c.getBoundingClientRect(); const t = (e.touches && e.touches[0]) ? e.touches[0] : e; const sx = r.width ? c.width / r.width : 1; const sy = r.height ? c.height / r.height : 1; return { x: (t.clientX - r.left) * sx, y: (t.clientY - r.top) * sy }; };
  const start = (e) => { const ctx = ctxOf(); if (!ctx) return; drawing.current = true; last.current = pos(e); };
  const move = (e) => { if (!drawing.current) return; const ctx = ctxOf(); if (!ctx) return; if (e.cancelable && e.preventDefault) e.preventDefault(); const p = pos(e); ctx.strokeStyle = "#1b1830"; ctx.lineWidth = 2.2; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.beginPath(); ctx.moveTo(last.current.x, last.current.y); ctx.lineTo(p.x, p.y); ctx.stroke(); last.current = p; };
  const end = () => { if (!drawing.current) return; drawing.current = false; const c = ref.current; if (c && c.toDataURL) onChange(c.toDataURL("image/png")); };
  const clear = () => { const c = ref.current; const ctx = ctxOf(); if (c && ctx) ctx.clearRect(0, 0, c.width, c.height); onChange(""); };
  useEffect(()=>{ const c = ref.current; const ctx = ctxOf(); if (!c || !ctx || !value || typeof value !== "string" || value.indexOf("data:") !== 0) return; const img = new window.Image(); img.onload = ()=>{ try { ctx.drawImage(img, 0, 0, c.width, c.height); } catch (e) {} }; img.src = value; }, []);
  return (
    <>
      <div className={"sigpad" + (error ? " err" : "")}><canvas ref={ref} width={520} height={height || 160} className="sigcanvas" onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={move} onTouchEnd={end}></canvas></div>
      <div className="sigrow"><span className="sighint">Draw your signature above</span><button type="button" className="fbtn-ghost sm" onClick={clear}>Clear</button></div>
    </>
  );
}
function SchedulingRenderer({ q, value, onChange, error, bookings }){
  const slots = Array.isArray(q.slots) ? q.slots : [];
  const counts = bookings || {};
  const now = Date.now();
  const groups = {}; const order = [];
  slots.forEach((s)=>{ const d = new Date(s.start); const key = isNaN(d) ? "Other" : d.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" }); if (!groups[key]){ groups[key] = []; order.push(key); } groups[key].push(s); });
  return (
    <div className="q">
      <QLabel q={q} />
      {(q.meetingTitle || q.duration || q.location) && (
        <div className="mt-card">
          {q.meetingTitle && <div className="mt-title">{q.meetingTitle}</div>}
          <div className="mt-meta">{[q.duration ? (q.duration + " min") : "", q.location || ""].filter(Boolean).join(" \u00b7 ")}</div>
        </div>
      )}
      {slots.length === 0 ? <div className="muted" style={{fontSize:13}}>No times have been added yet.</div> : (
        <div className="slot-wrap">
          {order.map((day)=>(
            <div key={day} className="slot-day">
              <div className="slot-date">{day}</div>
              <div className="slot-grid">
                {groups[day].map((s)=>{ const d = new Date(s.start); const tlabel = isNaN(d) ? s.start : d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" }); const cap = (s.capacity == null ? 1 : s.capacity); const used = counts[s.start] || 0; const full = cap > 0 && used >= cap; const past = !isNaN(d) && d.getTime() < now; const disabled = full || past; const isSel = value === s.start; return (<button type="button" key={s.id || s.start} className={"slot-btn" + (isSel ? " sel" : "")} disabled={disabled && !isSel} onClick={()=>onChange(s.start)}>{tlabel}{full ? <span className="slot-full">Full</span> : null}</button>); })}
              </div>
            </div>
          ))}
        </div>
      )}
      {error && <div className="ferr">{error}</div>}
    </div>
  );
}
function DocumentSignRenderer({ q, value, onChange, error }){
  const fields = Array.isArray(q.fields) ? q.fields : [];
  const data = (value && value.fields) || {};
  const setField = (fid, v)=> onChange({ fields: { ...data, [fid]: v } });
  return (
    <div className="q">
      <QLabel q={q} />
      {q.document ? (
        q.documentKind === "pdf"
          ? <iframe className="doc-view" src={q.document} title={q.documentName || "Document"} style={{width:"100%",height:520,border:"1px solid var(--line-strong)",borderRadius:10}}></iframe>
          : <img className="doc-view" src={q.document} alt={q.documentName || "Document"} style={{maxWidth:"100%",border:"1px solid var(--line-strong)",borderRadius:10}} />
      ) : <div className="muted" style={{fontSize:13}}>No document attached.</div>}
      {q.documentName && <div className="hint" style={{marginTop:6}}>{q.documentName}</div>}
      <div className="doc-fields">
        {fields.map((f)=>(
          <div key={f.id} className="doc-field">
            {f.kind === "check"
              ? <label className="opt-radio"><input type="checkbox" checked={!!data[f.id]} onChange={(e)=>setField(f.id, e.target.checked)} /><span>{f.label}</span></label>
              : (<><div className="label">{f.label}</div>
                  {f.kind === "signature" ? <SigPad value={data[f.id]} onChange={(v)=>setField(f.id, v)} height={120} />
                    : f.kind === "date" ? <input className="finput" type="date" value={data[f.id] || ""} onChange={(e)=>setField(f.id, e.target.value)} style={{maxWidth:220}} />
                    : f.kind === "long" ? <textarea className="finput" value={data[f.id] || ""} onChange={(e)=>setField(f.id, e.target.value)} style={{minHeight:80}} />
                    : <input className="finput" value={data[f.id] || ""} onChange={(e)=>setField(f.id, e.target.value)} />}
                </>)}
          </div>
        ))}
      </div>
      {error && <div className="ferr">{error}</div>}
    </div>
  );
}
function SchedulingControls({ q, update }){
  const slots = Array.isArray(q.slots) ? q.slots : [];
  const [newSlot, setNewSlot] = useState("");
  const add = ()=>{ if (!newSlot) return; update({ slots: slots.concat([{ id: uid(), start: newSlot, capacity: 1 }]) }); setNewSlot(""); };
  const remove = (id)=> update({ slots: slots.filter((s)=>s.id !== id) });
  const setCap = (id, c)=> update({ slots: slots.map((s)=> s.id === id ? { ...s, capacity: c } : s) });
  return (
    <div>
      <Field label="Meeting title"><input className="input" value={q.meetingTitle || ""} onChange={(e)=>update({meetingTitle:e.target.value})} /></Field>
      <div className="row" style={{gap:10}}>
        <Field label="Duration (min)" style={{flex:1}}><input className="input" type="number" min="5" value={q.duration || 30} onChange={(e)=>update({duration: parseInt(e.target.value || "0", 10)})} /></Field>
        <Field label="Location / link" style={{flex:2}}><input className="input" placeholder="Video call, address" value={q.location || ""} onChange={(e)=>update({location:e.target.value})} /></Field>
      </div>
      <div className="panel-section">Available times</div>

function ddDepth(nodes){ if (!nodes || !nodes.length) return 0; let m = 0; nodes.forEach((n)=>{ const d = ddDepth(n.children); if (d > m) m = d; }); return 1 + m; }
function DrillTree({ nodes, onChange, depth }){
  nodes = Array.isArray(nodes) ? nodes : [];
  const set = (id, patch)=> onChange(nodes.map((n)=> n.id === id ? { ...n, ...patch } : n));
  const add = ()=> onChange(nodes.concat([{ id: uid(), label:"", children:[] }]));
  const rm = (id)=> onChange(nodes.filter((n)=> n.id !== id));
  return (
    <div className="dd-tree" style={depth ? {marginLeft:14,borderLeft:"2px solid var(--line)",paddingLeft:10} : null}>
      {nodes.map((n)=>(
        <div key={n.id} className="dd-node">
          <div className="dd-row">
            <input className="input" placeholder="Option label" value={n.label} onChange={(e)=>set(n.id, { label:e.target.value })} />
            <button className="iconbtn" title="Add sub-option" onClick={()=>set(n.id, { children:(n.children || []).concat([{ id: uid(), label:"", children:[] }]) })}>+</button>
            <button className="iconbtn" title="Remove" onClick={()=>rm(n.id)}>\u00d7</button>
          </div>
          {(n.children && n.children.length > 0) && <DrillTree nodes={n.children} depth={(depth || 0) + 1} onChange={(ch)=>set(n.id, { children:ch })} />}
        </div>
      ))}
      <button className="btn sm ghost dd-add" onClick={add}>{depth ? "Add sub-option" : "Add top-level option"}</button>
    </div>
  );
}
function DrillControls({ q, update }){

      ))}

function DrillRenderer({ q, value, onChange, error }){
  const path = Array.isArray(value) ? value : [];
  const levels = Array.isArray(q.levels) ? q.levels : [];
  const selects = []; let nodes = q.tree || []; let depth = 0;
  while (nodes && nodes.length){
    const chosen = path[depth] || "";
    selects.push({ depth, nodes, chosen });
    const node = nodes.find((n)=> n.label === chosen);
    if (!node || !node.children || !node.children.length) break;
    nodes = node.children; depth++;
  }
  const choose = (d, label)=>{ let np = path.slice(0, d); if (label) np = np.concat([label]); onChange(np); };
  return (
    <div className="q">
      <QLabel q={q} />
      <div className="dd-selects">
        {selects.map((s)=>(
          <div className="dd-sel" key={s.depth}>
            {levels[s.depth] ? <div className="dd-sel-label">{levels[s.depth]}</div> : null}
            <select className="finput" value={s.chosen} onChange={(e)=>choose(s.depth, e.target.value)}>
              <option value="">{levels[s.depth] ? ("Select " + levels[s.depth]) : "Select..."}</option>
              {s.nodes.map((n)=>(<option key={n.id || n.label} value={n.label}>{n.label}</option>))}
            </select>
          </div>
        ))}
      </div>
      {error && <div className="ferr">{error}</div>}
    </div>
  );
}

function SignatureRenderer({ q, value, onChange, error }){
  const ref = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);
  const ctxOf = () => { try { const c = ref.current; return c && c.getContext ? c.getContext("2d") : null; } catch (e) { return null; } };
  const pos = (e) => { const c = ref.current; const r = c.getBoundingClientRect(); const t = (e.touches && e.touches[0]) ? e.touches[0] : e; const sx = r.width ? c.width / r.width : 1; const sy = r.height ? c.height / r.height : 1; return { x: (t.clientX - r.left) * sx, y: (t.clientY - r.top) * sy }; };
  const start = (e) => { const ctx = ctxOf(); if (!ctx) return; drawing.current = true; last.current = pos(e); };
  const move = (e) => { if (!drawing.current) return; const ctx = ctxOf(); if (!ctx) return; if (e.cancelable && e.preventDefault) e.preventDefault(); const p = pos(e); ctx.strokeStyle = "#1b1830"; ctx.lineWidth = 2.2; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.beginPath(); ctx.moveTo(last.current.x, last.current.y); ctx.lineTo(p.x, p.y); ctx.stroke(); last.current = p; };
  const end = () => { if (!drawing.current) return; drawing.current = false; const c = ref.current; if (c && c.toDataURL) onChange(c.toDataURL("image/png")); };
  const clear = () => { const c = ref.current; const ctx = ctxOf(); if (c && ctx) ctx.clearRect(0, 0, c.width, c.height); onChange(""); };
  useEffect(()=>{ const c = ref.current; const ctx = ctxOf(); if (!c || !ctx || !value || typeof value !== "string" || value.indexOf("data:") !== 0) return; const img = new window.Image(); img.onload = ()=>{ try { ctx.drawImage(img, 0, 0, c.width, c.height); } catch (e) {} }; img.src = value; }, []);
  return (
    <div className="q">
      <QLabel q={q} />
      <div className={"sigpad" + (error ? " err" : "")}>
        <canvas ref={ref} width={520} height={160} className="sigcanvas" onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={move} onTouchEnd={end}></canvas>
      </div>
      <div className="sigrow"><span className="sighint">Draw your signature above</span><button type="button" className="fbtn-ghost sm" onClick={clear}>Clear</button></div>
      {error && <div className="ferr">{error}</div>}
    </div>
  );
}
