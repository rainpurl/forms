<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>zetetiq</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Roboto+Slab:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bo:#BF5700;            /* burnt orange */
  --bo-dark:#9c4700;
  --ink:#1a1a1a;
  --ink-soft:#5b554e;
  --line:#ece7e1;
  --line-strong:#ddd5cb;
  --paper:#faf8f5;
  --card:#ffffff;
  --good:#2f7d52;
  --bad:#b23b3b;
  --radius:14px;
  --sans:'Figtree',system-ui,-apple-system,sans-serif;
  --display:'Fraunces',Georgia,serif;
  --mono:'Space Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit}
button{font-family:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
h1,h2,h3{font-family:var(--display);font-weight:500;letter-spacing:-0.01em;margin:0}
.mono{font-family:var(--mono)}
.muted{color:var(--ink-soft)}

/* layout */
.wrap{max-width:1040px;margin:0 auto;padding:0 22px}
.page{padding:28px 0 80px}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.stack{display:flex;flex-direction:column}
.grow{flex:1}

/* nav */
.nav{border-bottom:1px solid var(--line);background:rgba(250,248,245,.85);backdrop-filter:saturate(1.4) blur(8px);position:sticky;top:0;z-index:40}
.nav .wrap{height:58px;display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--mono);font-weight:700;font-size:18px;letter-spacing:-0.02em;color:var(--bo);cursor:pointer;border:0;background:none;padding:0}
.brand .dot{color:var(--ink)}
.greet{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}

/* buttons */
.btn{appearance:none;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);padding:9px 15px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;transition:.12s ease;line-height:1}
.btn:hover{border-color:#c9c0b5;background:#fcfbf9}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--bo);border-color:var(--bo);color:#fff}
.btn.primary:hover{background:var(--bo-dark);border-color:var(--bo-dark)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:#f1ece5}
.btn.danger{color:#fff;background:var(--bad);border-color:var(--bad)}
.btn.danger:hover{filter:brightness(.95)}
.btn.sm{padding:6px 11px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.iconbtn{border:1px solid var(--line-strong);background:var(--card);width:32px;height:32px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.iconbtn:hover{background:#f6f2ec}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius)}
.pad{padding:18px}
.pad-lg{padding:24px}

/* badges */
.badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em}
.badge.open{background:#e8f3ec;color:var(--good)}
.badge.closed{background:#f1ece5;color:var(--ink-soft)}

/* tables */
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;padding:10px 14px;border-bottom:1px solid var(--line)}
.table td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.table tr.clickable{cursor:pointer}
.table tr.clickable:hover td{background:#fbf8f4}
.table tr:last-child td{border-bottom:0}

/* inputs */
.field{display:block;margin-bottom:14px}
.label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;margin-bottom:6px}
.input,.textarea,.select{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:10px 12px;background:#fff;color:var(--ink);outline:none;transition:.12s}
.input:focus,.textarea:focus,.select:focus{border-color:var(--bo);box-shadow:0 0 0 3px rgba(191,87,0,.12)}
.textarea{min-height:84px;resize:vertical}
.hint{font-size:12.5px;color:var(--ink-soft);margin-top:5px}
.err{font-size:12.5px;color:var(--bad);margin-top:5px;font-weight:600}
.switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none;font-size:14px}
.switch input{display:none}
.switch .track{width:38px;height:22px;border-radius:999px;background:var(--line-strong);position:relative;transition:.15s}
.switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.switch input:checked + .track{background:var(--bo)}
.switch input:checked + .track .knob{left:18px}

/* ai summary card */
.ai{background:linear-gradient(180deg,#fff,#fdfaf6);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;position:relative}
.ai .ai-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai .spark{width:16px;height:16px;color:var(--bo)}
.ai .ai-title{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--bo);font-weight:700}
.ai .ai-body{font-size:14.5px;line-height:1.55;color:var(--ink);white-space:pre-wrap}
.ai .ai-foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:10px;border-top:1px dashed var(--line-strong)}
.ai .ai-meta{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.shimmer{height:13px;border-radius:6px;background:linear-gradient(90deg,#f0ebe4 25%,#f7f3ed 37%,#f0ebe4 63%);background-size:400% 100%;animation:sh 1.4s ease infinite;margin:7px 0}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* bars (analytics) */
.bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13.5px}
.bar-row .k{width:130px;flex:none;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .track2{flex:1;background:#f1ece5;border-radius:6px;height:20px;overflow:hidden}
.bar-row .fill{height:100%;background:var(--bo);border-radius:6px}
.bar-row .v{width:42px;flex:none;text-align:right;font-family:var(--mono);font-size:12px}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px}
.tab{appearance:none;border:0;background:none;padding:11px 14px;cursor:pointer;font-weight:600;font-size:14px;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--bo);border-bottom-color:var(--bo)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(26,26,26,.42);display:flex;align-items:center;justify-content:center;padding:20px;z-index:60}
.modal{background:#fff;border-radius:16px;max-width:520px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.25)}

/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.25)}

/* question card (builder) */
.qcard{border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:12px;overflow:hidden}
.qcard .qhead{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fcfbf9;border-bottom:1px solid var(--line)}
.qcard .qtype{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--bo);font-weight:700}
.qcard .qsummary{font-size:14px;color:var(--ink)}
.qbody{padding:14px}
.addmenu{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.addmenu button{text-align:left;border:1px solid var(--line-strong);background:#fff;border-radius:10px;padding:11px 12px;cursor:pointer}
.addmenu button:hover{border-color:var(--bo);background:#fffaf4}
.addmenu .t{font-weight:600;font-size:14px}
.addmenu .h{font-size:12px;color:var(--ink-soft);margin-top:2px}

/* landing */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.landing .lo{font-family:var(--mono);font-weight:700;font-size:42px;color:var(--bo);letter-spacing:-0.03em}
.landing .lo .dot{color:var(--ink)}
.landing .tag{max-width:430px;color:var(--ink-soft);font-size:16px;margin:14px 0 28px}
.gbtn{display:inline-flex;align-items:center;gap:10px;justify-content:center;width:100%;padding:12px 16px;border-radius:11px;border:1px solid var(--line-strong);background:#fff;font-weight:600;cursor:pointer}
.gbtn:hover{background:#fbf8f4}

/* form scope (respondent + preview): themed */
.form-scope{--fp:#BF5700;--fs:#1a1a1a;--fa:#BF5700;font-family:var(--sans)}
.form-scope .fcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px}
.form-scope .ftitle{font-family:var(--display);font-size:27px;color:var(--fs);font-weight:600;line-height:1.2}
.form-scope .fdesc{color:var(--ink-soft);margin-top:8px;font-size:15px}
.form-scope .q{padding:18px 0;border-bottom:1px solid var(--line)}
.form-scope .q:last-of-type{border-bottom:0}
.form-scope .qlabel{font-weight:600;font-size:16px;margin-bottom:10px;color:var(--fs)}
.form-scope .qlabel .req{color:var(--fa);margin-left:3px}
.form-scope .opt{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line-strong);border-radius:10px;margin:7px 0;cursor:pointer;transition:.1s}
.form-scope .opt:hover{border-color:var(--fp)}
.form-scope .opt.sel{border-color:var(--fp);background:color-mix(in srgb,var(--fp) 8%,#fff);box-shadow:0 0 0 1px var(--fp) inset}
.form-scope .opt input{accent-color:var(--fp)}
.form-scope .finput{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:11px 12px;outline:none}
.form-scope .finput:focus{border-color:var(--fp);box-shadow:0 0 0 3px color-mix(in srgb,var(--fp) 18%,transparent)}
.form-scope .submit{background:var(--fa);color:#fff;border:0;padding:12px 22px;border-radius:11px;font-weight:700;font-size:15px;cursor:pointer}
.form-scope .submit:hover{filter:brightness(.95)}
.form-scope .nps{display:flex;gap:6px;flex-wrap:wrap}
.form-scope .nps button{width:42px;height:42px;border:1px solid var(--line-strong);background:#fff;border-radius:9px;cursor:pointer;font-weight:600}
.form-scope .nps button.sel{background:var(--fa);color:#fff;border-color:var(--fa)}
.form-scope .nps-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:6px}
.form-scope input[type=range]{width:100%;accent-color:var(--fp)}
.form-scope .scale{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-soft);margin-top:4px}
.form-scope .ferr{color:#b23b3b;font-size:13px;margin-top:8px;font-weight:600}
.form-page{min-height:100vh;padding:34px 18px 70px;background:var(--paper)}
.form-page-inner{max-width:680px;margin:0 auto}
.center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;gap:14px}

.empty{text-align:center;padding:52px 20px;color:var(--ink-soft)}
.copyfield{display:flex;align-items:center;gap:8px;border:1px solid var(--line-strong);border-radius:10px;padding:7px 7px 7px 12px;background:#fcfbf9}
.copyfield code{font-family:var(--mono);font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
@media(max-width:620px){.addmenu{grid-template-columns:1fr}.bar-row .k{width:92px}.hide-sm{display:none}}

/* ---- builder: properties panel + canvas layout ---- */
.builder{display:flex;flex-direction:column;height:100vh;background:#f3efe9}
.b-top{height:54px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#fff;border-bottom:1px solid var(--line)}
.b-top .saved-note{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
.b-tools{position:relative}
.menu{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--line-strong);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.14);padding:6px;min-width:170px;z-index:50}
.menu button{display:block;width:100%;text-align:left;border:0;background:none;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:14px;color:var(--ink)}
.menu button:hover{background:#f4efe8}
.menu button.danger-text{color:var(--bad)}
.b-main{flex:1;display:flex;min-height:0}
.b-rail{width:54px;flex:none;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding-top:12px;gap:6px}
.b-rail button{width:38px;height:38px;border:0;background:none;border-radius:9px;cursor:pointer;color:var(--ink-soft);display:inline-flex;align-items:center;justify-content:center}
.b-rail button:hover{background:#f4efe8;color:var(--ink)}
.b-rail button.active{background:#fbe9da;color:var(--bo)}
.b-panel{width:320px;flex:none;background:#fff;border-right:1px solid var(--line);overflow:auto;padding:18px}
.panel-title{font-family:var(--display);font-size:18px;margin-bottom:14px}
.panel-section{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;margin:16px 0 9px;padding-top:13px;border-top:1px solid var(--line)}
.panel-section:first-of-type{border-top:0;padding-top:0;margin-top:4px}
.opt-radio{display:flex;align-items:center;gap:9px;padding:7px 0;cursor:pointer;font-size:14px}
.opt-radio.disabled{opacity:.5;cursor:not-allowed}
.opt-radio input{accent-color:var(--bo)}
.stepper{display:inline-flex;align-items:center;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden}
.stepper button{width:36px;height:34px;border:0;background:#fff;cursor:pointer;font-size:17px;color:var(--ink)}
.stepper button:hover{background:#f4efe8}
.stepper button:disabled{opacity:.4;cursor:not-allowed}
.stepper span{min-width:42px;text-align:center;font-family:var(--mono);font-size:14px;border-left:1px solid var(--line);border-right:1px solid var(--line);height:34px;display:inline-flex;align-items:center;justify-content:center}
.b-canvas{flex:1;overflow:auto;padding:26px 22px 90px}
.b-canvas-inner{max-width:840px;margin:0 auto}
.canvas-title{width:100%;border:0;background:none;font-family:var(--display);font-size:26px;font-weight:600;color:var(--ink);padding:6px 4px;margin-bottom:14px;outline:none;border-bottom:1px solid transparent}
.canvas-title:focus{border-bottom-color:var(--line-strong)}
.qblock{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:18px}
.qblock-head{padding:11px 16px;background:#faf7f2;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700}
.qblock-body{padding:14px}
.qblock-foot{padding:12px 14px;border-top:1px solid var(--line);background:#fcfbf9}
.qccard{border:1px solid var(--line);border-radius:11px;background:#fff;padding:14px;margin-bottom:12px;cursor:pointer;transition:border-color .1s, box-shadow .1s}
.qccard:last-child{margin-bottom:0}
.qccard:hover{border-color:var(--line-strong)}
.qccard.sel{border-color:var(--bo);box-shadow:0 0 0 2px rgba(191,87,0,.15)}
.qcc-head{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.qcc-num{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--bo)}
.qcc-type{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft)}
.qcc-menu{position:relative}
.wq-title{width:100%;border:0;background:none;font-size:16px;font-weight:600;color:var(--ink);outline:none;padding:3px 2px;border-radius:6px}
.wq-title:focus{background:#faf6f0}
.wq-title::placeholder{color:#b3a89c;font-weight:500}
.wq-textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:8px;min-height:64px;outline:none;resize:vertical;font-family:inherit}
.wq-body{margin-top:10px}
.wq-choice{display:flex;align-items:center;gap:9px;margin:6px 0}
.wq-mark{width:16px;height:16px;flex:none;border:1.5px solid var(--line-strong);background:#fff}
.wq-mark.rd{border-radius:50%}
.wq-mark.sq{border-radius:4px}
.wq-choice-input{flex:1;border:0;border-bottom:1px solid transparent;background:none;padding:5px 2px;outline:none;font-size:14px}
.wq-choice-input:focus{border-bottom-color:var(--line-strong);background:#faf6f0}
.wq-choice-input::placeholder{color:#b3a89c}
.wq-addchoice{border:0;background:none;color:var(--bo);font-weight:600;font-size:13px;cursor:pointer;padding:6px 2px;margin-top:2px}
.wq-addchoice:hover{text-decoration:underline}
.wq-prev{margin-top:4px}
.wq-prev-input{border:1px solid var(--line-strong);border-radius:8px;padding:9px 11px;color:#b3a89c;font-size:14px;background:#fcfbf9}
.wq-prev-input.tall{min-height:64px}
.addq{position:relative;display:inline-block}
.addq-menu{position:absolute;bottom:calc(100% + 8px);left:0;background:#fff;border:1px solid var(--line-strong);border-radius:12px;box-shadow:0 14px 36px rgba(0,0,0,.16);padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px;width:420px;z-index:50}
.addq-menu button{text-align:left;border:1px solid var(--line-strong);background:#fff;border-radius:10px;padding:10px 12px;cursor:pointer}
.addq-menu button:hover{border-color:var(--bo);background:#fffaf4}
.addq-menu .t{font-weight:600;font-size:14px}
.addq-menu .h{font-size:12px;color:var(--ink-soft);margin-top:2px}
.endcard{background:#fff;border:1px dashed var(--line-strong);border-radius:14px;padding:16px}
.b-preview{flex:1;overflow:auto;background:#f3efe9}
@media(max-width:860px){
  .b-rail{display:none}
  .b-panel{width:250px;padding:14px}
  .addq-menu{grid-template-columns:1fr;width:240px}
}

</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext } = React;

/* ----------------------------- api client ----------------------------- */
async function req(url, opts){
  const r = await fetch(url, Object.assign({ credentials:"include" }, opts||{}));
  let data = null;
  try { data = await r.json(); } catch(e){ data = null; }
  return { ok: r.ok, status: r.status, data };
}
const api = {
  me: () => req("/api/me"),
  loginAdmin: (password) => req("/api/auth/admin", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ password }) }),
  logout: () => req("/api/auth/logout", { method:"POST" }),
  listForms: () => req("/api/forms"),
  createForm: (payload) => req("/api/forms", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) }),
  getForm: (id) => req("/api/forms/" + id),
  updateForm: (id, payload) => req("/api/forms/" + id, { method:"PUT", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) }),
  deleteForm: (id) => req("/api/forms/" + id, { method:"DELETE" }),
  responses: (id) => req("/api/forms/" + id + "/responses"),
  analytics: (id) => req("/api/forms/" + id + "/analytics"),
  dashSummary: (refresh) => req("/api/summary" + (refresh ? "?refresh=1" : "")),
  formSummary: (id, refresh) => req("/api/forms/" + id + "/summary" + (refresh ? "?refresh=1" : "")),
  publicForm: (username, slug) => req("/api/public/" + encodeURIComponent(username) + "/" + encodeURIComponent(slug)),
  submit: (formId, payload) => req("/api/public/" + formId + "/responses", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) }),
};

/* ----------------------------- helpers ----------------------------- */
const uid = () => Math.random().toString(36).slice(2, 9);
const isEmpty = (v) => v === null || v === undefined || v === "" || (Array.isArray(v) && v.length === 0);
const FORM_FONTS = {

  serif: "'Georgia Pro',Georgia,'Times New Roman',serif",
  mono: "'Space Mono',ui-monospace,monospace",
  slab: "'Roboto Slab',Georgia,serif",
};
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function fmtDate(s){
  if (!s) return "";
  const d = new Date(s.replace(" ", "T") + (s.includes("Z") ? "" : "Z"));
  if (isNaN(d)) return s;
  return d.toLocaleString(undefined, { year:"numeric", month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
}
function Spark(){
  return (<svg className="spark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6L12 2zM19 14l.8 2.7L22.5 17l-2.7.8L19 20.5l-.8-2.7L15.5 17l2.7-.8L19 14z"/></svg>);
}

function Field({ label, children, style }){ return (<label className="field" style={style}><span className="label">{label}</span>{children}</label>); }
function Toggle({ checked, onChange, label }){
  return (<label className="switch"><input type="checkbox" checked={!!checked} onChange={(e)=>onChange(e.target.checked)} /><span className="track"><span className="knob"></span></span><span>{label}</span></label>);
}

/* ----------------------------- AI summary card ----------------------------- */
function AiSummary({ fetcher }){
  const [state, setState] = useState({ loading:true, summary:"", meta:null, error:null });
  const load = useCallback((refresh)=>{
    setState(s=>({ ...s, loading:true }));
    fetcher(refresh).then(({ok,data})=>{
      if (!ok || !data){ setState({ loading:false, summary:"", meta:null, error:"Could not load summary." }); return; }
      setState({ loading:false, summary:data.summary||"", meta:data, error:null });
    });
  },[fetcher]);
  useEffect(()=>{ load(false); },[load]);
  const m = state.meta;
  let metaText = "thinking...";
  if (!state.loading && m){
    if (m.generated === false) metaText = "basic summary";
    else if (m.cached) metaText = "cached";
    else if (m.generated) metaText = "generated just now";
    else metaText = "";
    if (m.ai_error) metaText += " · Workers AI offline";
  }
  return (
    <div className="ai" style={{marginBottom:22}}>
      <div className="ai-head"><Spark/><span className="ai-title">AI summary</span></div>
      {state.loading
        ? (<div><div className="shimmer" style={{width:"94%"}}/><div className="shimmer" style={{width:"88%"}}/><div className="shimmer" style={{width:"55%"}}/></div>)
        : (<div className="ai-body">{state.summary || state.error || "No summary available."}</div>)}
      <div className="ai-foot">
        <span className="ai-meta">{metaText}</span>
        <button className="btn sm ghost" disabled={state.loading} onClick={()=>load(true)}>Refresh</button>
      </div>
    </div>
  );
}

/* ----------------------------- shared form renderer ----------------------------- */
function FormRenderer({ form, preview, onSubmit, submitting }){
  const questions = form.schema.questions || [];
  const settings = form.schema.settings || {};
  const order = useMemo(()=> settings.randomizeQuestions ? shuffle(questions) : questions, [form.id, questions.length]);
  const [answers, setAnswers] = useState({});
  const [errors, setErrors] = useState({});
  const setA = (qid, v) => setAnswers(a=>({ ...a, [qid]: v }));
  const theme = form.theme || {};
  const scopeStyle = {
    "--fp": theme.primary || "#BF5700",
    "--fs": theme.secondary || "#1a1a1a",
    "--fa": theme.accent || theme.primary || "#BF5700",
    fontFamily: FORM_FONTS[theme.font] || FORM_FONTS.sans,
  };
  const handleSubmit = () => {
    if (preview) return;
    const errs = {};
    for (const q of questions){
      const def = QTYPES[q.type];
      if (!def || !def.isInput) continue;
      const err = def.validate(q, answers[q.id]);
      if (err) errs[q.id] = err;
    }
    if (Object.keys(errs).length){ setErrors(errs); return; }
    const skipped = questions.filter(q => QTYPES[q.type] && QTYPES[q.type].isInput && q.request && isEmpty(answers[q.id]));
    if (skipped.length){
      const names = skipped.map(q=>q.label||"a question").join(", ");
      if (!window.confirm("You skipped: " + names + ". Submit anyway?")) return;
    }
    setErrors({});
    onSubmit(answers);
  };
  return (
    <div className="form-scope" style={scopeStyle}>
      <div className="fcard">
        <div className="ftitle">{form.title}</div>
        {form.description && <div className="fdesc">{form.description}</div>}
        <div style={{marginTop:10}}>
          {order.map((q)=>{
            const def = QTYPES[q.type];
            if (!def) return null;
            const R = def.Renderer;
            return <R key={q.id} q={q} value={answers[q.id]} onChange={(v)=>setA(q.id, v)} error={errors[q.id]} />;
          })}
        </div>
        <div style={{marginTop:18}} className="row">
          <button className="submit" onClick={handleSubmit} disabled={preview || submitting}>{submitting ? "Submitting..." : "Submit"}</button>
          {preview && <span className="muted" style={{fontSize:13}}>Preview mode, submit disabled</span>}
        </div>
      </div>
    </div>
  );
}

/* ----------------------------- public form ----------------------------- */
function PublicForm({ username, slug }){
  const [st, setSt] = useState({ loading:true });
  const [submitting, setSubmitting] = useState(false);
  const [done, setDone] = useState(false);
  useEffect(()=>{
    let m = true;
    api.publicForm(username, slug).then(({ok,data})=>{
      if (!m) return;
      if (!ok || !data || data.error || !data.form) setSt({ loading:false, notFound:true });
      else setSt({ loading:false, form:data.form });
    });
    return ()=>{ m = false; };
  },[username, slug]);

  if (st.loading) return <div className="center-screen"><div className="muted">Loading...</div></div>;
  if (st.notFound) return <div className="center-screen"><h2>Form not found</h2><p className="muted">This link may be wrong, or the form was removed.</p></div>;
  const form = st.form;
  const scope = { "--fa": (form.theme && form.theme.accent) || "#BF5700", fontFamily: FORM_FONTS[form.theme && form.theme.font] || FORM_FONTS.sans };

  if (!form.is_open){
    return (<div className="form-page"><div className="form-page-inner"><div className="form-scope" style={scope}><div className="fcard"><div className="ftitle">{form.title}</div><p className="fdesc">This form is no longer accepting responses.</p></div></div></div></div>);
  }
  if (done){
    return (<div className="form-page"><div className="form-page-inner"><div className="form-scope" style={scope}><div className="fcard" style={{textAlign:"center"}}><div style={{fontSize:38,color:"var(--fa)"}}>✓</div><div className="ftitle" style={{marginTop:6}}>Thank you</div><p className="fdesc">Your response has been recorded.</p></div></div></div></div>);
  }
  const submit = (answers) => {
    setSubmitting(true);
    api.submit(form.id, { data: answers, viewport: { w: window.innerWidth, h: window.innerHeight }, referrer: document.referrer }).then(({ok,data})=>{
      setSubmitting(false);
      if (ok && data && data.ok) setDone(true);
      else window.alert((data && data.error === "form_closed") ? "This form just closed." : "Something went wrong. Please try again.");
    });
  };
  return (
    <div className="form-page"><div className="form-page-inner">
      <FormRenderer form={form} onSubmit={submit} submitting={submitting} />
      <div style={{textAlign:"center",marginTop:18}}><span className="mono" style={{fontSize:11,color:"var(--ink-soft)"}}>powered by zetetiq</span></div>
    </div></div>
  );
}

function normalizeForm(f){ return { ...f, theme: f.theme || blankForm().theme, schema:{ questions: (f.schema && f.schema.questions) || [], settings: (f.schema && f.schema.settings) || { randomizeQuestions:false } } }; }

function IconList(){ return (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4.5" cy="6" r="1.3" fill="currentColor" stroke="none"/><circle cx="4.5" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="4.5" cy="18" r="1.3" fill="currentColor" stroke="none"/></svg>); }
function IconTheme(){ return (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M12 3c4 4.8 6 7.2 6 10a6 6 0 0 1-12 0c0-2.8 2-5.2 6-10z"/></svg>); }
function IconCog(){ return (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="15" cy="8" r="2.4" fill="#fff"/><circle cx="9" cy="16" r="2.4" fill="#fff"/></svg>); }

function FullMsg({ text, onBack }){

function MCCanvas({ q, update }){
  const marker = q.multi ? "sq" : "rd";
  const setOpt = (i, v) => { const o = q.options.slice(); o[i] = v; update({ options: o }); };
  const add = () => update({ options: q.options.concat(["Option " + (q.options.length + 1)]) });
  const rm = (i) => update({ options: q.options.filter((_, k) => k !== i) });
  return (
    <div>
      {q.display === "dropdown" && <div className="mono" style={{fontSize:11,color:"var(--ink-soft)",marginBottom:6}}>Shown as a dropdown</div>}
      {q.options.map((o, i) => (
        <div className="wq-choice" key={i}>
          <span className={"wq-mark " + marker}></span>
          <input className="wq-choice-input" placeholder={"Click to write Choice " + (i + 1)} value={o} onChange={(e)=>setOpt(i, e.target.value)} />
          <button className="iconbtn" style={{width:26,height:26}} title="Remove choice" disabled={q.options.length <= 1} onClick={()=>rm(i)}>×</button>
        </div>
      ))}
      <button className="wq-addchoice" onClick={add}>+ Add choice</button>
    </div>
  );
}

function MCControls({ q, update }){
  const setCount = (n) => {
    n = Math.max(1, Math.min(20, n));
    let o = q.options.slice();
    while (o.length < n) o.push("Option " + (o.length + 1));
    if (o.length > n) o = o.slice(0, n);
    update({ options: o });
  };
  const dropdown = q.display === "dropdown";
  return (
    <div>
      <div className="panel-section">Answer type</div>
      <label className="opt-radio"><input type="radio" name={"at-" + q.id} checked={!q.multi} onChange={()=>update({multi:false})} /><span>Allow one answer</span></label>
      <label className={"opt-radio" + (dropdown ? " disabled" : "")}><input type="radio" name={"at-" + q.id} checked={!!q.multi} disabled={dropdown} onChange={()=>update({multi:true, display:"list"})} /><span>Allow multiple answers</span></label>
      <div className="panel-section">Choices</div>
      <div className="label">Number of choices</div>
      <div className="stepper">
        <button onClick={()=>setCount(q.options.length - 1)} disabled={q.options.length <= 1}>−</button>
        <span>{q.options.length}</span>
        <button onClick={()=>setCount(q.options.length + 1)} disabled={q.options.length >= 20}>+</button>
      </div>
      <div className="panel-section">Format</div>
      <Field label="Display">
        <select className="select" value={q.display} onChange={(e)=>{ const d = e.target.value; update(d === "dropdown" ? {display:"dropdown", multi:false} : {display:"list"}); }}>
          <option value="list">List</option>
          <option value="dropdown">Dropdown</option>
        </select>
      </Field>
      <Toggle checked={!!q.randomize} onChange={(c)=>update({randomize:c})} label="Randomize choice order" />
      <div className="panel-section">Response requirements</div>
      <Toggle checked={!!q.required} onChange={(c)=>update({required:c})} label="Force response" />
      <div style={{height:8}}></div>
      <Toggle checked={!!q.request} onChange={(c)=>update({request:c})} label="Request response" />
    </div>
  );
}

function LeftEditor({ q, update, questions, setQuestions }){

    if (type === q.type) return;
    const made = QTYPES[type].make();
    made.id = q.id;
    if ("label" in made && q.label !== undefined) made.label = q.label;
    made.required = !!q.required;
    made.request = !!q.request;
    setQuestions(questions.map((x)=> x.id === q.id ? made : x));

  return (
    <div>
      <div className="panel-title">Edit question</div>
      <Field label="Question type">
        <select className="select" value={q.type} onChange={(e)=>changeType(e.target.value)}>

function Builder({ formId }){
  const { navigate, toast } = useApp();
  const isNew = formId === "new";
  const [form, setForm] = useState(isNew ? blankForm() : null);
  const [id, setId] = useState(isNew ? null : formId);
  const [sel, setSel] = useState(null);
  const [mode, setMode] = useState("edit");
  const [preview, setPreview] = useState(false);
  const [saving, setSaving] = useState(false);
  const [savedAt, setSavedAt] = useState(null);
  const [tools, setTools] = useState(false);
  const [loadErr, setLoadErr] = useState(false);

  useEffect(()=>{
    if (isNew) return;
    api.getForm(formId).then(({ ok, data })=>{
      if (ok && data && data.form){ const f = normalizeForm(data.form); setForm(f); if (f.schema.questions[0]) setSel(f.schema.questions[0].id); }
      else setLoadErr(true);
    });
  },[formId, isNew]);

  if (loadErr) return <FullMsg text="Form not found." onBack={()=>navigate("/dashboard")} />;
  if (!form) return <FullMsg text="Loading..." />;

  const questions = form.schema.questions || [];
  const selQ = questions.find((q)=>q.id === sel) || null;

  const setTheme = (patch)=> setForm((f)=>({ ...f, theme:{ ...f.theme, ...patch } }));
  const setSettings = (patch)=> setForm((f)=>({ ...f, schema:{ ...f.schema, settings:{ ...f.schema.settings, ...patch } } }));
  const setQuestions = (qs)=> setForm((f)=>({ ...f, schema:{ ...f.schema, questions: qs } }));
  const addQ = (type)=>{ const q = QTYPES[type].make(); setQuestions(questions.concat([q])); setSel(q.id); setMode("edit"); };
  const updateQ = (qid, patch)=> setQuestions(questions.map((q)=> q.id === qid ? { ...q, ...patch } : q));
  const removeQ = (qid)=>{ setQuestions(questions.filter((q)=>q.id !== qid)); if (sel === qid) setSel(null); };
  const moveQ = (i, dir)=>{ const qs = questions.slice(); const j = i + dir; if (j < 0 || j >= qs.length) return; const t = qs[i]; qs[i] = qs[j]; qs[j] = t; setQuestions(qs); };
  const dupQ = (qid)=>{ const qs = questions.slice(); const idx = qs.findIndex((q)=>q.id === qid); const copy = { ...qs[idx], id: uid() }; qs.splice(idx + 1, 0, copy); setQuestions(qs); setSel(copy.id); };

  const del = ()=>{ if (!id) return; if (!window.confirm("Delete this form and all its responses? This cannot be undone.")) return; api.deleteForm(id).then(()=>{ toast("Form deleted"); navigate("/dashboard"); }); };

  const save = ()=>{
    setSaving(true);
    const payload = { title: form.title, description: form.description, theme: form.theme, schema: form.schema };
    const stamp = ()=> setSavedAt(new Date().toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" }));
    if (!id){
      api.createForm(payload).then(({ ok, data })=>{ setSaving(false); if (ok && data && data.id){ setId(data.id); window.history.replaceState({}, "", "/builder/" + data.id); stamp(); toast("Published"); } else toast("Save failed"); });
    } else {
      api.updateForm(id, payload).then(({ ok })=>{ setSaving(false); if (ok){ stamp(); toast("Saved"); } else toast("Save failed"); });
    }
  };

  const statusBadge = !id ? { cls:"closed", text:"Draft" } : (form.is_open ? { cls:"open", text:"Live" } : { cls:"closed", text:"Closed" });

  return (
    <div className="builder">
      <div className="b-top">
        <div className="row" style={{gap:12}}>
          <button className="brand" onClick={()=>navigate("/dashboard")}>zetetiq<span className="dot">.</span></button>
          <div className="b-tools">
            <button className="btn sm" onClick={()=>setTools((o)=>!o)}>Tools ▾</button>
            {tools && (
              <div className="menu">
                {id && <button onClick={()=>{ navigate("/dashboard/" + id); }}>View responses</button>}
                <button onClick={()=>{ setMode("theme"); setTools(false); }}>Theme</button>
                <button onClick={()=>{ setMode("settings"); setTools(false); }}>Form settings</button>
                {id && <button className="danger-text" onClick={()=>{ setTools(false); del(); }}>Delete form</button>}
              </div>
            )}
          </div>
          <span className="saved-note">{savedAt ? "Saved at " + savedAt : (id ? "Saved" : "Not saved yet")}</span>
          <span className={"badge " + statusBadge.cls}>{statusBadge.text}</span>
        </div>
        <div className="row">
          <button className="btn" onClick={()=>setPreview((p)=>!p)}>{preview ? "Edit" : "Preview"}</button>
          <button className="btn primary" disabled={saving} onClick={save}>{saving ? "Saving..." : "Publish"}</button>
        </div>
      </div>

      {preview ? (
        <div className="b-preview"><div style={{maxWidth:680, margin:"26px auto", padding:"0 18px"}}><FormRenderer form={form} preview /></div></div>
      ) : (
        <div className="b-main" onClick={()=>{ if (tools) setTools(false); }}>
          <div className="b-rail">
            <button className={mode === "edit" ? "active" : ""} title="Questions" onClick={()=>setMode("edit")}><IconList /></button>
            <button className={mode === "theme" ? "active" : ""} title="Theme" onClick={()=>setMode("theme")}><IconTheme /></button>
            <button className={mode === "settings" ? "active" : ""} title="Form settings" onClick={()=>setMode("settings")}><IconCog /></button>
          </div>

          <div className="b-panel">
            {mode === "edit" && (selQ
              ? <LeftEditor q={selQ} update={(p)=>updateQ(selQ.id, p)} questions={questions} setQuestions={setQuestions} />
              : <div><div className="panel-title">Edit question</div><div className="muted" style={{fontSize:14}}>Select a question in the canvas to edit it here, or add a new question.</div></div>)}
            {mode === "theme" && <ThemePanel form={form} setTheme={setTheme} />}
            {mode === "settings" && <SettingsPanel form={form} setForm={setForm} setSettings={setSettings} id={id} del={del} />}
          </div>

          <div className="b-canvas">
            <div className="b-canvas-inner">
              <input className="canvas-title" value={form.title} placeholder="Untitled form" onChange={(e)=>setForm((f)=>({ ...f, title:e.target.value }))} />
              <div className="qblock">
                <div className="qblock-head">Default question block</div>
                <div className="qblock-body">
                  {questions.length === 0 && <div className="muted" style={{padding:"18px 4px"}}>No questions yet. Use Add new question below.</div>}
                  {questions.map((q, i)=>(
                    <CanvasCard key={q.id} q={q} index={i} selected={sel === q.id}
                      onSelect={()=>{ setSel(q.id); setMode("edit"); }}
                      update={(p)=>updateQ(q.id, p)}
                      onDup={()=>dupQ(q.id)} onDel={()=>removeQ(q.id)} onUp={()=>moveQ(i, -1)} onDown={()=>moveQ(i, 1)} />
                  ))}
                </div>
                <div className="qblock-foot"><AddQuestionMenu onAdd={addQ} /></div>
              </div>
              <div className="endcard">
                <div className="mono" style={{fontSize:11,textTransform:"uppercase",letterSpacing:".05em",color:"var(--ink-soft)",fontWeight:700,marginBottom:8}}>End of form</div>
                <div style={{textAlign:"center",color:"var(--ink-soft)"}}>Thanks. Your response has been recorded.</div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function FormDashboard({ id }){
  const { navigate, toast } = useApp();
  const [form, setForm] = useState(null);
  const [tab, setTab] = useState("responses");
  const [loadErr, setLoadErr] = useState(false);
  const fetcher = useCallback((r)=>api.formSummary(id, r),[id]);
  useEffect(()=>{ api.getForm(id).then(({ok,data})=>{ if (ok && data && data.form) setForm(data.form); else setLoadErr(true); }); },[id]);

  if (loadErr) return (<div><TopNav/><div className="wrap page"><div className="empty card"><p>Form not found.</p></div></div></div>);
  if (!form) return (<div><TopNav/><div className="wrap page"><div className="muted">Loading...</div></div></div>);

  const url = form.username === "admin" ? window.location.origin + "/" + form.slug : window.location.origin + "/" + form.username + "/" + form.slug;
  const toggleOpen = ()=>{ const next = !form.is_open; setForm(f=>({...f, is_open: next})); api.updateForm(id, { is_open: next }).then(()=>toast(next ? "Form reopened" : "Form closed")); };
  const del = ()=>{ if (!window.confirm("Delete this form and all its responses? This cannot be undone.")) return; api.deleteForm(id).then(()=>{ toast("Form deleted"); navigate("/dashboard"); }); };

  return (
    <div>
      <TopNav/>
      <div className="wrap page">
        <button className="btn ghost sm" style={{marginBottom:14}} onClick={()=>navigate("/dashboard")}>← All forms</button>
        <div className="between" style={{marginBottom:6,flexWrap:"wrap",gap:10}}>
          <div className="row" style={{gap:12}}><h1 style={{fontSize:25}}>{form.title}</h1><span className={"badge "+(form.is_open?"open":"closed")}>{form.is_open?"Open":"Closed"}</span></div>
          <div className="row"><a className="btn sm" href={url} target="_blank" rel="noopener">View form</a><button className="btn sm" onClick={()=>navigate("/builder/"+id)}>Edit</button></div>
        </div>
        <div className="copyfield" style={{marginBottom:20,maxWidth:520}}><code>{url}</code><button className="btn sm" onClick={()=>{ if(navigator.clipboard) navigator.clipboard.writeText(url); toast("Link copied"); }}>Copy</button></div>

        <AiSummary fetcher={fetcher} />

        <div className="tabs">{["responses","analytics","settings"].map(t=>(<button key={t} className={"tab"+(tab===t?" active":"")} onClick={()=>setTab(t)}>{t[0].toUpperCase()+t.slice(1)}</button>))}</div>

        {tab==="responses" && <ResponsesTab id={id} form={form} />}
        {tab==="analytics" && <AnalyticsTab id={id} />}
        {tab==="settings" && (
          <div className="card pad-lg" style={{maxWidth:560}}>
            <div className="between" style={{marginBottom:8}}>
              <div><div style={{fontWeight:600}}>Accepting responses</div><div className="hint">When closed, the public link shows a closed message.</div></div>
              <Toggle checked={form.is_open} onChange={toggleOpen} label="" />
            </div>
            <hr style={{border:0,borderTop:"1px solid var(--line)",margin:"16px 0"}} />
            <div style={{fontWeight:600,marginBottom:8}}>Danger zone</div>
            <button className="btn danger" onClick={del}>Delete form</button>
          </div>
        )}
      </div>
    </div>
  );
}
function ResponsesTab({ id, form }){
  const [rows, setRows] = useState(null);
  const [open, setOpen] = useState(null);
  useEffect(()=>{ api.responses(id).then(({data})=> setRows((data && data.responses) || [])); },[id]);
  const labels = useMemo(()=>{ const m={}; (form.schema.questions||[]).forEach(q=>{ if (QTYPES[q.type] && QTYPES[q.type].isInput) m[q.id]=q.label||q.id; }); return m; },[form]);
  const previewCols = useMemo(()=> Object.keys(labels).slice(0,2), [labels]);
  const cell = (v)=> Array.isArray(v) ? v.join(", ") : (v===null||v===undefined ? "" : String(v));
  if (rows === null) return <div className="muted">Loading...</div>;
  if (rows.length === 0) return <div className="card empty"><p>No responses yet.</p></div>;
  return (
    <div>
      <div className="between" style={{marginBottom:12}}><span className="muted">{rows.length} response{rows.length===1?"":"s"}</span><a className="btn sm" href={"/api/forms/"+id+"/export"}>Download CSV</a></div>
      <div className="card" style={{overflowX:"auto"}}>
        <table className="table">
          <thead><tr><th>Submitted</th><th className="hide-sm">Location</th><th className="hide-sm">Device</th>{previewCols.map(c=>(<th key={c}>{labels[c]}</th>))}<th></th></tr></thead>
          <tbody>
            {rows.map(r=>(
              <tr key={r.id} className="clickable" onClick={()=>setOpen(r)}>
                <td style={{fontSize:13}}>{fmtDate(r.created_at)}</td>
                <td className="hide-sm" style={{fontSize:13}}>{[r.meta.city, r.meta.country].filter(Boolean).join(", ") || "-"}</td>
                <td className="hide-sm" style={{fontSize:13}}>{[r.meta.browser, r.meta.os].filter(Boolean).join(" / ") || "-"}</td>
                {previewCols.map(c=>(<td key={c} style={{fontSize:13,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cell(r.data[c])}</td>))}
                <td className="muted" style={{fontSize:18}}>›</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {open && (
        <Modal title={"Response · " + fmtDate(open.created_at)} onClose={()=>setOpen(null)}>
          <div className="pad-lg">
            {(form.schema.questions||[]).filter(q=>QTYPES[q.type] && QTYPES[q.type].isInput).map(q=>(
              <div key={q.id} style={{marginBottom:14}}><div className="label">{q.label||q.id}</div><div>{cell(open.data[q.id]) || <span className="muted">No answer</span>}</div></div>
            ))}
            <hr style={{border:0,borderTop:"1px solid var(--line)",margin:"14px 0"}} />
            <div className="mono" style={{fontSize:12,color:"var(--ink-soft)"}}>{[open.meta.city, open.meta.region, open.meta.country].filter(Boolean).join(", ")} · {[open.meta.browser, open.meta.os].filter(Boolean).join(" / ")}{open.meta.viewport ? " · " + open.meta.viewport.w + "x" + open.meta.viewport.h : ""}</div>
          </div>
        </Modal>
      )}
    </div>
  );
}
function BarCard({ title, rows }){
  const max = Math.max(1, ...rows.map(r=>r.c));
  return (<div className="card pad-lg"><div className="label" style={{marginBottom:10}}>{title}</div>
    {rows.length===0 ? <div className="muted" style={{fontSize:13}}>No data yet.</div> :
      rows.map((r,i)=>(<div className="bar-row" key={i}><span className="k">{r.k||"Unknown"}</span><span className="track2"><span className="fill" style={{width:(r.c/max*100)+"%"}}></span></span><span className="v">{r.c}</span></div>))}
  </div>);
}
function AnalyticsTab({ id }){
  const [a, setA] = useState(null);
  useEffect(()=>{ api.analytics(id).then(({data})=> setA(data || {})); },[id]);
  if (!a) return <div className="muted">Loading...</div>;
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr",gap:18,maxWidth:640}}>
      <div className="card pad-lg"><div className="label">Total responses</div><div style={{fontFamily:"var(--display)",fontSize:46,fontWeight:600,lineHeight:1}}>{a.total||0}</div></div>
      <BarCard title="Responses by day" rows={(a.byDay||[]).map(d=>({k:d.date,c:d.count}))} />
      <BarCard title="By country" rows={(a.byCountry||[]).map(d=>({k:d.name,c:d.count}))} />
      <BarCard title="By browser" rows={(a.byBrowser||[]).map(d=>({k:d.name,c:d.count}))} />
    </div>
  );
}

/* ----------------------------- app shell + router ----------------------------- */
function App(){
  const [path, setPath] = useState(window.location.pathname);
  const [user, setUser] = useState(undefined);
  const [toastMsg, setToastMsg] = useState(null);
  const toastTimer = useRef(null);
  const toast = useCallback((m)=>{ setToastMsg(m); clearTimeout(toastTimer.current); toastTimer.current = setTimeout(()=>setToastMsg(null), 2400); },[]);
  const navigate = useCallback((to, replace)=>{ if (replace) window.history.replaceState({}, "", to); else window.history.pushState({}, "", to); setPath(to); window.scrollTo(0,0); },[]);
  useEffect(()=>{ const onPop=()=>setPath(window.location.pathname); window.addEventListener("popstate", onPop); return ()=>window.removeEventListener("popstate", onPop); },[]);
  useEffect(()=>{ api.me().then(({data})=> setUser((data && data.user) || null)).catch(()=>setUser(null)); },[]);
  const ctx = useMemo(()=>({ user, setUser, navigate, toast }), [user, navigate, toast]);

  let view;
  if (user === undefined){
    view = <div className="center-screen"><div style={{fontFamily:"var(--mono)",color:"var(--bo)",fontWeight:700,fontSize:28}}>zetetiq<span style={{color:"var(--ink)"}}>.</span></div></div>;
  } else {
    const seg = path.split("/").filter(Boolean);
    const reserved = new Set(["dashboard","builder","login","api","assets","favicon.ico","robots.txt"]);
    if (seg.length === 1 && !reserved.has(seg[0])) view = <PublicForm username="admin" slug={seg[0]} />;
    else if (seg.length === 2 && !reserved.has(seg[0])) view = <PublicForm username={seg[0]} slug={seg[1]} />;
    else if (seg.length === 0) view = user ? <Dashboard/> : <Landing/>;
    else if (seg[0] === "login") view = <Landing showLogin />;
    else if (!user) view = <Landing showLogin />;
    else if (seg[0] === "dashboard" && seg.length === 1) view = <Dashboard/>;
    else if (seg[0] === "dashboard" && seg.length === 2) view = <FormDashboard id={seg[1]} />;
    else if (seg[0] === "builder" && seg.length === 2) view = <Builder formId={seg[1]} />;
    else view = <div className="center-screen"><h2>Not found</h2><button className="btn" onClick={()=>navigate(user ? "/dashboard" : "/")}>Go home</button></div>;
  }
  return (<Ctx.Provider value={ctx}>{view}{toastMsg && <div className="toast">{toastMsg}</div>}</Ctx.Provider>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
