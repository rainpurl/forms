<style>
:root{
  color-scheme: light;
  --bevel-raise:inset 0 1px 0 rgba(255,255,255,.85),0 1px 1px rgba(55,45,28,.06),0 2px 5px rgba(55,45,28,.1);--bevel-press:inset 0 2px 5px rgba(70,55,30,.24),inset 0 -1px 0 rgba(255,255,255,.35);--bevel-inset:inset 0 1.5px 4px rgba(70,55,30,.18),inset 0 -1px 0 rgba(255,255,255,.5);--bevel-soft:inset 0 1px 0 rgba(255,255,255,.7),0 1px 1.5px rgba(55,45,28,.07);
  --ease:cubic-bezier(.4,0,.2,1);--ease-spring:cubic-bezier(.34,1.4,.64,1);--t-fast:.14s;--t:.2s;--ring:0 0 0 3px rgba(92,136,205,.32);--raise-sheen:none;
  --bo:#5C88CD;            /* primary blue */
  --bo-dark:#4A73B5;
  --ink:#2A2620;
  --ink-soft:#736B5E;
  --line:#E0DACE;
  --line-strong:#CDC6B7;
  --paper:#f5f2f0;
  --card:#f5f2f0;
  --good:#4F8A5B;
  --bad:#C0563F;
  --radius:14px;
  --sans:'Mozilla Text',system-ui,-apple-system,sans-serif;
  --display:'Mozilla Headline','Mozilla Text',system-ui,sans-serif;
  --mono:'Mozilla Text',system-ui,sans-serif;
  --hover:#EAE5DA;
  --nav-bg:rgba(243,239,231,.84);
}
html[data-theme="dark"]{
  color-scheme: dark;
  --bevel-raise:inset 0 1px 0 rgba(255,255,255,.08),0 1px 1px rgba(0,0,0,.3),0 2px 6px rgba(0,0,0,.42);--bevel-press:inset 0 2px 5px rgba(0,0,0,.65);--bevel-inset:inset 0 1.5px 4px rgba(0,0,0,.6);--bevel-soft:inset 0 1px 0 rgba(255,255,255,.05),0 1px 2px rgba(0,0,0,.45);--raise-sheen:none;
  --bo:#7AA0DC; --bo-dark:#6B92D0;
  --ink:#ECE7DB; --ink-soft:#A69E8C;
  --line:#332F24; --line-strong:#46402F;
  --paper:#151310; --card:#211E18;
  --good:#6FBE83; --bad:#E0917A;
  --hover:#2A2620;
  --nav-bg:rgba(21,19,16,.86);
}
html[data-theme="dark"] .badge.open{background:rgba(84,201,138,.18)}
html[data-theme="dark"] .badge.closed{background:rgba(166,158,140,.16)}
html[data-theme="dark"] .bar-row .track2{background:#2A2620}
html[data-theme="dark"] .shimmer{background:linear-gradient(90deg,#221F18 25%,#2E2A20 37%,#221F18 63%);background-size:400% 100%}
html[data-theme="dark"] .ai{background:var(--card)}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit}
button{font-family:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
h1,h2,h3{font-family:var(--display);font-weight:500;letter-spacing:-0.01em;margin:0}
.mono{font-family:var(--mono)}
.muted{color:var(--ink-soft)}

/* layout */
.wrap{max-width:1040px;margin:0 auto;padding:0 22px}
.page{padding:28px 0 80px}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.stack{display:flex;flex-direction:column}
.grow{flex:1}

/* nav */
.nav{border-bottom:1px solid var(--line);background:var(--nav-bg);backdrop-filter:saturate(1.4) blur(8px);position:sticky;top:0;z-index:40}
.nav .wrap{height:58px;display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-0.02em;color:var(--bo);cursor:pointer;border:0;background:none;padding:0}
.brand .dot{color:var(--ink)}
.greet{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}

/* buttons */
.btn{appearance:none;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);padding:9px 15px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;transition:.12s ease;line-height:1;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{border-color:var(--line-strong);background:var(--hover)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--bo);border-color:var(--bo);color:#f5f2f0}
.btn.primary:hover{background:var(--bo-dark);border-color:var(--bo-dark)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:var(--hover)}
.btn.danger{color:#f5f2f0;background:var(--bad);border-color:var(--bad)}
.btn.danger:hover{filter:brightness(.95)}
.btn.sm{padding:6px 11px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.iconbtn{border:1px solid var(--line-strong);background:var(--card);width:32px;height:32px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.iconbtn:hover{background:var(--hover)}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius)}
.pad{padding:18px}
.pad-lg{padding:24px}

/* badges */
.badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em}
.badge.open{background:#e8f3ec;color:var(--good)}
.badge.closed{background:#EAE5DA;color:var(--ink-soft)}

/* tables */
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;padding:10px 14px;border-bottom:1px solid var(--line)}
.table td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.table tr.clickable{cursor:pointer}
.table tr.clickable:hover td{background:var(--hover)}
.table tr:last-child td{border-bottom:0}

/* inputs */
.field{display:block;margin-bottom:14px}
.label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;margin-bottom:6px}
.input,.textarea,.select{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:10px 12px;background:var(--card);color:var(--ink);outline:none;transition:.12s}
.input:focus,.textarea:focus,.select:focus{border-color:var(--bo);box-shadow:0 0 0 3px rgba(92,136,205,.16)}
.textarea{min-height:84px;resize:vertical}
.hint{font-size:12.5px;color:var(--ink-soft);margin-top:5px}
.err{font-size:12.5px;color:var(--bad);margin-top:5px;font-weight:600}
.switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none;font-size:14px}
.switch input{display:none}
.switch .track{width:44px;height:24px;flex:none;border-radius:999px;background:var(--line-strong);position:relative;transition:.15s}
.switch .knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#f5f2f0;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.switch input:checked + .track{background:var(--bo)}
.switch input:checked + .track .knob{left:23px}

/* ai summary card */
.ai{background:var(--card);border-color:transparent;box-shadow:var(--bevel-inset);border-radius:var(--radius);padding:16px 18px;position:relative}
.ai .ai-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai .spark{width:16px;height:16px;color:var(--bo)}
.ai .ai-title{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--bo);font-weight:700}
.ai .ai-body{font-size:14.5px;line-height:1.55;color:var(--ink);white-space:pre-wrap}
.ai .ai-foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:10px;border-top:1px dashed var(--line-strong)}
.ai .ai-meta{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.shimmer{height:13px;border-radius:6px;background:linear-gradient(90deg,#EAE5DA 25%,#f5f2f0 37%,#EAE5DA 63%);background-size:400% 100%;animation:sh 1.4s ease infinite;margin:7px 0}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* bars (analytics) */
.bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13.5px}
.bar-row .k{width:130px;flex:none;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .track2{flex:1;background:#EAE5DA;border-radius:6px;height:20px;overflow:hidden}
.bar-row .fill{height:100%;background:var(--bo);border-radius:6px}
.bar-row .v{width:42px;flex:none;text-align:right;font-family:var(--mono);font-size:12px}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px}
.tab{appearance:none;border:0;background:none;padding:11px 14px;cursor:pointer;font-weight:600;font-size:14px;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--bo);border-bottom-color:var(--bo)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(24,21,46,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:60}
.modal{background:var(--card);border-radius:16px;max-width:520px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.25)}

/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#f5f2f0;padding:10px 16px;border-radius:10px;font-size:14px;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.25)}

/* question card (builder) */
.qcard{border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:12px;overflow:hidden}
.qcard .qhead{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--hover);border-bottom:1px solid var(--line)}
.qcard .qtype{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--bo);font-weight:700}
.qcard .qsummary{font-size:14px;color:var(--ink)}
.qbody{padding:14px}
.addmenu{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.addmenu button{text-align:left;border:1px solid var(--line-strong);background:var(--card);border-radius:10px;padding:11px 12px;cursor:pointer}
.addmenu button:hover{border-color:var(--bo);background:var(--hover)}
.addmenu .t{font-weight:600;font-size:14px}
.addmenu .h{font-size:12px;color:var(--ink-soft);margin-top:2px}

/* landing */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.landing .lo{font-family:var(--display);font-weight:700;font-size:42px;color:var(--bo);letter-spacing:-0.03em}
.landing .lo .dot{color:var(--ink)}
.landing .tag{max-width:430px;color:var(--ink-soft);font-size:16px;margin:14px 0 28px}
.gbtn{display:inline-flex;align-items:center;gap:10px;justify-content:center;width:100%;padding:12px 16px;border-radius:11px;border:1px solid var(--line-strong);background:var(--card);font-weight:600;cursor:pointer}
.gbtn:hover{background:var(--hover)}

/* form scope (respondent + preview): themed */
.form-scope{--fp:#5C88CD;--fs:#2A2620;--fa:#5C88CD;--ftext:var(--fs);font-family:var(--sans)}
.form-page,.form-scope{--raise-sheen:none;--paper:#f5f2f0;--card:#f5f2f0;--ink:#2A2620;--ink-soft:#736B5E;--line:#E0DACE;--line-strong:#CDC6B7;--good:#4F8A5B;--bad:#C0563F;--hover:#EAE5DA;--bevel-raise:inset 0 1px 0 rgba(255,255,255,.85),0 1px 1px rgba(55,45,28,.06),0 2px 5px rgba(55,45,28,.1);--bevel-press:inset 0 2px 5px rgba(70,55,30,.24),inset 0 -1px 0 rgba(255,255,255,.35);--bevel-inset:inset 0 1.5px 4px rgba(70,55,30,.18),inset 0 -1px 0 rgba(255,255,255,.5);--bevel-soft:inset 0 1px 0 rgba(255,255,255,.7),0 1px 1.5px rgba(55,45,28,.07);}
html[data-theme="dark"] .form-page,html[data-theme="dark"] .form-scope{--raise-sheen:none;--paper:#151310;--card:#211E18;--ink:#ECE7DB;--ink-soft:#A69E8C;--line:#332F24;--line-strong:#46402F;--hover:#2A2620;--ftext:#ECE7DB;--bevel-raise:inset 0 1px 0 rgba(255,255,255,.08),0 1px 1px rgba(0,0,0,.3),0 2px 6px rgba(0,0,0,.42);--bevel-press:inset 0 2px 5px rgba(0,0,0,.65);--bevel-inset:inset 0 1.5px 4px rgba(0,0,0,.6);--bevel-soft:inset 0 1px 0 rgba(255,255,255,.05),0 1px 2px rgba(0,0,0,.45);}
html[data-theme="dark"] .form-scope .finput,html[data-theme="dark"] .form-scope textarea,html[data-theme="dark"] .form-scope select{background:var(--card);color:var(--ink)}
html[data-theme="dark"] .form-scope .fbtn-ghost:hover{background:var(--hover)}
.form-embed.form-page,.form-embed .form-scope,html[data-theme="dark"] .form-embed.form-page,html[data-theme="dark"] .form-embed .form-scope{--raise-sheen:none;--paper:#f5f2f0;--card:#f5f2f0;--ink:#2A2620;--ink-soft:#736B5E;--line:#E0DACE;--line-strong:#CDC6B7;--hover:#EAE5DA;--ftext:var(--fs);--bevel-raise:inset 0 1px 0 rgba(255,255,255,.85),0 1px 1px rgba(55,45,28,.06),0 2px 5px rgba(55,45,28,.1);--bevel-press:inset 0 2px 5px rgba(70,55,30,.24),inset 0 -1px 0 rgba(255,255,255,.35);--bevel-inset:inset 0 1.5px 4px rgba(70,55,30,.18),inset 0 -1px 0 rgba(255,255,255,.5);--bevel-soft:inset 0 1px 0 rgba(255,255,255,.7),0 1px 1.5px rgba(55,45,28,.07);}
.form-embed.form-page{min-height:auto;padding:14px 14px 22px;background:transparent}
.form-scope .fcard{background:var(--card);border:1px solid transparent;border-radius:16px;padding:22px;box-shadow:var(--bevel-inset)}
.form-scope .ftitle{font-family:inherit;font-size:27px;color:var(--ftext);font-weight:600;line-height:1.2}
.form-scope .fdesc{color:var(--ink-soft);margin-top:8px;font-size:15px}
.form-scope .q{padding:18px 0;border-bottom:1px solid var(--line)}
.form-scope .q:last-of-type{border-bottom:0}
.form-scope .qlabel{font-weight:600;font-size:16px;margin-bottom:10px;color:var(--ftext)}
.form-scope .qlabel .req{color:var(--fa);margin-left:3px}
.form-scope .opt{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line-strong);border-radius:10px;margin:7px 0;cursor:pointer;transition:.1s}
.form-scope .opt:hover{border-color:var(--fp)}
.form-scope .opt.sel{border-color:var(--fp);background:color-mix(in srgb,var(--fp) 8%,#f5f2f0);box-shadow:0 0 0 1px var(--fp) inset}
.form-scope .opt input{accent-color:var(--fp)}

/* ---- round 4: animations, drag-drop, trash, pages, analytics ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.985)}to{opacity:1;transform:none}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
.qccard,.pbreak{animation:fadeUp .25s ease both}
.overlay{animation:fadeIn .18s ease both}
.modal{animation:pop .22s cubic-bezier(.2,.8,.2,1) both}
.toast{animation:toastIn .28s ease both}
.menu{animation:pop .15s ease both}
.tab{transition:color .15s,border-color .15s}
.form-scope .opt,.form-scope .nps button,.form-scope .stars .star,.form-scope .submit,.form-scope .rankrow{transition:all .14s ease}
.qccard,.blockcard,.pbreak{transition:border-color .12s,box-shadow .15s,transform .18s cubic-bezier(.2,.8,.2,1)}
/* drag and drop */
.drag-handle{cursor:grab;color:var(--ink-soft);font-size:14px;line-height:1;padding:2px 5px;border-radius:6px;user-select:none}
.drag-handle:hover{background:var(--paper);color:var(--ink)}
.drag-handle:active{cursor:grabbing}
.qccard.dragging,.blockcard.dragging,.pbreak.dragging{box-shadow:0 16px 36px rgba(0,0,0,.24);border-color:var(--bo);position:relative;z-index:40;cursor:grabbing}
.form-scope .rankrow .rgrip{cursor:grab;color:var(--ink-soft);user-select:none;font-size:14px}
.form-scope .rankrow .rgrip:active{cursor:grabbing}
.form-scope .rankrow.dragging{opacity:.5}
.form-scope .rankrow.over{box-shadow:0 -3px 0 0 var(--fa)}
/* page break divider (builder) */
.pbreak{display:flex;align-items:center;gap:10px;margin:10px 2px;padding:6px 8px;border-radius:9px;cursor:pointer}
.pbreak.sel{background:rgba(92,136,205,.16)}
.pbreak-line{flex:1;height:1px;background:var(--line-strong)}
.pbreak-label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--bo);font-weight:700}
/* paginated form */
.form-scope .fprogress{height:6px;background:color-mix(in srgb,var(--fp) 12%,#f5f2f0);border-radius:999px;overflow:hidden;margin-top:14px}
.form-scope .fprogress-bar{height:100%;background:var(--fa);border-radius:999px;transition:width .35s ease}
.form-scope .fnav{display:flex;align-items:center;gap:12px}
.form-scope .fpage-count{font-size:13px;color:var(--ink-soft)}
.form-scope .fbtn-ghost{border:1px solid transparent;background:var(--card);color:var(--ftext);padding:11px 18px;border-radius:10px;font-weight:600;cursor:pointer;transition:background .14s}
.form-scope .fbtn-ghost:hover{background:var(--hover)}
.form-scope .fpage{animation:fadeUp .28s ease both}
/* add-question modal */
.addq-modal{max-width:560px}
.addq-modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
.addq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px 18px;max-height:62vh;overflow:auto}
.addq-item{text-align:left;border:1px solid var(--line-strong);background:var(--card);border-radius:10px;padding:11px 12px;cursor:pointer;transition:border-color .12s,background .12s}
.addq-item:hover{border-color:var(--bo);background:var(--hover)}
.addq-item .t{font-weight:600;font-size:14px}
.addq-item .h{font-size:12px;color:var(--ink-soft);margin-top:2px}
.addq-adv-toggle{grid-column:1/-1;text-align:center;border:1px dashed var(--line-strong);background:transparent;border-radius:10px;padding:14px 16px;margin:10px 0 4px;cursor:pointer;color:var(--ink-soft);font-size:13px;font-weight:600;transition:border-color .12s,color .12s}
.addq-adv-toggle:hover{border-color:var(--bo);color:var(--ink)}
@media(max-width:560px){.addq-grid{grid-template-columns:1fr}}
/* trash */
.trashbox{margin-top:18px;border:1px solid var(--line);border-radius:14px;background:var(--card);overflow:hidden}
.trashbox-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--hover);border-bottom:1px solid var(--line)}
.trashbox-head .t{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700}

.trash-item:last-child{border-bottom:0}

.trash-item .ti-type{font-size:11px;color:var(--ink-soft);font-family:var(--mono);text-transform:uppercase}
/* analytics aggregates */
.statgrid{display:flex;gap:26px;flex-wrap:wrap}
.bignum{font-family:var(--display);font-size:30px;font-weight:600;line-height:1}

.rankresult .rr-avg{font-size:12px;color:var(--ink-soft);font-family:var(--mono)}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}

.form-scope .nps button.on,.form-scope .slot-btn.sel{box-shadow:var(--bevel-press);transform:none}
.form-scope .opt{box-shadow:var(--bevel-inset);background-image:none}
.form-scope .opt:hover{box-shadow:var(--bevel-inset);background:var(--hover);transform:none}
.form-scope .opt.sel{box-shadow:var(--bevel-press);transform:none}
.btn:focus,.btn.primary:focus,.btn.danger:focus,.iconbtn:focus,.gbtn:focus,.zsel:focus,.cpick-trigger:focus,.cal-nav:focus,.form-scope .submit:focus,.form-scope .fcta:focus,.form-scope .fbtn-ghost:focus,.form-scope .slot-btn:focus{outline:none}

.btn:focus-visible,.iconbtn:focus-visible,.gbtn:focus-visible{box-shadow:var(--bevel-raise),0 4px 12px rgba(55,45,28,.12);transform:translateY(-1px)}
.zsel:focus-visible,.cpick-trigger:focus-visible{box-shadow:var(--bevel-press)}
/* signed-out landing recessed/stamped to match */
.lp-card{background:var(--paper);border-color:transparent;box-shadow:var(--bevel-inset)}
.lp-chip{background:var(--paper);border-color:transparent;box-shadow:var(--bevel-inset)}
.lp-ico{box-shadow:var(--bevel-inset)}
.lp-win{border-color:transparent;box-shadow:var(--bevel-raise),0 26px 64px -30px rgba(20,16,48,.5)}
/* loading: zetetiq wordmark, same colour as the background, pressed in */
.loadlogo{display:inline-flex;align-items:center;color:#e7e1d6}
.loadlogo .logo svg{filter:drop-shadow(0 1px 0 rgba(255,255,255,.9));animation:loadpulse 1.7s var(--ease) infinite}
html[data-theme="dark"] .loadlogo{color:#201c17}

@keyframes loadpulse{0%,100%{opacity:.5}50%{opacity:.92}}
/* initial boot splash before the app mounts */
.boot-splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--paper);z-index:9999}
.boot-word{font-family:var(--display),system-ui,sans-serif;font-size:44px;font-weight:700;letter-spacing:-.01em;color:#e7e1d6;text-shadow:0 1px 0 rgba(255,255,255,.9);animation:loadpulse 1.7s var(--ease) infinite}

/* theme toggle while filling out a form */
.form-theme-toggle{position:fixed;top:16px;right:16px;z-index:60}
/* poll heatmap number legible on green tint in dark mode */
html[data-theme="dark"] .poll-heatcell{color:#E8F5EC}
@media (prefers-reduced-motion: reduce){.loadlogo .logo svg,.boot-word{animation:none}}

/* footer admin sign-in + admin console */
.lp-foot-admin{appearance:none;background:none;border:none;color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:3px;font-family:inherit}
.lp-foot-admin:hover{color:var(--ink)}
.admin-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:22px}
.astat{background:var(--card);box-shadow:var(--bevel-inset);border-radius:12px;padding:14px 16px}
.astat .av{font-family:var(--display);font-size:26px;font-weight:700;line-height:1.1}
.astat .al{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-top:4px}
.admin-users td{vertical-align:top}
.admin-users tr.clickable{cursor:pointer}
.urow-detail td{background:var(--hover)}
.admin-forms{display:flex;flex-direction:column;gap:7px;padding:4px 0 6px}
.aform{display:flex;align-items:center;gap:10px;font-size:13px;flex-wrap:wrap}
.aform-title{font-weight:600}
.aform-meta{color:var(--ink-soft);font-size:12px}

/* 3-way response requirement selector */
.reqsel{display:flex;align-items:center;gap:10px;margin:2px 0 4px}
.reqsel-seg{display:inline-flex;background:var(--card);border-radius:9px;box-shadow:var(--bevel-inset);padding:3px;gap:2px}
.reqsel-opt{appearance:none;border:none;background:none;font:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);padding:6px 14px;border-radius:7px;cursor:pointer;transition:background .12s,color .12s,box-shadow .12s}
.reqsel-opt:hover{color:var(--ink)}
.reqsel-opt.on{background:var(--bo);color:#f5f2f0;box-shadow:var(--bevel-raise)}
/* e-sign: larger placement modal, circle field, field flags */
.modal-wide{max-width:880px}
.doc-place-lg{max-width:100%}
.doc-place-lg .pdf-page{margin:0 auto 12px}
.field-flag{font-size:12px;color:var(--ink-soft);background:var(--hover);border-radius:8px;padding:3px 9px}
.field-flag.on{color:var(--ink)}
.doc-circle{width:30px;height:30px;border-radius:50%;border:2px dashed var(--fa,#5C88CD);background:transparent;cursor:pointer;padding:0;opacity:.55;transition:opacity .12s,border-style .12s,box-shadow .12s}
.doc-circle:hover{opacity:1}
.doc-circle.on{border-style:solid;border-width:3px;opacity:1;box-shadow:0 0 0 2px var(--fa,#5C88CD) inset}
.doc-place-circle{background:transparent;border:none;box-shadow:none;min-width:0;padding:0}
.ai-note{font-size:12px;color:var(--ink-soft);margin-top:8px;line-height:1.45}

/* nav wordmark: recessed, single soft shadow (no doubled dots) */
.nav .brand,.b-top .brand{color:#e4ded9}
.nav .brand .logo svg,.b-top .brand .logo svg{filter:drop-shadow(0 1px 0 rgba(255,255,255,.9))}
html[data-theme="dark"] .nav .brand,html[data-theme="dark"] .b-top .brand{color:#100e0c}
html[data-theme="dark"] .nav .brand .logo svg,html[data-theme="dark"] .b-top .brand .logo svg{filter:drop-shadow(0 1px 0 rgba(255,255,255,.08))}

/* calendar month/year drill-down */
.cal-title-btn{appearance:none;border:0;background:none;font:inherit;font-weight:600;font-size:14px;color:var(--ink);cursor:pointer;padding:4px 12px;border-radius:8px;transition:background-color var(--t-fast) var(--ease)}
.cal-title-btn:hover{background:var(--hover)}
.cal-mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:2px 0}
.cal-mo{appearance:none;border:0;background:var(--card);cursor:pointer;padding:11px 0;border-radius:9px;font-size:13px;font-weight:600;color:var(--ink);box-shadow:var(--bevel-raise);background-image:var(--raise-sheen);transition:transform var(--t-fast),box-shadow var(--t-fast),background-color var(--t-fast)}
.cal-mo:hover{transform:translateY(-1px)}
.cal-mo:active{box-shadow:var(--bevel-press);background-image:none;transform:translateY(1px)}
.cal-mo.sel{background:var(--bo);color:#f5f2f0;box-shadow:var(--bevel-press)}
/* plan pills, bar, locks */
.plan-pill{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;padding:3px 9px;border-radius:999px;background:var(--hover);color:var(--ink-soft)}
.plan-pill.plan-pro,.plan-pill.plan-edu{background:color-mix(in srgb,var(--bo) 16%,transparent);color:var(--bo)}
.plan-pill.plan-premium,.plan-pill.plan-enterprise{background:var(--bo);color:#f5f2f0}
.plan-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:var(--card);box-shadow:var(--bevel-inset);border-radius:12px;padding:12px 16px;margin-bottom:18px}
.plan-bar-l{display:flex;align-items:center;gap:10px}
.plan-usage{font-size:13px;color:var(--ink-soft)}
.plan-lock-row{display:flex;align-items:center;gap:10px}
.plan-lock-block{margin:4px 0}
.app-list{display:flex;flex-direction:column;gap:10px}
.app-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:var(--card);box-shadow:var(--bevel-soft);border-radius:11px;padding:12px 14px;flex-wrap:wrap}
.app-note{font-size:13px;color:var(--ink-soft);margin-top:5px;max-width:520px}
.app-actions{display:flex;gap:8px}
/* pricing table */
.price-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:10px}
.price-card{position:relative;background:var(--card);border-radius:15px;box-shadow:var(--bevel-raise);padding:22px 16px 18px;display:flex;flex-direction:column}
.price-card.featured{box-shadow:var(--bevel-raise),0 0 0 2px var(--bo)}
.price-flag{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--bo);color:#f5f2f0;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 10px;border-radius:999px;white-space:nowrap}
.price-badge{font-size:10px;font-weight:700;color:var(--bo);text-transform:uppercase;letter-spacing:.03em;margin-bottom:5px;line-height:1.2}
.price-name{font-family:var(--display);font-size:17px;font-weight:700;color:var(--ink)}
.price-amt{font-family:var(--display);font-size:30px;font-weight:700;color:var(--ink);margin:6px 0 2px;line-height:1}
.price-cad{font-size:13px;font-weight:500;color:var(--ink-soft)}
.price-tag{font-size:13px;color:var(--ink-soft);min-height:36px;margin-bottom:13px}
.price-feats{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
.price-feats li{font-size:13px;color:var(--ink);padding-left:21px;position:relative;line-height:1.35}
.price-feats li.pf-yes::before{content:"";position:absolute;left:2px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--good)}
.price-feats li.pf-no{color:var(--ink-soft);opacity:.7}
.price-feats li.pf-no::before{content:"";position:absolute;left:2px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--line-strong)}
@media(max-width:980px){.price-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.price-grid{grid-template-columns:1fr}}

/* stars: recessed/carved glyphs */
.form-scope .stars .star{text-shadow:0 1px 0 rgba(255,255,255,.6),0 -1px 1px rgba(70,55,30,.22)}
html[data-theme="dark"] .form-scope .stars .star{text-shadow:0 1px 1px rgba(0,0,0,.55),0 -1px 0 rgba(255,255,255,.06)}
/* account dropdown */
.acct-wrap{position:relative;display:inline-flex}
.acct-menu{position:absolute;top:calc(100% + 8px);right:0;z-index:120;width:300px;background:var(--card);border-radius:13px;box-shadow:var(--bevel-raise),0 18px 40px rgba(40,30,15,.22);padding:14px;transform-origin:top right;animation:menupop .14s var(--ease) both}
.acct-menu-h{font-family:var(--display);font-weight:700;font-size:15px;color:var(--ink);margin-bottom:10px}

.acct-lbl{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.acct-hint{font-size:12px;color:var(--ink-soft);margin-top:5px;line-height:1.4}
/* question picker section headers */
.addq-section-h{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:700;text-align:center;margin:16px 2px 9px;padding-top:13px;border-top:1px solid var(--line)}
.addq-section-h:first-of-type{border-top:0;padding-top:0;margin-top:2px}
/* hide the Google website-translate banner/gadget */
.goog-te-banner-frame.skiptranslate{display:none!important}
body{top:0!important}
.goog-te-gadget-icon,#goog-gt-tt,.goog-te-balloon-frame{display:none!important}
.goog-text-highlight{background:none!important;box-shadow:none!important}
#google_translate_element{display:none!important}
.wd-row{display:flex;flex-wrap:wrap;gap:6px}
.wd-chip{appearance:none;border:0;background:var(--card);box-shadow:var(--bevel-raise);background-image:var(--raise-sheen);color:var(--ink-soft);font-size:12.5px;font-weight:700;padding:7px 11px;border-radius:9px;cursor:pointer;transition:transform var(--t-fast),box-shadow var(--t-fast),color var(--t-fast),background-color var(--t-fast)}
.wd-chip:hover{transform:translateY(-1px);color:var(--ink)}
.wd-chip.on{background:var(--bo);color:#f5f2f0;box-shadow:var(--bevel-press);background-image:none}
.acct-cal-on{font-size:13px;color:var(--ink);line-height:1.4;word-break:break-word}
/* advanced question types: expansion animation */
.addq-adv-grid{overflow:hidden;animation:addqExpand .26s var(--ease) both}
@keyframes addqExpand{from{opacity:0;max-height:0;transform:translateY(-4px)}to{opacity:1;max-height:1600px;transform:none}}
/* calendar connect rows */
.cal-connect{display:flex;flex-direction:column;gap:8px}
.cal-row{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:600;color:var(--ink)}
.cal-connect-btn{appearance:none;border:0;cursor:pointer;background:var(--card);box-shadow:var(--bevel-raise);background-image:var(--raise-sheen);text-align:left;transition:transform var(--t-fast),box-shadow var(--t-fast)}
.cal-connect-btn:hover{transform:translateY(-1px)}
.cal-connect-btn:active{box-shadow:var(--bevel-press);transform:none}
.cal-row-on{background:var(--paper);box-shadow:var(--bevel-inset)}
.cal-row-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-soon-row{opacity:.6;cursor:default}
.cal-soon-row:hover{transform:none;box-shadow:var(--bevel-raise)}
.cal-soon{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);white-space:nowrap}
/* booking calendar */
.book-cal{display:flex;gap:20px;align-items:flex-start;margin-top:6px}
.book-month{flex:1;min-width:0}
.book-mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.book-mtitle{font-size:17px;font-weight:700;color:var(--ftext)}
.book-myear{color:var(--ink-soft);font-weight:600}
.book-nav{display:flex;gap:4px}
.book-navbtn{appearance:none;border:0;background:transparent;color:var(--ink-soft);font-size:20px;line-height:1;width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.book-navbtn:hover{background:var(--card);color:var(--ftext)}
.book-wdrow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
.book-wd{text-align:center;font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--ink-soft)}
.book-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.book-day{position:relative;appearance:none;border:0;background:transparent;color:var(--ftext);aspect-ratio:1/1;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s,transform .12s,box-shadow .12s}

.book-daynum{position:relative;z-index:1}
.book-daymon{position:absolute;top:-7px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;letter-spacing:.03em;color:var(--ink-soft);background:var(--card);padding:1px 5px;border-radius:6px;z-index:2}
.book-daydot{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--fa)}

.book-times{width:212px;flex-shrink:0;display:flex;flex-direction:column;min-width:0}
.book-thead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.book-tdate{font-size:16px;font-weight:700;color:var(--ftext)}
.book-ap{display:inline-flex;border-radius:9px;padding:2px;background:var(--card);box-shadow:var(--bevel-inset);flex-shrink:0}
.book-apbtn{appearance:none;border:0;background:transparent;color:var(--ink-soft);font-size:12px;font-weight:700;padding:4px 9px;border-radius:7px;cursor:pointer;transition:.12s}
.book-apbtn.on{background:var(--card);color:var(--ftext);box-shadow:var(--bevel-raise)}
.book-tlist{display:flex;flex-direction:column;gap:8px;max-height:360px;overflow-y:auto;padding-right:2px}
.book-slot{position:relative;appearance:none;border:1px solid transparent;background:var(--card);color:var(--ftext);border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;box-shadow:var(--bevel-inset);transition:transform .12s,box-shadow .12s,border-color .12s}
.book-slot:hover:not(:disabled):not(.sel){transform:translateY(-1px);border-color:var(--fa)}
.book-slot.sel{background:var(--fa);color:#f5f2f0;border-color:var(--fa);box-shadow:var(--bevel-press)}
.book-slot:disabled{opacity:.5;cursor:not-allowed}
.book-slotspots{display:block;font-size:10px;font-weight:600;color:var(--ink-soft);margin-top:2px}
.book-slot.sel .book-slotspots{color:#f5f2f0}
@media (max-width:560px){.book-cal{flex-direction:column}.book-times{width:100%}.book-tlist{max-height:none}}
.plan-bar-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}

/* document e-sign: inline drag-and-drop field editor + renderer */
.esign-wrap{margin-top:10px}
.esign-palette{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.esign-pal-btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);border-radius:9px;padding:8px 12px;font-size:13px;font-weight:600;cursor:grab;box-shadow:var(--bevel-raise);user-select:none}
.esign-pal-btn:active{cursor:grabbing}
.esign-pal-btn.armed{background:var(--bo);color:#f5f2f0;border-color:transparent}
.esign-pal-ico{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
.esign-doc{position:relative;display:inline-block;max-width:100%;border:1px solid var(--line-strong);border-radius:10px;overflow:hidden;line-height:0;background:#fff}

.esign-edit .pdf-page{position:relative}

.esign-edit .esign-field:active{cursor:grabbing}
.esign-marker{display:inline-flex;align-items:center;justify-content:center;border:1.5px dashed var(--bo);background:rgba(92,136,205,.14);border-radius:6px;color:var(--bo);font-weight:700;font-size:15px;min-width:30px;min-height:30px;padding:2px 7px;line-height:1}
.esign-marker.esign-circle{border-radius:50%;width:36px;height:36px;padding:0}
.esign-marker.esign-text{min-width:120px;justify-content:flex-start;font-weight:500;color:var(--ink-soft);font-style:italic;font-family:'Inter',system-ui,sans-serif}
.esign-marker.esign-signature{min-width:150px;min-height:48px;font-style:italic;font-weight:500;color:var(--ink-soft)}
.esign-fdel{position:absolute;top:-9px;right:-9px;width:19px;height:19px;border-radius:50%;border:0;background:#c0392b;color:#fff;font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;padding:0}
.esign-input{font-family:'Inter',system-ui,sans-serif;font-size:14px;border:1px solid var(--fa);background:rgba(255,255,255,.94);border-radius:5px;padding:5px 8px;min-width:120px;color:#161616;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.esign-toggle{width:36px;height:36px;border-radius:6px;border:1.5px solid var(--fa);background:rgba(255,255,255,.9);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:700;color:var(--fa);padding:0;box-shadow:0 1px 3px rgba(0,0,0,.12)}

.esign-toggle.on{background:var(--fa);color:#fff}
.esign-sigbtn{min-width:150px;min-height:48px;border:1.5px solid var(--fa);border-radius:6px;background:rgba(255,255,255,.9);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--fa);font-size:13px;font-weight:600;padding:4px 8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.esign-sigbtn img{max-width:100%;max-height:44px}
.esign-sig-typed{font-family:'Monsieur La Doulaise',cursive;font-size:32px;color:#161616;line-height:1;white-space:nowrap}
.sig-tabs{display:inline-flex;background:var(--card);border-radius:9px;padding:3px;box-shadow:var(--bevel-inset)}
.sig-tab{border:0;background:transparent;color:var(--ink-soft);font-size:13px;font-weight:600;padding:7px 18px;border-radius:7px;cursor:pointer}

const { useState, useEffect, useLayoutEffect, useRef, useMemo, useCallback, createContext, useContext } = React;

  clearResponses: (id) => req("/api/forms/" + id + "/responses", { method:"DELETE" }),

/* ----------------------------- helpers ----------------------------- */
const uid = () => Math.random().toString(36).slice(2, 9);
const isEmpty = (v) => v === null || v === undefined || v === "" || (Array.isArray(v) && v.length === 0);
const FORM_FONTS = {
  sans: "'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif",
  serif: "'IBM Plex Serif',Georgia,'Times New Roman',serif",
};
const _loadedFonts = {};
function loadGoogleFont(name){
  if (!name || typeof name !== "string") return;
  const key = name.trim(); if (!key || _loadedFonts[key]) return;
  _loadedFonts[key] = true;
  try {
    const link = document.createElement("link"); link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=" + encodeURIComponent(key).replace(/%20/g, "+") + ":wght@400;500;600;700&display=swap";
    document.head.appendChild(link);
  } catch (e) {}
}
function readImageScaled(file, maxW, cb){
  const reader = new FileReader();
  reader.onerror = ()=>cb(null);
  reader.onload = ()=>{
    const img = new Image();
    img.onerror = ()=>cb(null);
    img.onload = ()=>{
      const scale = Math.min(1, maxW / (img.width || maxW));
      const w = Math.max(1, Math.round((img.width || maxW) * scale));
      const h = Math.max(1, Math.round((img.height || maxW) * scale));
      try {
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#f5f2f0"; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL("image/jpeg", 0.82));
      } catch (e) { cb(reader.result); }
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function fmtDate(s){
  if (!s) return "";
  const d = new Date(s.replace(" ", "T") + (s.includes("Z") ? "" : "Z"));
  if (isNaN(d)) return s;
  return d.toLocaleString(undefined, { year:"numeric", month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
}
function fmtWhen(s){
  if (!s) return "";
  const d = new Date(s.replace(" ", "T") + (s.includes("Z") ? "" : "Z"));
  if (isNaN(d)) return s;
  return d.toLocaleDateString(undefined, { month:"short", day:"numeric" }) + " at " + d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" });
}
function fmtAgo(s){
  if (!s) return "";
  const d = new Date(s.replace(" ", "T") + (s.includes("Z") ? "" : "Z"));
  if (isNaN(d)) return s;
  const now = new Date();
  const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startThat = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const days = Math.round((startToday - startThat) / 86400000);
  if (days <= 0) return "today";
  if (days === 1) return "yesterday";
  if (days <= 60) return days + " days ago";
  return d.toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" });
}
function Spark(){
  return (<svg className="spark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6L12 2zM19 14l.8 2.7L22.5 17l-2.7.8L19 20.5l-.8-2.7L15.5 17l2.7-.8L19 14z"/></svg>);
}

/* ----------------------------- app context ----------------------------- */
const Ctx = createContext(null);
const useApp = () => useContext(Ctx);

/* ----------------------------- question registry ----------------------------- */
function fmtSlot(s){
  if (!s) return "";
  if (typeof s === "object") return fmtPollAnswer(s);
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" }) + " at " + d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" });
}
function _icsPad(n){ return String(n).padStart(2, "0"); }
function _icsStamp(d){ return d.getUTCFullYear() + _icsPad(d.getUTCMonth() + 1) + _icsPad(d.getUTCDate()) + "T" + _icsPad(d.getUTCHours()) + _icsPad(d.getUTCMinutes()) + _icsPad(d.getUTCSeconds()) + "Z"; }
function buildICS(q, startISO){
  const start = new Date(startISO); if (isNaN(start)) return "";
  const dur = (q.duration && q.duration > 0) ? q.duration : 30;
  const end = new Date(start.getTime() + dur * 60000);
  const esc = (t)=> String(t == null ? "" : t).replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
  const vl = { zoom:"Zoom", meet:"Google Meet", teams:"Microsoft Teams", webex:"Webex" };
  const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//zetetiq//booking//EN", "CALSCALE:GREGORIAN", "METHOD:PUBLISH", "BEGIN:VEVENT",
    "UID:" + (q.id || "evt") + "-" + start.getTime() + "@zetetiq",
    "DTSTAMP:" + _icsStamp(new Date()),
    "DTSTART:" + _icsStamp(start),
    "DTEND:" + _icsStamp(end),
    "SUMMARY:" + esc(q.meetingTitle || q.label || "Meeting")];
  if (q.location) lines.push("LOCATION:" + esc(q.location));
  if (q.video && q.video !== "none") lines.push("DESCRIPTION:" + esc((vl[q.video] || "Video") + " link will be provided."));
  lines.push("END:VEVENT", "END:VCALENDAR");
  return lines.join("\r\n");
}
function quizReview(form, answers){
  const qs = (form.schema && form.schema.questions) || [];
  const out = [];
  qs.forEach((q)=>{ if (q.type !== "multiple_choice" || !q.points || !Object.keys(q.points).length) return;
    const pts = q.points; const vals = Object.keys(pts).map((k)=> Number(pts[k])).filter((n)=> !isNaN(n)); const max = vals.length ? Math.max.apply(null, vals) : 0;
    if (max <= 0) return;
    const correct = (q.options || []).filter((o)=> Number(pts[o]) === max);
    const ans = answers[q.id]; const given = Array.isArray(ans) ? ans.slice() : (ans != null && ans !== "" ? [ans] : []);
    const cs = correct.slice().sort().join("\u0001"); const gs = given.slice().sort().join("\u0001");
    const isCorrect = given.length > 0 && (q.multi ? (cs === gs) : (correct.indexOf(given[0]) >= 0));
    out.push({ id: q.id, label: q.label || "Question", correct, given, isCorrect, explanation: q.explanation || "" });
  });
  return out;
}
function fmtPollAnswer(val){
  if (!val || typeof val !== "object" || Array.isArray(val)) return "";
  if (!Array.isArray(val.available) && !Array.isArray(val.maybe)) return val.name ? String(val.name) : "";
  const av = (val.available || []).map((k)=> fmtPollSlot(k));
  const mb = (val.maybe || []).map((k)=> fmtPollSlot(k));
  const parts = [];
  if (av.length) parts.push("Available: " + av.join(", "));
  if (mb.length) parts.push("Maybe: " + mb.join(", "));
  const who = val.name ? (String(val.name) + " \u00b7 ") : "";
  return who + (parts.length ? parts.join(" \u00b7 ") : "No availability submitted");
}
function fmtPollSlot(key, q){
  if (!key) return "";
  const WN = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let datePart = key, time = "";
  const ti = key.indexOf("T"); if (ti >= 0){ datePart = key.slice(0, ti); time = key.slice(ti + 1); }
  let dlabel;
  if (/^d\d$/.test(datePart)){ dlabel = WN[parseInt(datePart.slice(1), 10)] || datePart; }
  else { const dd = new Date(datePart + "T00:00"); dlabel = isNaN(dd) ? datePart : dd.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" }); }
  if (time){ const pp = time.split(":"); const hh = parseInt(pp[0], 10), mm = parseInt(pp[1] || "0", 10); const ap = hh < 12 ? "am" : "pm"; const h12 = (hh % 12) || 12; return dlabel + " " + h12 + (mm ? (":" + String(mm).padStart(2, "0")) : "") + ap; }
  return dlabel;
}
function downloadICS(q, startISO){
  try {
    const ics = buildICS(q, startISO); if (!ics) return;
    const blob = new Blob([ics], { type:"text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = (q.meetingTitle || "meeting").replace(/[^a-z0-9]+/gi, "-").toLowerCase().replace(/^-|-$/g, "") + ".ics";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>{ try { URL.revokeObjectURL(url); } catch (e) {} }, 1000);
  } catch (e) {}
}
function readFileDataUrl(file, maxBytes, cb){
  if (!file){ cb(null); return; }
  if (file.size && maxBytes && file.size > maxBytes){ cb(null); return; }
  const reader = new FileReader();
  reader.onerror = ()=>cb(null);
  reader.onload = ()=>{ const r = reader.result; if (typeof r === "string" && maxBytes && r.length > maxBytes * 1.4){ cb(null); return; } cb(r); };
  reader.readAsDataURL(file);
}
function fmtBytes(n){ n = n || 0; if (n < 1024) return n + " B"; if (n < 1048576) return (n / 1024).toFixed(n < 10240 ? 1 : 0) + " KB"; if (n < 1073741824) return (n / 1048576).toFixed(n < 10485760 ? 1 : 0) + " MB"; return (n / 1073741824).toFixed(2) + " GB"; }
function jpgName(n){ return String(n || "image").replace(/\.[^.]+$/, "") + ".jpg"; }
function compressImageUnder(file, maxBytes, cb){
  const attempts = [[1, 0.82], [1, 0.7], [0.85, 0.68], [0.7, 0.62], [0.55, 0.56], [0.45, 0.5], [0.35, 0.45]];
  let url;
  try { url = URL.createObjectURL(file); } catch (e){ cb(null); return; }
  const done = (f)=>{ try { URL.revokeObjectURL(url); } catch (e){} cb(f); };

  img.onload = ()=>{
    const w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;

      const ctx = canvas.getContext("2d"); if (!ctx){ attempt(); return; }
      ctx.drawImage(img, 0, 0, cw, ch);
      if (canvas.toBlob){
        canvas.toBlob((blob)=>{ if (blob && blob.size <= maxBytes){ done(new File([blob], jpgName(file.name), { type: "image/jpeg" })); } else attempt(); }, "image/jpeg", quality);

  };

}

function FileUploadRenderer({ q, value, onChange, error, formId, preview }){
  const { toast } = useApp();
  const [busy, setBusy] = useState(false);
  const multiple = !!q.multiple;
  const items = multiple ? (Array.isArray(value) ? value : (value ? [value] : [])) : (value && value.key ? [value] : []);
  const capMb = Math.min((q.maxMb || 10), 10);
  const pick = (file)=>{
    if (!file) return;
    if (preview || !formId){ toast("File uploads work on the published form."); return; }
    const cap = capMb * 1024 * 1024;
    const send = (f)=>{ setBusy(true); api.uploadFile(formId, f).then(({ ok, data })=>{ setBusy(false); if (!ok || !data || !data.key){ toast((data && data.error === "storage_unconfigured") ? "File uploads are not set up for this form yet." : (data && data.error === "too_large") ? ("That file is larger than " + (data.maxMb || capMb) + " MB.") : "Upload failed. Please try again."); return; } const rec = { key: data.key, name: data.name, size: data.size, type: data.type }; if (multiple) onChange(items.concat([rec])); else onChange(rec); }); };
    if (!file.size || file.size <= cap){ send(file); return; }
    if (/^image\//.test(file.type)){
      setBusy(true);
      compressImageUnder(file, cap, (out)=>{ if (out){ send(out); } else { setBusy(false); toast("That image is too large, even after compressing. Please choose one under " + capMb + " MB."); } });
    } else {
      toast("That file is larger than " + capMb + " MB and cannot be compressed. Please choose a smaller file.");
    }
  };
  const removeAt = (i)=>{ if (multiple){ const next = items.slice(); next.splice(i, 1); onChange(next); } else onChange(null); };
  return (
    <div className="q">
      <QLabel q={q} />
      <label className={"filezone" + (error ? " err" : "") + (busy ? " busy" : "")}>
        <input type="file" accept={q.accept || undefined} multiple={multiple} style={{display:"none"}} disabled={busy} onChange={(e)=>{ const fs = e.target.files; if (multiple){ Array.prototype.slice.call(fs).forEach(pick); } else { pick(fs && fs[0]); } e.target.value = ""; }} />
        <span className="filezone-ico">{busy ? "Uploading\u2026" : (multiple ? "Choose files" : "Choose a file")}</span>
        <span className="filezone-hint">{q.accept ? ("Accepted: " + q.accept) : "Any file type"}{" \u00b7 up to " + capMb + " MB, images shrink to fit"}</span>
      </label>
      {items.length > 0 && <div className="filelist">{items.map((it, i)=>(<div key={i} className="fileitem"><span className="filename">{it.name || "File"}</span><button type="button" className="fbtn-ghost sm" onClick={()=>removeAt(i)}>Remove</button></div>))}</div>}
      {error && <div className="ferr">{error}</div>}
    </div>
  );
}
function FileUploadControls({ q, update }){
  return (
    <div>
      <Field label="Accepted file types">
        <Select className="select" value={q.accept || ""} onChange={(e)=>update({accept:e.target.value})}>

          <option value="image/*">Images</option>
          <option value="application/pdf">PDF</option>
          <option value=".doc,.docx,.pdf,.txt,.rtf">Documents</option>
          <option value=".csv,.xls,.xlsx">Spreadsheets</option>
          <option value="image/*,application/pdf">Images and PDF</option>

      </Field>

  const sh = q.startHour == null ? 9 : q.startHour;

  const dur = q.duration || step;

      out.push({ start: slot.getFullYear() + "-" + zpad(slot.getMonth()+1) + "-" + zpad(slot.getDate()) + "T" + zpad(slot.getHours()) + ":" + zpad(slot.getMinutes()), capacity: cap });

function loadPdfJs(){
  if (typeof window === "undefined") return Promise.reject(new Error("no window"));
  if (window.pdfjsLib){ try { if (window.pdfjsLib.GlobalWorkerOptions && !window.pdfjsLib.GlobalWorkerOptions.workerSrc) window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER; } catch (e) {} return Promise.resolve(window.pdfjsLib); }

    const sc = document.createElement("script"); sc.src = PDFJS_URL;
    sc.onload = ()=>{ try { if (window.pdfjsLib){ try { window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER; } catch (e) {} resolve(window.pdfjsLib); } else reject(new Error("pdfjs missing")); } catch (e) { reject(e); } };
    sc.onerror = ()=>{ window.__pdfjsPromise = null; reject(new Error("pdfjs load failed")); };
    document.head.appendChild(sc);

function PdfDoc({ src, renderOverlay, onPageClick, onPageDrop, fallback, onError }){

  const [n, setN] = useState(0);
  const [failed, setFailed] = useState(false);
  const canvasRefs = useRef({});

    loadPdfJs().then((lib)=> lib.getDocument(src).promise).then((doc)=>{ if (c) return; setPdf(doc); setN(doc.numPages || 0); }).catch((e)=>{ if (!c){ setFailed(true); if (onError) onError(); } });
    return ()=>{ c = true; };
  }, [src]);
  useEffect(()=>{ let c = false; if (!pdf) return;
    (async ()=>{ for (let i = 1; i <= (pdf.numPages || 0); i++){ if (c) return; const canvas = canvasRefs.current[i]; if (!canvas) continue; try { const page = await pdf.getPage(i); const viewport = page.getViewport({ scale: 1.5 }); canvas.width = viewport.width; canvas.height = viewport.height; const ctx = canvas.getContext && canvas.getContext("2d"); if (ctx) await page.render({ canvasContext: ctx, viewport }).promise; } catch (e) {} } })();
    return ()=>{ c = true; };
  }, [pdf]);
  if (failed) return fallback || null;
  if (!n) return <div className="muted" style={{fontSize:13,padding:"10px 0"}}>Loading document...</div>;
  return (<div className="pdf-doc">{Array.from({ length: n }).map((_, i)=>(
    <div key={i} className="pdf-page" onClick={onPageClick ? (e)=>onPageClick(i, e, e.currentTarget) : undefined} onDragOver={onPageDrop ? (e)=>e.preventDefault() : undefined} onDrop={onPageDrop ? (e)=>onPageDrop(i, e, e.currentTarget) : undefined} style={onPageClick ? { cursor:"crosshair" } : undefined}>
      <canvas className="pdf-canvas" ref={(el)=>{ if (el) canvasRefs.current[i+1] = el; }} />

function ddDepth(nodes){ if (!nodes || !nodes.length) return 0; let m = 0; nodes.forEach((n)=>{ const d = ddDepth(n.children); if (d > m) m = d; }); return 1 + m; }
function DrillTree({ nodes, onChange, depth }){
  nodes = Array.isArray(nodes) ? nodes : [];
  const set = (id, patch)=> onChange(nodes.map((n)=> n.id === id ? { ...n, ...patch } : n));
  const add = ()=> onChange(nodes.concat([{ id: uid(), label:"", children:[] }]));
  const rm = (id)=> onChange(nodes.filter((n)=> n.id !== id));
  return (
    <div className="dd-tree" style={depth ? {marginLeft:14,borderLeft:"2px solid var(--line)",paddingLeft:10} : null}>

        <div key={n.id} className="dd-node">
          <div className="dd-row">
            <input className="input" placeholder="Option label" value={n.label} onChange={(e)=>set(n.id, { label:e.target.value })} />
            <button className="iconbtn" title="Add sub-option" onClick={()=>set(n.id, { children:(n.children || []).concat([{ id: uid(), label:"", children:[] }]) })}>+</button>
            <button className="iconbtn" title="Remove" onClick={()=>rm(n.id)}>×</button>
          </div>
          {(n.children && n.children.length > 0) && <DrillTree nodes={n.children} depth={(depth || 0) + 1} onChange={(ch)=>set(n.id, { children:ch })} />}
        </div>
      ))}

function DrillControls({ q, update }){

function DrillRenderer({ q, value, onChange, error }){
  const path = Array.isArray(value) ? value : [];
  const levels = Array.isArray(q.levels) ? q.levels : [];
  const selects = []; let nodes = q.tree || []; let depth = 0;
  while (nodes && nodes.length){
    const chosen = path[depth] || "";
    selects.push({ depth, nodes, chosen });
    const node = nodes.find((n)=> n.label === chosen);
    if (!node || !node.children || !node.children.length) break;
    nodes = node.children; depth++;
  }
  const choose = (d, label)=>{ let np = path.slice(0, d); if (label) np = np.concat([label]); onChange(np); };
  return (
    <div className="q">
      <QLabel q={q} />
      <div className="dd-selects">
        {selects.map((s)=>(
          <div className="dd-sel" key={s.depth}>
            {levels[s.depth] ? <div className="dd-sel-label">{levels[s.depth]}</div> : null}
            <Select className="finput" value={s.chosen} onChange={(e)=>choose(s.depth, e.target.value)}>
              <option value="">{levels[s.depth] ? ("Select " + levels[s.depth]) : "Select..."}</option>
              {s.nodes.map((n)=>(<option key={n.id || n.label} value={n.label}>{n.label}</option>))}
            </Select>
          </div>
        ))}
      </div>
      {error && <div className="ferr">{error}</div>}
    </div>
  );
}

function ConjointRenderer({ q, value, onChange, error }){
  const attrs = Array.isArray(q.attributes) ? q.attributes : [];
  const tasks = Math.max(1, q.tasks || 3);

  const profiles = useMemo(()=>{
    let seed = 0; const sid = String(q.id || "x"); for (let i = 0; i < sid.length; i++) seed = (seed * 31 + sid.charCodeAt(i)) & 0x7fffffff; if (!seed) seed = 1;
    const rnd = ()=>{ seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
    const out = [];
    for (let t = 0; t < tasks; t++){
      const set = []; const seen = {}; let guard = 0; const canVary = attrs.some((a)=> (a.levels || []).length > 1);
      while (set.length < per && guard < 80){
        guard++;
        const p = {}; attrs.forEach((a)=>{ const lv = (a.levels && a.levels.length) ? a.levels[Math.floor(rnd() * a.levels.length)] : ""; p[a.name] = lv; });
        const k = attrs.map((a)=> p[a.name]).join("\u0001"); if (seen[k] && canVary){ continue; } seen[k] = true; set.push(p);
      }
      out.push(set);
    }
    return out;
  }, [q.id, JSON.stringify(attrs), tasks, per]);
  const val = Array.isArray(value) ? value : [];

            <tr><th className="cj-attr"></th>{set.map((p,pi)=>{ const sel = chosen && !chosen.none && attrs.every((a)=> chosen[a.name] === p[a.name]); return (<td key={pi} className="cj-pickcell"><label className={"cj-choose" + (sel ? " sel" : "")}><input type="radio" name={"cj-" + q.id + "-" + ti} checked={!!sel} onChange={()=>pick(ti, p)} /><span>Choose</span></label></td>); })}{q.noneOption && <td className="cj-pickcell"><label className={"cj-choose" + (chosen && chosen.none ? " sel" : "")}><input type="radio" name={"cj-" + q.id + "-" + ti} checked={!!(chosen && chosen.none)} onChange={()=>pick(ti, { none:true })} /><span>None</span></label></td>}</tr>
          </tbody></table></div>
        </div>);
      })}
      {error && <div className="ferr">{error}</div>}
    </div>
  );

function SignatureRenderer({ q, value, onChange, error }){
  const ref = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);
  const ctxOf = () => { try { const c = ref.current; return c && c.getContext ? c.getContext("2d") : null; } catch (e) { return null; } };
  const pos = (e) => { const c = ref.current; const r = c.getBoundingClientRect(); const t = (e.touches && e.touches[0]) ? e.touches[0] : e; const sx = r.width ? c.width / r.width : 1; const sy = r.height ? c.height / r.height : 1; return { x: (t.clientX - r.left) * sx, y: (t.clientY - r.top) * sy }; };
  const start = (e) => { const ctx = ctxOf(); if (!ctx) return; drawing.current = true; last.current = pos(e); };
  const move = (e) => { if (!drawing.current) return; const ctx = ctxOf(); if (!ctx) return; if (e.cancelable && e.preventDefault) e.preventDefault(); const p = pos(e); ctx.strokeStyle = "#2A2620"; ctx.lineWidth = 2.2; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.beginPath(); ctx.moveTo(last.current.x, last.current.y); ctx.lineTo(p.x, p.y); ctx.stroke(); last.current = p; };
  const end = () => { if (!drawing.current) return; drawing.current = false; const c = ref.current; if (c && c.toDataURL) onChange(c.toDataURL("image/png")); };
  const clear = () => { const c = ref.current; const ctx = ctxOf(); if (c && ctx) ctx.clearRect(0, 0, c.width, c.height); onChange(""); };
  useEffect(()=>{ const c = ref.current; const ctx = ctxOf(); if (!c || !ctx || !value || typeof value !== "string" || value.indexOf("data:") !== 0) return; const img = new window.Image(); img.onload = ()=>{ try { ctx.drawImage(img, 0, 0, c.width, c.height); } catch (e) {} }; img.src = value; }, []);
  return (
    <div className="q">
      <QLabel q={q} />
      <div className={"sigpad" + (error ? " err" : "")}>
        <canvas ref={ref} width={520} height={160} className="sigcanvas" onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={move} onTouchEnd={end}></canvas>
      </div>
      <div className="sigrow"><span className="sighint">Draw your signature above</span><button type="button" className="fbtn-ghost sm" onClick={clear}>Clear</button></div>
      {error && <div className="ferr">{error}</div>}
    </div>
  );
}

  rank_order: {
    label: "Rank order",
    hint: "Order items by dragging or arrows",
    isInput: true,
    make: () => ({ type:"rank_order", id: uid(), label:"Rank these in order of preference", required:false, request:false, items:["Item 1","Item 2","Item 3"] }),
    summary: (q) => q.items.length + " items to rank",
    validate: (q, v) => (q.required && !(Array.isArray(v) && v.length === q.items.length)) ? "Please rank the items." : null,
    Renderer: ({ q, value, onChange, error }) => {
      const ordered = (Array.isArray(value) && value.length === q.items.length) ? value : q.items;
      useEffect(()=>{ if (!(Array.isArray(value) && value.length === q.items.length)) onChange(q.items.slice()); }, [q.id, (q.items || []).join("\u0001")]);
      const [drag, setDrag] = useState(null);
      const dragRef = useRef(null);
      const rowsRef = useRef([]);
      const orderRef = useRef(ordered); orderRef.current = ordered;
      const setDragBoth = (v) => { dragRef.current = v; setDrag(v); };
      const move = (i, dir) => { const a = ordered.slice(); const j = i + dir; if (j < 0 || j >= a.length) return; const t = a[i]; a[i] = a[j]; a[j] = t; onChange(a); };
      const reorder = (from, to) => { if (from === null || from === to || from == null || to == null) return; const a = orderRef.current.slice(); const m = a.splice(from, 1)[0]; a.splice(to, 0, m); onChange(a); };
      const onMove = (clientY) => { const cur = dragRef.current; if (cur == null) return; const rects = rowsRef.current.map((el)=> el ? el.getBoundingClientRect() : null); let target = cur; for (let i = 0; i < rects.length; i++){ const r = rects[i]; if (!r) continue; const mid = r.top + r.height / 2; if (clientY < mid){ target = i; break; } target = i; } if (target !== cur){ reorder(cur, target); setDragBoth(target); } };
      const startDrag = (i) => { setDragBoth(i); const mv = (ev)=> onMove(ev.clientY); const up = ()=>{ setDragBoth(null); window.removeEventListener("pointermove", mv); window.removeEventListener("pointerup", up); }; window.addEventListener("pointermove", mv); window.addEventListener("pointerup", up); };
      if (q.carryFrom && (!q.items || !q.items.length)) return (<div className="q"><QLabel q={q} /><div className="muted" style={{fontSize:13}}>Nothing was carried forward from the earlier question.</div>{error && <div className="ferr">{error}</div>}</div>);
      return (
        <div className="q">
          <QLabel q={q} />
          <div className="ranklist">
            {ordered.map((it,i)=>(
              <div className={"rankrow" + (drag === i ? " dragging" : "")} key={it + "-" + i} ref={(el)=>{ rowsRef.current[i] = el; }}>
                <span className="rgrip" onPointerDown={(e)=>{ e.preventDefault(); startDrag(i); }} title="Drag to reorder" style={{touchAction:"none"}}>⠿</span>
                <span className="rnum">{i + 1}</span>
                <span className="rlabel">{it}</span>
                <span className="rbtns">
                  <button type="button" onClick={()=>move(i,-1)} disabled={i === 0}>↑</button>
                  <button type="button" onClick={()=>move(i,1)} disabled={i === ordered.length - 1}>↓</button>
                </span>
              </div>
            ))}
          </div>
          <div className="hint" style={{marginTop:6}}>Drag the handle or use the arrows to reorder.</div>
          {error && <div className="ferr">{error}</div>}
        </div>
      );
    },
  },

    setFollowups((f)=>({ ...f, [q.id]: { loading: true, question: null, answer: "", done: false } }));
    api.followup(form.id, q.id, answers[q.id]).then(({ ok, data })=>{
      const question = ok && data && data.question ? data.question : null;
      setFollowups((f)=>({ ...f, [q.id]: { loading: false, question, answer: (f[q.id] && f[q.id].answer) || "", done: true } }));
      if (!question && after) after();
    }).catch(()=>{ setFollowups((f)=>({ ...f, [q.id]: { loading: false, question: null, answer: "", done: true } })); if (after) after(); });
  };
  const skipTarget = (qs) => {
    for (const q of (qs || [])){
      if (!vis(q)) continue;
      const rules = Array.isArray(q.skip) ? q.skip : [];
      for (const r of rules){ if (skipMatch(answers[q.id], r)) return r.target; }
    }
    return null;
  };
  const doNext = () => {
    setErrors({});
    const t = skipTarget((steps[cur] && steps[cur].qs) || []);
    if (t === "end"){ doSubmit(); return; }
    if (t === "screenout"){ doSubmit(true); return; }
    if (t){ const j = steps.findIndex((st)=> st.bid && st.bid === t); if (j >= 0 && j > cur){ setHist((h)=> h.concat([cur])); setPage(j); window.scrollTo(0, 0); return; } }

  };
  const goNext = () => {

      const errs = validateList((steps[cur] && steps[cur].qs) || []); if (Object.keys(errs).length){ setErrors(errs); return; }
      const fq = pendingFollowupQ((steps[cur] && steps[cur].qs) || []); if (fq){ setErrors({}); runFollowup(fq, doNext); return; }
    }
    doNext();

  const goBack = () => { setErrors({}); if (hist.length){ const to = hist[hist.length - 1]; setHist(hist.slice(0, -1)); setPage(to); window.scrollTo(0, 0); } else if (prevIdx !== undefined){ setPage(prevIdx); window.scrollTo(0, 0); } };

    if (preview) return;

    if (Object.keys(errs).length){ setErrors(errs); return; }

  };

  const sec = steps[cur] || {};
  const shown = ((steps[cur] && steps[cur].qs) || []).filter((q)=> vis(q));
  return (
    <div className="form-scope" style={scopeStyle}>

        {multi && <div className="fprogress"><div className="fprogress-bar" style={{width:((pos / total) * 100) + "%"}}></div></div>}

          {shown.map((q)=>{ const def = QTYPES[q.type]; if (!def) return null; const R = def.Renderer; const _pq0 = pipeQuestion(q, answers, questions); const _ci = carryItems(q, answers, questions); const pq = _ci ? (q.type === "rank_order" ? { ..._pq0, items: _ci } : { ..._pq0, options: _ci }) : _pq0; return (<div key={q.id}><R q={pq} value={answers[q.id]} onChange={(v)=>setA(q.id, v)} error={errors[q.id]} bookings={bookings && bookings[q.id]} counts={optionCounts && optionCounts[q.id]} poll={poll && poll[q.id]} busy={busy} formId={form.id} preview={preview} />{renderFollowup(q)}</div>); })}
          {shown.length === 0 && <div className="muted" style={{fontSize:13}}>Nothing to show on this step.</div>}
        </div>

    </div>
  );
}

function selText(node){

  if (Array.isArray(node)) return node.map(selText).join("");

}

function TimeField({ value, onChange }){

  </div>);
}

function MCCanvas({ q, update }){
  const marker = q.multi ? "sq" : "rd";
  const quotas = q.quotas || {};
  const setOpt = (i, v) => {
    const o = q.options.slice(); const old = o[i]; o[i] = v;
    const patch = { options: o };
    if (q.quotas && old !== v && Object.prototype.hasOwnProperty.call(q.quotas, old)){ const qz = { ...q.quotas }; qz[v] = qz[old]; delete qz[old]; patch.quotas = qz; }
    if (q.points && old !== v && Object.prototype.hasOwnProperty.call(q.points, old)){ const pp = { ...q.points }; pp[v] = pp[old]; delete pp[old]; patch.points = pp; }
    update(patch);
  };
  const setQuota = (o, val) => { const qz = { ...(q.quotas || {}) }; const n = parseInt(val, 10); if (n > 0) qz[o] = n; else delete qz[o]; update({ quotas: qz }); };
  const add = () => update({ options: q.options.concat(["Option " + (q.options.length + 1)]) });
  const rm = (i) => { const removed = q.options[i]; const qz = { ...(q.quotas || {}) }; delete qz[removed]; update({ options: q.options.filter((_, k) => k !== i), quotas: qz }); };
  return (
    <div>
      {q.display === "dropdown" && <div className="mono" style={{fontSize:11,color:"var(--ink-soft)",marginBottom:6}}>Shown as a dropdown</div>}
      {q.options.map((o, i) => (
        <div className="wq-choice" key={i}>
          <span className={"wq-mark " + marker}></span>
          <input className="wq-choice-input" placeholder={"Click to write Choice " + (i + 1)} value={o} onChange={(e)=>setOpt(i, e.target.value)} />
          <input className="wq-quota" type="number" min="0" placeholder="∞" title="Limit how many can pick this (blank for no limit)" value={quotas[o] || ""} onChange={(e)=>setQuota(o, e.target.value)} />
          <button className="iconbtn" style={{width:26,height:26}} title="Remove choice" disabled={q.options.length <= 1} onClick={()=>rm(i)}>×</button>
        </div>
      ))}
      <button className="wq-addchoice" onClick={add}>+ Add choice</button>
      <div className="wq-quota-hint">Numbers cap how many people can pick each choice. Blank means no limit.</div>
    </div>
  );
}

function LogicControls({ q, questions, update }){
  const idx = questions.findIndex((x)=>x.id === q.id);

  const lg = q.logic || null;
  const on = !!(lg && lg.q);
  const src = priors.find((x)=>x.id === (lg && lg.q));
  const opts = src && src.type === "multiple_choice" ? src.options : (src && src.type === "matrix" ? src.cols : null);
  return (
    <div>
      <div className="panel-section">Display logic</div>
      {priors.length === 0
        ? <div className="hint">Place this question after another input question to show it conditionally.</div>
        : (<div>
            <Toggle checked={on} onChange={(c)=> update({ logic: c ? { q: priors[0].id, op: "eq", value: "" } : null })} label="Show only if a condition is met" />
            {on && (
              <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
                <Select className="select" value={lg.q} onChange={(e)=>update({ logic: { q: e.target.value, op: lg.op, value: "" } })}>
                  {priors.map((p)=>(<option key={p.id} value={p.id}>{p.label || p.id}</option>))}
                </Select>
                <Select className="select" value={lg.op} onChange={(e)=>update({ logic: { ...lg, op: e.target.value } })}>
                  <option value="eq">is</option>
                  <option value="ne">is not</option>
                  <option value="contains">contains</option>
                </Select>
                {opts
                  ? (<Select className="select" value={lg.value} onChange={(e)=>update({ logic: { ...lg, value: e.target.value } })}><option value="">Choose a value</option>{opts.map((o,i)=>(<option key={i} value={o}>{o}</option>))}</Select>)
                  : (<input className="input" placeholder="Value" value={lg.value} onChange={(e)=>update({ logic: { ...lg, value: e.target.value } })} />)}

            )}

  );

      {q.type === "rank_order" && <RankControls q={q} update={update} />}

function TranslationsPanel({ form, setSettings }){
  const set = form.schema.settings || {};
  const langs = Array.isArray(set.languages) ? set.languages : [];
  const [target, setTarget] = useState(langs[1] ? langs[1].code : "");
  const [code, setCode] = useState(""); const [label, setLabel] = useState("");
  const setLangs = (arr)=> setSettings({ languages: arr, multilingual: arr.length > 1 });
  const addLang = ()=>{ const c = code.trim().toLowerCase(); const l = label.trim(); if (!c || !l) return; if (langs.some((x)=>x.code === c)) return; const arr = (langs.length ? langs : [{ code:"en", label:"English" }]).concat([{ code:c, label:l }]); setLangs(arr); setCode(""); setLabel(""); setTarget(c); };
  const removeLang = (c)=>{ const arr = langs.filter((x)=>x.code !== c); setLangs(arr); if (target === c) setTarget(arr[1] ? arr[1].code : ""); };
  const tr = (set.translations && set.translations[target]) || {};
  const setT = (key, val)=>{ const all = { ...(set.translations || {}) }; const one = { ...(all[target] || {}) }; if (val === "") delete one[key]; else one[key] = val; all[target] = one; setSettings({ translations: all }); };
  const strings = formStrings(form);
  const filled = strings.filter((x)=> tr[x.key] != null && tr[x.key] !== "").length;
  return (<div>
    <div className="panel-section">Languages</div>
    <div className="hint" style={{marginBottom:8}}>The first language is the default. Add others to offer the form with a language picker for respondents.</div>
    {langs.map((l,i)=>(<div key={l.code} className="lang-row"><span className="mono" style={{fontSize:12,width:40,flex:"none"}}>{l.code}</span><span style={{flex:1}}>{l.label}{i === 0 ? " (default)" : ""}</span>{i > 0 && <button className="iconbtn" title="Remove" onClick={()=>removeLang(l.code)}>×</button>}</div>))}
    <div className="row" style={{marginTop:10,gap:6}}><input className="input" style={{width:64,flex:"none"}} value={code} onChange={(e)=>setCode(e.target.value)} placeholder="es" /><input className="input" style={{flex:1}} value={label} onChange={(e)=>setLabel(e.target.value)} placeholder="Espanol" /><button className="btn sm" onClick={addLang}>Add</button></div>
    {langs.length > 1 && target && (<>
      <div className="panel-section">Translate into</div>
      <Field label="Target language"><Select className="select" value={target} onChange={(e)=>setTarget(e.target.value)}>{langs.filter((l,i)=>i > 0).map((l)=>(<option key={l.code} value={l.code}>{l.label}</option>))}</Select></Field>
      <div className="hint">{filled} of {strings.length} strings translated. Leave a field blank to fall back to the default text.</div>
      <div className="panel-section">Strings</div>
      {strings.map((x)=>(<div key={x.key} className="i18n-row"><div className="i18n-meta"><span className="i18n-grp">{x.group}</span><span className="i18n-what">{x.what}</span></div><div className="i18n-orig" title={x.original}>{x.original || "(empty)"}</div><input className="input" value={tr[x.key] || ""} onChange={(e)=>setT(x.key, e.target.value)} placeholder={x.original} /></div>))}
    </>)}
  </div>);
}
function SettingsPanel({ form, setForm, setSettings, id, del }){

}
